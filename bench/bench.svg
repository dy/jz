    <text x="662" y="153" font-size="13" font-weight="500" fill="#868e96">1.13×</text>
    <circle cx="182.0" cy="149" r="8" fill="#adb5bd">
      <animate attributeName="cx" dur="1.8079999999999998s" repeatCount="indefinite" calcMode="linear"
