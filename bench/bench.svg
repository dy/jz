<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 384" width="720" height="384" role="img" aria-label="jz benchmark geomean">
  <rect width="720" height="384" rx="10" fill="#ffffff"/>
  <text x="20" y="30" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="16" font-weight="700" fill="#212529">Speed vs jz — geomean across the bench corpus</text>
  <text x="20" y="48" font-family="-apple-system,Segoe UI,Roboto,sans-serif" font-size="12" fill="#868e96">longer bar / brisker bounce = faster · 1.00× = jz · lower is better</text>

  <g font-family="-apple-system,Segoe UI,Roboto,sans-serif">
    <text x="150" y="91" text-anchor="end" font-size="15" font-weight="500" fill="#212529">native C</text>
    <text x="150" y="107" text-anchor="end" font-size="10.5" fill="#868e96">clang -O3</text>
    <rect x="166" y="89" width="484" height="8" rx="4" fill="#f1f3f5"/>
    <rect x="166" y="89" width="484.0" height="8" rx="4" fill="#4c6ef5" opacity="0.65"/>
    <circle cx="637.0" cy="105" r="11" fill="#4c6ef5">
      <animate attributeName="cy" dur="0.48s" repeatCount="indefinite"
        keyTimes="0;0.5;1" values="105;71;105"
        calcMode="spline" keySplines="0.15 0.6 0.4 1;0.6 0 0.85 0.4"/>
    </circle>
    <text x="658.0" y="97" font-size="13" font-weight="500" fill="#4c6ef5">0.96×</text>
  </g>
  <g font-family="-apple-system,Segoe UI,Roboto,sans-serif">
    <text x="150" y="149" text-anchor="end" font-size="15" font-weight="700" fill="#212529">jz</text>
    <text x="150" y="165" text-anchor="end" font-size="10.5" fill="#868e96">→ wasm</text>
    <rect x="166" y="147" width="484" height="8" rx="4" fill="#f1f3f5"/>
    <rect x="166" y="147" width="464.6" height="8" rx="4" fill="#e8590c" opacity="0.95"/>
    <circle cx="617.6" cy="163" r="11" fill="#e8590c">
      <animate attributeName="cy" dur="0.5s" repeatCount="indefinite"
        keyTimes="0;0.5;1" values="163;129;163"
        calcMode="spline" keySplines="0.15 0.6 0.4 1;0.6 0 0.85 0.4"/>
    </circle>
    <text x="638.6" y="155" font-size="13" font-weight="700" fill="#e8590c">1×</text>
  </g>
  <g font-family="-apple-system,Segoe UI,Roboto,sans-serif">
    <text x="150" y="207" text-anchor="end" font-size="15" font-weight="500" fill="#212529">V8</text>
    <text x="150" y="223" text-anchor="end" font-size="10.5" fill="#868e96">Node</text>
    <rect x="166" y="205" width="484" height="8" rx="4" fill="#f1f3f5"/>
    <rect x="166" y="205" width="189.6" height="8" rx="4" fill="#adb5bd" opacity="0.65"/>
    <circle cx="342.6" cy="221" r="11" fill="#adb5bd">
      <animate attributeName="cy" dur="1.225s" repeatCount="indefinite"
        keyTimes="0;0.5;1" values="221;187;221"
        calcMode="spline" keySplines="0.15 0.6 0.4 1;0.6 0 0.85 0.4"/>
    </circle>
    <text x="363.6" y="213" font-size="13" font-weight="500" fill="#adb5bd">2.45×</text>
  </g>
  <g font-family="-apple-system,Segoe UI,Roboto,sans-serif">
    <text x="150" y="265" text-anchor="end" font-size="15" font-weight="500" fill="#212529">AssemblyScript</text>
    <text x="150" y="281" text-anchor="end" font-size="10.5" fill="#868e96">asc -O3</text>
    <rect x="166" y="263" width="484" height="8" rx="4" fill="#f1f3f5"/>
    <rect x="166" y="263" width="184.4" height="8" rx="4" fill="#f08c00" opacity="0.65"/>
    <circle cx="337.4" cy="279" r="11" fill="#f08c00">
      <animate attributeName="cy" dur="1.26s" repeatCount="indefinite"
        keyTimes="0;0.5;1" values="279;245;279"
        calcMode="spline" keySplines="0.15 0.6 0.4 1;0.6 0 0.85 0.4"/>
    </circle>
    <text x="358.4" y="271" font-size="13" font-weight="500" fill="#f08c00">2.52×</text>
  </g>
  <g font-family="-apple-system,Segoe UI,Roboto,sans-serif">
    <text x="150" y="323" text-anchor="end" font-size="15" font-weight="500" fill="#212529">Porffor</text>
    <text x="150" y="339" text-anchor="end" font-size="10.5" fill="#868e96">runs 4 / 12</text>
    <rect x="166" y="321" width="484" height="8" rx="4" fill="#f1f3f5"/>
    <rect x="166" y="321" width="83.7" height="8" rx="4" fill="#e64980" opacity="0.65"/>
    <circle cx="236.7" cy="337" r="11" fill="#e64980">
      <animate attributeName="cy" dur="2.6s" repeatCount="indefinite"
        keyTimes="0;0.5;1" values="337;303;337"
        calcMode="spline" keySplines="0.15 0.6 0.4 1;0.6 0 0.85 0.4"/>
    </circle>
    <text x="257.7" y="329" font-size="13" font-weight="500" fill="#e64980">5.55×</text>
  </g>
</svg>
