<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JZ bench</title>
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon">
<style>
/* Swiss B&W, same system as ../repl */
@font-face {
  font-family: Jost; font-style: normal; font-weight: 100 900; font-display: swap;
  src: url(../examples/lib/jost.woff2) format('woff2');
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sans: Futura, 'Futura PT', 'Avant Garde', 'ITC Avant Garde Gothic Std', 'Century Gothic', Jost, 'Helvetica Neue', sans-serif;
  --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  --ink: #000; --paper: #fff; --mid: #757575; --soft: #595959; --faint: #e8e8e8;
  --band: #0a0a0a; --red: #c00;
  --padx: 32px;
}
html { scroll-behavior: smooth; }
body { background: var(--paper); color: var(--ink); font-family: var(--sans);
  -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }

header { background: var(--band); color: var(--paper); display: flex; align-items: center; min-height: 44px; padding: 0 var(--padx); }
.wordmark { font-size: 19px; font-weight: 400; letter-spacing: -.02em; line-height: 1; }
.wordmark .mark { font-weight: 700; color: #fff; }
.wordmark .sub  { font-weight: 400; color: #8a8a8a; margin-left: .45em; }
header .tag { font-size: 12.5px; color: #8a8a8a; margin-left: 16px; }
header nav { margin-left: auto; display: flex; align-items: center; gap: 22px; }
header nav a { color: #fff; opacity: .7; text-decoration: none; font-size: 12px; text-transform: uppercase; letter-spacing: .14em; transition: opacity .18s; }
header nav a:hover { opacity: 1; }
header .gh { display: flex; }

main { max-width: 1080px; margin: 0 auto; padding: 0 var(--padx) 90px; }
section { margin-top: 64px; }
h2 { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .16em; border-bottom: 1px solid var(--ink); padding-bottom: 8px; margin-bottom: 18px; }
p { font-size: 14px; line-height: 1.55; max-width: 70ch; }
p + p { margin-top: 10px; }
a { color: var(--ink); }
.dim { color: var(--mid); }
code, .mono { font-family: var(--mono); font-size: .92em; }

/* tooltips — custom bubble, replaces the slow OS title popup */
[data-tip] { position: relative; cursor: help; }
[data-tip]::after, [data-tip]::before {
  opacity: 0; visibility: hidden; pointer-events: none; transition: opacity .14s ease, transform .14s ease; }
[data-tip]::after {
  content: attr(data-tip); position: absolute; left: 0; bottom: calc(100% + 9px); z-index: 30;
  width: max-content; max-width: 270px;
  background: var(--ink); color: var(--paper);
  font: 400 11.5px/1.5 var(--sans); text-transform: none; letter-spacing: normal; text-align: left;
  padding: 8px 11px; transform: translateY(4px); box-shadow: 0 4px 16px rgba(0, 0, 0, .22); }
[data-tip]::before {
  content: ''; position: absolute; left: 13px; bottom: calc(100% + 4px); z-index: 30;
  border: 5px solid transparent; border-top-color: var(--ink); transform: translateY(4px); }
[data-tip]:hover::after, [data-tip]:focus-visible::after,
[data-tip]:hover::before, [data-tip]:focus-visible::before {
  opacity: 1; visibility: visible; transform: translateY(0); }

/* intro */
.intro { display: flex; flex-direction: column; gap: 22px; margin-top: 42px; }
.introtop { display: flex; align-items: center; gap: 22px; flex-wrap: wrap; }
.intro h1 { font-size: clamp(26px, 4.4vw, 40px); font-weight: 700; letter-spacing: -.02em; line-height: 1.08; }
button {
  font-family: var(--sans); font-size: 12px; background: var(--paper); color: var(--ink);
  border: 1px solid var(--ink); border-radius: 0; padding: 6px 14px; cursor: pointer;
  text-transform: uppercase; letter-spacing: .1em;
}
button:hover { background: var(--ink); color: var(--paper); }
button:disabled { opacity: .4; cursor: default; }
button:disabled:hover { background: var(--paper); color: var(--ink); }
button:focus-visible, a:focus-visible { outline: 2px solid var(--ink); outline-offset: 1px; }
.runall { margin: 0; display: flex; gap: 12px; align-items: center; font-size: 12.5px; flex-wrap: wrap; }
#globalstat { color: var(--mid); }

/* stat strip — the 10-second story, sat next to the title; numbers are the copy */
.strip { display: flex; gap: 32px; flex-wrap: wrap; align-items: baseline; }
.intro .strip { margin: 0; border: 0; padding: 0; }
.stat { display: flex; flex-direction: column; gap: 3px; }
.stat b { font-size: 26px; font-weight: 700; letter-spacing: -.01em; line-height: 1; font-variant-numeric: tabular-nums; }
.stat span { font-size: 10.5px; text-transform: uppercase; letter-spacing: .12em; color: var(--mid); }

/* bar rows */
.row { display: grid; grid-template-columns: 220px 1fr 120px; gap: 0 14px; align-items: center; padding: 3.5px 0; font-size: 12.5px; }
.row .lab { text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row .lab .sub { color: var(--mid); font-size: 11px; margin-left: 6px; }
.row .val { font-family: var(--mono); font-size: 11.5px; white-space: nowrap; }
.bar { height: 15px; position: relative; background: transparent; }
.bar i { position: absolute; inset: 0 auto 0 0; border: 1px solid var(--ink); background: var(--paper); min-width: 2px; }
.bar i.solid { background: var(--ink); }
.bar i.diff { border-color: var(--red); }
.bar .cut { position: absolute; right: 8px; top: 0; bottom: 0; width: 7px; background: var(--paper);
  border-left: 1px solid var(--ink); border-right: 1px solid var(--ink); transform: skewX(-20deg); }
.row.strong .lab, .row.strong .val { font-weight: 700; }
.row .par { font-family: var(--mono); font-size: 10px; color: var(--red); margin-left: 6px; }
.bandlab { font-size: 10.5px; text-transform: uppercase; letter-spacing: .14em; color: var(--mid); margin: 14px 0 4px; }
.subdiv { font-size: 10.5px; text-transform: uppercase; letter-spacing: .14em; color: var(--mid); margin: 12px 0 4px; }

/* per-case cards */
.chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
.chips button { padding: 4px 10px; font-size: 10.5px; }
.chips button.on { background: var(--ink); color: var(--paper); }
.cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(430px, 1fr)); gap: 40px 38px; }
.card h3 { font-size: 13px; font-weight: 700; display: flex; align-items: baseline; gap: 10px; margin-bottom: 14px; }
.card h3 .fam { font-weight: 400; font-size: 10px; text-transform: uppercase; letter-spacing: .12em; color: var(--mid); }
.card h3 .fam[data-tip] { text-decoration: underline dotted var(--faint); text-underline-offset: 3px; }
.card h3 .size { font-family: var(--mono); font-weight: 400; font-size: 10.5px; color: var(--mid); }
.card h3 .play { display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; font-weight: 400; letter-spacing: .02em;
  text-transform: none; text-decoration: none; border: 0; padding: 0; cursor: pointer; background: none; color: var(--mid); }
.card h3 .play ~ .play { margin-left: 10px; }
.card h3 .play .ico { display: block; }
.card h3 .play:hover { background: none; color: var(--ink); }
.card .row { grid-template-columns: 124px 1fr 132px; font-size: 11.5px; padding: 2.5px 0; }
.card .bar { height: 12px; }

@media (max-width: 640px) {
  .row, .card .row { grid-template-columns: 1fr max-content; gap: 0 10px; }
  .row .lab, .card .row .lab { grid-column: 1 / -1; text-align: left; }
  .row .val { font-size: 10.5px; }
  .cards { grid-template-columns: 1fr; }
  .strip { gap: 26px; }
}
</style>
</head>
<body>

<header>
  <h1 class="wordmark" style="font-size:19px"><span class="mark">JZ</span><span class="sub">bench</span></h1>
  <nav>
    <a href="../repl/">repl</a>
    <a href="../examples/">examples</a>
    <a class="gh" href="https://github.com/dy/jz" aria-label="jz on GitHub">
      <svg viewBox="0 0 16 16" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
    </a>
  </nav>
</header>

<main>

<div class="intro">
  <div class="introtop">
    <h1>Benchmark</h1>
    <div class="runall">
      <button id="runAll">▶ run</button>
      <span id="globalstat"></span>
    </div>
  </div>
  <div class="strip" id="strip" hidden></div>
</div>

<section id="speed">
  <h2>Corpus</h2>
  <div id="geomean"></div>
</section>

<section id="cases">
  <h2>Per case</h2>
  <div class="chips" id="chips"></div>
  <div class="cards" id="cards"></div>
</section>

<section id="about">
  <p class="dim" id="outro">loading…</p>
</section>

</main>

<noscript><p style="padding:0 32px">This page renders measured data with JavaScript — the raw snapshot is <a href="results.json">results.json</a>.</p></noscript>

<script type="module">
const $ = id => document.getElementById(id)

// ── targets: band = which question the row answers ──────────────────────────
// js: "is compiling worth it at all?"  wasm: "is jz the best JS→wasm route?"
// native: "what do I give up by not rewriting?"  interp: "why not embed an engine?"
// Invocation details live in the methodology table, not in row labels.
const BANDS = [
  ['js', 'JS'],
  ['wasm', 'JS -> WASM'],
  ['native', 'Native (Reference only)'],
  ['interp', 'Interpreter (Reference only)'],
]
const TARGETS = {
  v8:    { label: 'Node', band: 'js' },
  deno:  { label: 'Deno', band: 'js' },
  bun:   { label: 'Bun', band: 'js' },
  spidermonkey: { label: 'SpiderMonkey', band: 'js', hatch: true },
  graaljs: { label: 'GraalJS', band: 'js', hatch: true },
  jz:    { label: 'JZ', band: 'wasm', strong: true },
  wat:   { label: 'hand-WAT', band: 'wasm', hatch: true },
  'jz-wasmtime': { label: 'JZ', sub: 'wasmtime', band: 'wasm', hatch: true },
  as:    { label: 'AssemblyScript', band: 'wasm' },
  porf:  { label: 'Porffor', band: 'wasm' },
  jawsm: { label: 'jawsm', band: 'wasm' },
  javy:  { label: 'Javy', sub: 'QuickJS in wasm', band: 'wasm', hatch: true },
  'jz-w2c': { label: 'JZ', sub: 'wasm2c', band: 'native', hatch: true },
  nat:   { label: 'C', band: 'native', hatch: true },
  natgcc:{ label: 'C', sub: 'gcc', band: 'native', hatch: true },
  rust:  { label: 'Rust', band: 'native', hatch: true },
  zig:   { label: 'Zig', band: 'native', hatch: true },
  go:    { label: 'Go', band: 'native', hatch: true },
  shermes: { label: 'Static Hermes', band: 'native', hatch: true },
  numpy: { label: 'NumPy', band: 'native', hatch: true },
  python:{ label: 'CPython', band: 'interp', hatch: true },
  hermes:{ label: 'Hermes', band: 'interp', hatch: true },
  qjs:   { label: 'QuickJS', band: 'interp', hatch: true },
}
const BREAK = 12      // linear bars; rows past this are cut, number printed
const MULTI = new Set(['watr', 'jessie', 'jz'])   // multi-module sources — repl can't load them
// idiomatic glyphs: play triangle for the repl, code chevrons for source
const ICO = {
  play: `<svg class="ico" viewBox="0 0 12 12" width="9" height="9" aria-hidden="true"><path fill="currentColor" d="M2.5 1.3v9.4l7-4.7z"/></svg>`,
  code: `<svg class="ico" viewBox="0 0 16 12" width="13" height="10" aria-hidden="true"><path fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" d="M5 3.2 1.5 6 5 8.8M11 3.2 14.5 6 11 8.8"/></svg>`,
}

const FAMILY = { biquad: 'numeric', mat4: 'numeric', poly: 'numeric', bitwise: 'numeric', dotprod: 'numeric',
  mandelbrot: 'numeric', sort: 'numeric', crc32: 'numeric', tokenizer: 'string', json: 'string',
  callback: 'alloc', aos: 'alloc', watr: 'compiler', jessie: 'compiler', jz: 'compiler' }
const TAGS = { biquad: 'dsp · f64', mat4: 'simd · f64', poly: 'typed dispatch', bitwise: 'i32', dotprod: 'dot · simd',
  tokenizer: 'string scan', callback: 'closure · alloc', aos: 'layout · alloc',
  mandelbrot: 'f64 · branch', json: 'parse', sort: 'i32 · calls', crc32: 'i32 · lut',
  watr: 'compiler on itself', jessie: 'parser', jz: 'self-host' }
// one-line case description — surfaced as the tag's hover tooltip
const INSIGHTS = {
  biquad: 'IIR cascade — every sample depends on the previous, SIMD can’t help; raw f64 loop throughput.',
  mat4: 'Fixed-count loops unroll and vectorize to v128 — a JIT won’t do this from plain JS.',
  poly: 'One sum() fed Float64Array then Int32Array — JZ keeps two typed paths where a JIT goes polymorphic.',
  dotprod: 'Multiply-accumulate reduction (s += a[i]*b[i]) — JZ vectorizes to 4 independent SIMD accumulators, a deterministic reassociation that hides FP latency and stays bit-stable across engines.',
  bitwise: 'imul / shift / >>> chains run as raw i32 — no NaN-box round-trips.',
  tokenizer: 'Byte scan: charCodeAt + branches. AS’s direct string loads win — JZ still boxes the string pointer.',
  callback: 'Array.map with a closure lowers to a preallocated typed loop — no per-call allocation.',
  aos: 'Object rows copied into typed columns — memory-bound; schema fields read at fixed offsets.',
  mandelbrot: 'f64 escape loop with a data-dependent break — everything compiled lands within ~10%.',
  json: 'Runtime JSON.parse specialized to the literal’s stable shape.',
  sort: 'In-place heapsort — call-heavy nested loops, indices provably i32.',
  crc32: 'Table-driven byte CRC — serially-dependent LUT chain, 2 loads + 4 ALU per byte.',
  watr: 'JZ compiling its own WAT assembler — 200 kB of branchy compiler code.',
  jessie: 'The jessie parser JZ itself builds on — recursion- and allocation-heavy.',
  jz: 'jz.wasm — the compiler compiled by itself — compiling JavaScript, byte-identical to every engine row.',
}
// detected visitor engine
const ENGINE = (() => {
  const ua = navigator.userAgent
  if (/firefox/i.test(ua)) return 'SpiderMonkey'
  if (/safari/i.test(ua) && !/chrome|chromium|edg/i.test(ua)) return 'JavaScriptCore'
  return 'V8'
})()

// ── data ─────────────────────────────────────────────────────────────────────
let DATA = null
let CORPUS = []     // cases with a jz row — geomeans, stats
let CASES = []      // all cases — the per-case grid
const local = {}    // caseId → { js, jzwasm }
let filter = 'all'

const fmtMs = us => us >= 100000 ? (us / 1000).toFixed(0) + ' ms' : us >= 1000 ? (us / 1000).toFixed(2) + ' ms' : us + ' µs'
const fmtB = b => b == null ? '' : b < 1024 ? b + ' B' : (b / 1024).toFixed(1) + ' kB'
const fmtX = x => x >= 100 ? x.toFixed(0) + '×' : x >= 10 ? x.toFixed(1) + '×' : x.toFixed(2) + '×'
const esc = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;')
const geo = xs => Math.exp(xs.reduce((s, x) => s + Math.log(x), 0) / xs.length)
const median = xs => { const a = [...xs].sort((x, y) => x - y); return a.length ? (a[a.length >> 1] + a[(a.length - 1) >> 1]) / 2 : null }
const nCases = n => `${n} case${n === 1 ? '' : 's'}`

// Linear, zero-based bars; rows past BREAK× the chart anchor are cut (full bar
// + cut glyph) with the exact number printed. maxLin = largest uncut ratio.
const rowHtml = ({ label, sub, rel, maxLin, text, solid, strong, parity }) => {
  const cut = rel > BREAK
  const w = cut ? 100 : (rel / maxLin * 100)
  return `<div class="row${strong ? ' strong' : ''}">
    <span class="lab">${esc(label)}${sub ? `<span class="sub">${esc(sub)}</span>` : ''}</span>
    <span class="bar"><i class="${solid ? 'solid' : ''}${parity === 'DIFF' ? ' diff' : ''}" style="width:${w.toFixed(2)}%"></i>${cut ? '<span class="cut"></span>' : ''}</span>
    <span class="val">${esc(text)}${parity === 'DIFF' ? '<span class="par">DIFF</span>' : ''}</span>
  </div>`
}

// ── headline: banded geomeans, normalized to the fastest row ─────────────────
const geoRatio = tid => {
  const rs = []
  for (const c of CORPUS) {
    const r = c.targets[tid], j = c.targets.jz
    if (r && j && r.parity !== 'DIFF') rs.push(r.medianUs / j.medianUs)
  }
  return rs.length ? { geo: geo(rs), n: rs.length } : null
}

// your-machine geomean: your browser's JS vs the JZ artifact, normalized to JZ.
const localGeo = () => {
  const rs = []
  for (const r of Object.values(local))
    if (r.js?.medianUs && r.jzwasm?.medianUs && r.js.parity !== 'DIFF') rs.push(r.js.medianUs / r.jzwasm.medianUs)
  return rs.length ? { label: 'JS', sub: nCases(rs.length), geo: geo(rs) } : null
}

const renderGeomean = () => {
  const rows = []
  for (const [band] of BANDS)
    for (const [tid, t] of Object.entries(TARGETS)) {
      if (t.band !== band) continue
      const g = geoRatio(tid)
      if (g) rows.push({ tid, band, ...t, ...g })
    }
  const min = Math.min(...rows.map(r => r.geo))
  const yours = localGeo()
  const rels = rows.map(r => r.geo / min).concat(yours ? [1, yours.geo] : [])
  const maxLin = Math.max(...rels.filter(r => r <= BREAK), 1)
  let html = ''
  for (const [band, lab] of BANDS) {
    const bandRows = rows.filter(r => r.band === band).sort((a, b) => a.geo - b.geo)
    if (!bandRows.length) continue
    html += `<div class="bandlab">${lab}</div>`
    for (const r of bandRows)
      html += rowHtml({ label: r.label, sub: `${r.sub ? r.sub + ' · ' : ''}${nCases(r.n)}`,
        rel: r.geo / min, maxLin, text: fmtX(r.geo / min), solid: r.strong, strong: r.strong })
  }
  if (yours) {
    html += `<div class="subdiv">JZ (your machine)</div>`
    const yr = [{ label: 'JZ', sub: yours.sub, geo: 1, solid: true, strong: true }, { label: yours.label, geo: yours.geo }]
    for (const r of yr)
      html += rowHtml({ label: r.label, sub: r.sub, rel: r.geo, maxLin, text: fmtX(r.geo), solid: r.solid, strong: r.strong })
  }
  $('geomean').innerHTML = html
}

// ── stat strip ───────────────────────────────────────────────────────────────
const SYS_NATIVE = ['nat', 'natgcc', 'rust', 'zig', 'go']
const JS_ENGINE = { v8: 'V8', deno: 'Deno', bun: 'Bun', spidermonkey: 'SpiderMonkey', graaljs: 'GraalJS' }
const renderStrip = () => {
  const cells = []
  // perf vs each JS engine present (geomean of jz's per-case speedup); higher = jz faster
  for (const [tid, t] of Object.entries(TARGETS)) {
    if (t.band !== 'js') continue
    const g = geoRatio(tid)
    const eng = JS_ENGINE[tid] || t.label
    if (g) cells.push({ big: fmtX(g.geo), lab: `${eng} perf`, tip: `jz runs ${fmtX(g.geo)} the speed of ${eng} — geomean over ${g.n} cases` })
  }
  // near-native: geomean of best-native / jz; ~1× means jz matches the native binary
  const nat = []
  for (const c of CORPUS) {
    const best = Math.min(...SYS_NATIVE.map(t => c.targets[t]?.parity !== 'DIFF' && c.targets[t]?.medianUs || Infinity))
    if (best < Infinity) nat.push(best / c.targets.jz.medianUs)
  }
  // median, not geomean: the distribution is bimodal — jz beats strict-FP native
  // only on auto-vectorized reductions (dotprod, poly), so a geomean would let
  // those two outliers falsely imply parity. Median = the typical case.
  if (nat.length) cells.push({ big: fmtX(median(nat)), lab: 'native perf', tip: `jz vs the fastest native binary (C/Rust/Go), median of ${nat.length} cases — native is the floor; jz only pulls ahead on auto-vectorized FP reductions where strict-fp native can't reassociate` })
  // size: jz's .wasm vs AssemblyScript's .wasm — the only apples-to-apples size
  // comparison (binary vs binary, same kernels). A vs-".js-source" ratio would
  // compare a binary to commented, unminified text, so it's intentionally omitted.
  const shared = CORPUS.filter(c => c.targets.jz?.bytes && c.targets.as?.bytes)
  if (shared.length) {
    const r = geo(shared.map(c => c.targets.jz.bytes)) / geo(shared.map(c => c.targets.as.bytes))
    cells.push({ big: fmtX(r), lab: 'AS size', tip: `jz's compiled .wasm vs AssemblyScript's .wasm, same kernels — geomean over ${shared.length} cases (≈1× = same size)` })
  }
  $('strip').innerHTML = cells.map(c => `<div class="stat"${c.tip ? ` tabindex="0" data-tip="${esc(c.tip)}"` : ''}><b>${c.big}</b><span>${c.lab}</span></div>`).join('')
  $('strip').hidden = false
}

// ── per-case cards ───────────────────────────────────────────────────────────
const CHIPS = ['all', 'numeric', 'string', 'alloc', 'compiler']
const renderChips = () => {
  $('chips').innerHTML = CHIPS.map(f =>
    `<button data-f="${f}" class="${filter === f ? 'on' : ''}">${f}</button>`).join('')
}

const cardRows = c => {
  const entries = Object.entries(c.targets).filter(([tid]) => TARGETS[tid])
    .map(([tid, r]) => ({ tid, ...TARGETS[tid], ...r })).sort((a, b) => a.medianUs - b.medianUs)
  // bar anchor: fastest browser-class row, so a freak-fast native row (zlib crc32)
  // can't crush the scale; printed ratios stay vs the true fastest
  const ok = entries.filter(r => r.parity !== 'DIFF')
  const anchor = Math.min(...ok.filter(r => !r.hatch).map(r => r.medianUs), Infinity)
  const base = anchor < Infinity ? anchor : ok[0].medianUs
  const fastest = ok[0].medianUs
  // your-machine rows, normalized to their own fastest (different machine, different µs)
  const l = local[c.id]
  const lrows = l && (l.js || l.jzwasm)
    ? [['jzwasm', 'JZ'], ['js', 'JS']].filter(([k]) => l[k]?.medianUs).map(([k, label]) => ({ k, label, ...l[k] }))
    : []
  const lbase = lrows.length ? Math.min(...lrows.map(r => r.medianUs)) : 1
  // one shared scale across reference + local rows, so an equal ratio is an equal
  // bar length everywhere in the card (each ratio is relative to its group's fastest)
  const maxLin = Math.max(...[...entries.map(r => r.medianUs / base), ...lrows.map(r => r.medianUs / lbase)].filter(r => r <= BREAK), 1)
  let html = entries.map(r => rowHtml({
    label: r.label, sub: r.sub, rel: r.medianUs / base, maxLin,
    text: `${fmtMs(r.medianUs)} · ${fmtX(r.medianUs / fastest)}`, solid: r.strong, strong: r.strong, parity: r.parity,
  })).join('')
  if (lrows.length) {
    html += `<div class="subdiv">JZ (your machine)</div>`
    for (const r of lrows)
      html += rowHtml({ label: r.label, sub: '',
        rel: r.medianUs / lbase, maxLin,
        text: `${fmtMs(r.medianUs)} · ${fmtX(r.medianUs / lbase)}`, solid: r.k === 'jzwasm', parity: r.parity })
  }
  return html
}

const renderCards = () => {
  let html = ''
  for (const c of CASES) {
    if (filter !== 'all' && FAMILY[c.id] !== filter) continue
    const srcLink = `<a class="play" href="https://github.com/dy/jz/tree/main/bench/${c.id}" target="_blank" rel="noopener" aria-label="source on GitHub">${ICO.code}src</a>`
    const play = MULTI.has(c.id)   // multi-module sources can't load in the repl
      ? srcLink
      : `<button class="play" data-play="${c.id}" aria-label="open this kernel in the repl">${ICO.play}repl</button>${srcLink}`
    const sz = c.targets.jz?.bytes
    html += `<div class="card" data-cid="${c.id}">
      <h3>${esc(c.id)}${play}<span class="fam"${INSIGHTS[c.id] ? ` tabindex="0" data-tip="${esc(INSIGHTS[c.id])}"` : ''}>${esc(TAGS[c.id] || '')}</span>${sz ? `<span class="size" tabindex="0" data-tip="JZ-compiled .wasm over the wire">${fmtB(sz)}</span>` : ''}</h3>
      ${cardRows(c)}
    </div>`
  }
  $('cards').innerHTML = html
}

$('chips').addEventListener('click', e => {
  const f = e.target.dataset?.f
  if (!f) return
  filter = f; renderChips(); renderCards()
})
$('cards').addEventListener('click', async e => {
  const cid = e.target.dataset?.play
  if (!cid) return
  try {
    // repl has no module resolution — inline the benchlib harness, same flat
    // transform bench.mjs uses for shell targets
    let src = await fetchText(`./${cid}/${cid}.js`)
    if (src.includes('../_lib/benchlib.js')) {
      const lib = await fetchText('./_lib/benchlib.js')
      src = lib.replace(/\bexport let\b/g, 'let') + '\n' +
        src.replace(/import\s+\{[^}]+\}\s+from\s+['"]\.\.\/_lib\/benchlib\.js['"]\s*\n?/g, '')
    }
    window.open('../repl/#' + b64url(src), '_blank')
  } catch {}
})

// ── outro: reference machine + pointer to the repo ───────────────────────────
const renderMeta = () => {
  const m = DATA.meta
  $('outro').innerHTML =
    `Reference: ${esc(m.host.cpu)} · ${esc(m.date)} · <a href="https://github.com/dy/jz/commit/${esc(m.commit)}"><code>${esc(m.commit)}</code></a> · ` +
    `<a href="results.json"><code>results.json</code></a>.`
}

// ── live runner ──────────────────────────────────────────────────────────────
// checksum may print signed from jz (documented `x >>> 0` i32-narrowing) —
// parse either sign, compare modulo 2³²
const PROTO = /median_us=(\d+) checksum=(-?\d+)/
const captureLine = async fn => {
  let line = null
  const orig = console.log
  console.log = (...a) => { const s = a.join(' '); if (PROTO.test(s)) line = s; else orig(...a) }
  try { await fn() } finally { console.log = orig }
  const m = line && line.match(PROTO)
  if (!m) throw new Error('no result line')
  return { medianUs: +m[1], checksum: +m[2] }
}

let interopMod = null
const loadInterop = async () => interopMod ||= await import('../dist/interop.js')

const fetchText = async p => {
  const r = await fetch(p)
  if (!r.ok) throw new Error('fetch ' + p)
  return r.text()
}
let runSeq = 0
const RUNNERS = {
  js: async cid => captureLine(async () => {
    const m = await import(`./${cid}/${cid}.js?r=${++runSeq}`)   // fresh module record per run
    m.main()
  }),
  jzwasm: async cid => {
    const res = await fetch(`./web/${cid}.wasm`)
    if (!res.ok) throw new Error('no artifact')
    const bytes = new Uint8Array(await res.arrayBuffer())
    const { instantiate } = await loadInterop()
    return captureLine(async () => {
      const { exports } = await instantiate(bytes)
      exports.main()
    })
  },
}

const renderAll = () => { renderStrip(); renderGeomean(); renderCards() }

const runCase = async cid => {
  local[cid] ||= {}
  const ref = DATA.cases[cid]?.ref
  for (const key of ['js', 'jzwasm']) {
    try {
      const r = await RUNNERS[key](cid)
      r.parity = ref == null || (r.checksum >>> 0) === (ref >>> 0) ? 'ok' : 'DIFF'
      local[cid][key] = r
      renderAll()
      await new Promise(res => setTimeout(res, 30))   // let the bars paint
    } catch (e) {
      local[cid][key] = null
      if (key !== 'jzwasm') console.warn(`${cid}/${key}:`, e)
    }
  }
  renderAll()
}

$('runAll').addEventListener('click', async () => {
  $('runAll').disabled = true
  for (let i = 0; i < CORPUS.length; i++) {
    $('globalstat').textContent = `${i + 1}/${CORPUS.length} — ${CORPUS[i].id}`
    await runCase(CORPUS[i].id)
  }
  $('globalstat').textContent = 'done'
  $('runAll').disabled = false
})

// repl deep-link encoder (per-case "repl →" buttons)
const b64url = s => btoa(String.fromCharCode(...new TextEncoder().encode(s))).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '')

// ── boot ─────────────────────────────────────────────────────────────────────
try {
  DATA = await fetch('./results.json').then(r => { if (!r.ok) throw 0; return r.json() })
  const all = Object.entries(DATA.cases).map(([id, c]) => ({ id, ...c }))
  CORPUS = all.filter(c => c.targets.jz)
  CASES = CORPUS.concat(all.filter(c => !c.targets.jz))
  renderMeta(); renderChips(); renderAll()
} catch {
  $('geomean').innerHTML = '<p class="dim">No <code>results.json</code> yet — run <code>node bench/bench.mjs --json</code> to generate the snapshot.</p>'
}
</script>
</body>
</html>
