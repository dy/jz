<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>jz repl — JS → WASM, compiled in your browser</title>
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon">
<style>
/* ── Swiss / International Typographic Style: paper-white, black ink, geometric sans ── */
/* Jost (libre Futura) self-hosted — geometric fallback where Futura isn't installed */
@font-face {
  font-family: Jost; font-style: normal; font-weight: 100 900; font-display: swap;
  src: url(../examples/lib/jost.woff2) format('woff2');
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sans: Futura, 'Futura PT', 'Avant Garde', 'ITC Avant Garde Gothic Std', 'Century Gothic', Jost, 'Helvetica Neue', sans-serif;
  --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  --ink: #000; --paper: #fff; --mid: #757575; --soft: #595959; --faint: #e8e8e8;
  --band: #0a0a0a;
  --padx: 32px;
}
html, body { height: 100%; }
body {
  background: var(--paper); color: var(--ink);
  font-family: var(--sans);
  display: flex; flex-direction: column; overflow: hidden;
  -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
}

/* ── masthead (dark): brand + site nav only — no working controls here ── */
header {
  background: var(--band); color: var(--paper);
  display: flex; align-items: center;
  padding: 14px var(--padx);
}
.wordmark { font-size: 19px; font-weight: 400; letter-spacing: -.02em; line-height: 1; }
.wordmark .mark { font-weight: 700; color: #fff; }
.wordmark .sub  { font-weight: 400; color: #8a8a8a; margin-left: .45em; }
header nav { margin-left: auto; display: flex; align-items: center; gap: 22px; }
header nav a { color: #fff; opacity: .7; text-decoration: none; font-size: 12px;
  text-transform: uppercase; letter-spacing: .14em; transition: opacity .18s; }
header nav a:hover { opacity: 1; }
header .gh { display: flex; }

/* ── no toolbar: controls float over their own pane, in the top corners ── */
/* source (light): preset · opt (left) · ⚙ settings hamburger (right) */
.srcbar { position: absolute; top: 0; left: 0; right: 0; z-index: 3;
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 14px 8px var(--padx); background: var(--paper); color: var(--ink);
  pointer-events: none; }
.srcbar > * { pointer-events: auto; }
.controls { display: flex; align-items: center; gap: 11px; }
.optlabel { display: flex; align-items: center; gap: 9px; }
.optlabel > span { text-transform: uppercase; letter-spacing: .12em; font-size: 10.5px; color: var(--mid); }

/* wat (dark): module size · ↓wasm, top-right corner */
.watbar { position: absolute; top: 0; right: 0; z-index: 3;
  display: flex; align-items: center; gap: 14px;
  padding: 9px 16px 9px 14px; color: #c2c2c2; background: var(--bg); }
#stat { display: inline-flex; align-items: center; white-space: nowrap; color: inherit; font-size: 12px; }
#stat .err { font-weight: 700; color: #ff6b6b; }
.badge { display: inline-block; border: 1px solid #6a6a6a; color: #ddd; font-size: 9.5px; font-weight: 700;
  letter-spacing: .1em; padding: 1px 5px; vertical-align: 1px; margin-left: 8px; }

/* form controls */
select {
  font-family: var(--sans); font-size: 12px;
  background: var(--paper); color: var(--ink);
  border: 1px solid var(--ink); border-radius: 0; padding: 4px 7px; cursor: pointer;
}
/* the hidden "preset" placeholder reads as a hint, not a real selection */
#preset:has(option[value=""]:checked) { color: var(--mid); }
select:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible { outline: 2px solid var(--ink); outline-offset: -1px; }

/* icons (wasm · settings) — inherit the pane's ink/light color, fade until hover */
.ico { display: inline-flex; align-items: center; gap: 5px; padding: 0; border: 0;
  background: transparent; color: inherit; opacity: .62; cursor: pointer; font: inherit; transition: opacity .18s; }
.ico:hover { opacity: 1; }
.ico.wasm { font-size: 11px; text-transform: uppercase; letter-spacing: .12em; }

.check { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
.check input { appearance: none; width: 13px; height: 13px; border: 1px solid var(--ink); cursor: pointer; }
.check input:checked { background: var(--ink); box-shadow: inset 0 0 0 2px var(--paper); }

/* ── ⚙ compile-options popover: strict · names (room to grow) ── */
.gear { position: relative; display: flex; }
.menu {
  position: absolute; right: 0; top: calc(100% + 10px); z-index: 10;
  display: flex; flex-direction: column; gap: 11px;
  min-width: 170px; padding: 13px 15px;
  background: var(--paper); color: var(--ink); border: 1px solid var(--ink);
}
.menu[hidden] { display: none; }
.menu label { text-transform: uppercase; letter-spacing: .12em; font-size: 10.5px; color: var(--mid); }
.menu .check { justify-content: flex-start; gap: 8px; color: var(--ink); }

/* ── main split ── */
main { flex: 1; display: flex; min-height: 0; }
.pane { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.code { position: relative; }
#editor, #hl {
  position: absolute; inset: 0; margin: 0; padding: 46px var(--padx) 16px;
  font: 13px/1.55 var(--mono); tab-size: 2; white-space: pre;
  border: 0; background: transparent;
}
#editor {
  resize: none; overflow: auto;
  color: transparent; caret-color: var(--ink); z-index: 1;
}
#editor:focus, #editor:focus-visible { outline: none; }   /* the caret shows focus — a ring adds nothing */
#editor::selection { background: rgba(0, 0, 0, .14); }
#hl { overflow: hidden; pointer-events: none; color: var(--ink); }
/* monochrome syntax: weight + gray steps, no hue (all ≥ 4.5:1 on paper) */
#hl .k { font-weight: 700; }                      /* keyword */
#hl .t { font-weight: 600; }                      /* Type / builtin */
#hl .n { font-weight: 600; color: #3a3a3a; }      /* number */
#hl .s { color: var(--soft); }                    /* string */
#hl .c { color: var(--mid); }                     /* comment */
/* the page's only hue: semantic red, compile-error position */
#hl .e { text-decoration: underline wavy #c00 2px; text-underline-offset: 3px; }
/* right pane = a dark "terminal": WAT (top) over the console (bottom).
   every terminal color lives in these vars — flip them to return to light. */
.right {
  --bg: #0b0b0b; --fg: #d4d4d4; --dim: #7c7c7c; --bright: #fff; --line: #242424; --input: #161616;
  position: relative;
  border-left: 1px solid var(--ink); display: flex; flex-direction: column; min-height: 0;
  background: var(--bg); color: var(--fg);
}
.console { flex: 1 1 0; min-height: 0; display: flex; flex-direction: column; border-top: 1px solid var(--line); }

/* wat (top of the split) — a touch taller than the console; it runs longer */
#wat { flex: 1.6 1 0; min-height: 0; overflow: auto; padding: 14px var(--padx) 14px 16px; font: 11.5px/1.5 var(--mono); white-space: pre; color: #b3b3b3; }

/* output console (bottom of the split) — tight left gutter, terminal-style */
#out { flex: 1; min-height: 0; overflow: auto; padding: 14px var(--padx) 14px 16px; font: 12.5px/1.6 var(--mono); }
#out div { white-space: pre-wrap; word-break: break-word; }
#out .sys { color: var(--dim); }                       /* "compiled in N ms" — CLI status */
#out .sys::before { content: '✓ '; }
#out .in { color: var(--dim); }                        /* echoed input */
#out .in::before { content: '❯ '; }
#out .res { font-weight: 700; color: var(--bright); }  /* eval result */
#out .log { color: var(--fg); }
#out .log::before { content: '· '; color: var(--dim); }
#out .err { font-weight: 700; color: #ff6b6b; }        /* the one hue: error red */
#out .err::before { content: '✗ '; }
#out .note { color: var(--dim); }
#out a { color: inherit; }
#out .rule { border-top: 1px solid var(--line); margin: 8px 0; }

/* js-vs-wasm result table */
.bench { border-collapse: collapse; margin: 4px 0 2px; font: 12px/1.55 var(--mono); }
.bench th, .bench td { text-align: right; padding: 1px 0 1px 28px; }
.bench th:first-child, .bench td:first-child { text-align: left; padding-left: 0; }
.bench th { color: var(--dim); font-weight: 700; text-transform: uppercase; font-size: 10px; letter-spacing: .12em; }
.bench td { color: var(--fg); }
.bench td:first-child { color: var(--dim); }
.bench .win { color: var(--bright); font-weight: 700; }

/* CLI input — its own faintly-raised band with a bright prompt + caret */
.prompt { display: flex; gap: 10px; align-items: center; padding: 9px 16px;
  background: var(--input); border-top: 1px solid var(--line); }
.prompt .chev { font-family: var(--mono); font-size: 12px; font-weight: 400; line-height: 1; color: var(--bright); }
.prompt input {
  flex: 1; border: 0; font: 13px/1.4 var(--mono); color: var(--bright); background: transparent;
  caret-color: var(--bright); outline-offset: 2px; padding: 2px 0;
}
.prompt input::placeholder { color: #5c5c5c; }
#bench {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--sans); font-size: 11px; letter-spacing: .1em; text-transform: uppercase;
  background: transparent; color: var(--fg); border: 1px solid #3a3a3a; border-radius: 0;
  padding: 4px 9px; cursor: pointer; white-space: nowrap;
}
#bench:hover { background: var(--bright); color: #000; border-color: var(--bright); }

/* thin scrollbars — light editor, dark terminal */
#editor { scrollbar-width: thin; scrollbar-color: #bbb transparent; }
#out, #wat { scrollbar-width: thin; scrollbar-color: #3a3a3a transparent; }
#editor::-webkit-scrollbar, #out::-webkit-scrollbar, #wat::-webkit-scrollbar { width: 8px; height: 8px; }
#editor::-webkit-scrollbar-thumb { background: #ccc; }
#editor::-webkit-scrollbar-thumb:hover { background: #888; }
#out::-webkit-scrollbar-thumb, #wat::-webkit-scrollbar-thumb { background: #333; }
#out::-webkit-scrollbar-thumb:hover, #wat::-webkit-scrollbar-thumb:hover { background: #555; }

@media (max-width: 760px) {
  main { flex-direction: column; }
  .right { border-left: 0; border-top: 1px solid var(--ink); }
  /* ≥ 44px touch targets; 16px input so iOS doesn't zoom on focus */
  select, #bench { padding: 11px 13px; font-size: 14px; }
  .ico { padding: 6px; }
  .prompt input { font-size: 16px; }
  .check input { width: 18px; height: 18px; }
}
</style>
</head>
<body>

<header>
  <h1 class="wordmark"><span class="mark">JZ</span><span class="sub">repl</span></h1>
  <nav>
    <a href="../examples/">examples</a>
    <a href="../bench/">bench</a>
    <a class="gh" href="https://github.com/dy/jz" aria-label="jz on GitHub">
      <svg viewBox="0 0 16 16" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
    </a>
  </nav>
</header>

<main>
  <div class="pane code">
    <div class="srcbar">
      <select id="preset" aria-label="preset"></select>
      <div class="controls">
        <label class="optlabel"><span>opt</span>
          <select id="opt" aria-label="optimization target" title="optimization target">
            <option value="0">none</option>
            <option value="3" selected>speed</option>
            <option value="size">size</option>
          </select>
        </label>
        <div class="gear">
          <button id="settings" class="ico" aria-label="compile options" aria-controls="menu" aria-expanded="false" title="compile options">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
          </button>
          <div id="menu" class="menu" hidden>
            <label class="check"><input type="checkbox" id="strict"> strict</label>
            <label class="check"><input type="checkbox" id="names"> names</label>
          </div>
        </div>
      </div>
    </div>
    <pre id="hl" aria-hidden="true"></pre>
    <textarea id="editor" spellcheck="false" autocomplete="off" autocapitalize="off" aria-label="jz source"></textarea>
  </div>
  <div class="pane right">
    <div class="watbar">
      <span id="stat"></span>
      <button id="dl" class="ico wasm" title="download .wasm" aria-label="download wasm">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
        <span>wasm</span>
      </button>
    </div>
    <pre id="wat"></pre>
    <div class="console">
      <div id="out" aria-live="polite"></div>
      <div class="prompt">
        <span class="chev">❯</span>
        <input id="expr" aria-label="expression to run against the compiled exports" placeholder="call an export — dist(3, 4)" spellcheck="false" autocomplete="off">
        <button id="bench" title="benchmark this call — jz-WASM vs plain JS">
          <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="13" r="8"/><path d="M12 13V9M10 2h4M12 5V2"/></svg>
          bench
        </button>
      </div>
    </div>
  </div>
</main>

<script type="module">
// The whole point: the compiler runs HERE, in the page — parse, type inference,
// WASM emit, instantiate. No server, no build step. (dist/jz.js is the
// standalone bundle — `npm run build` regenerates it.)
import jz, { compile } from '../dist/jz.js'

const $ = id => document.getElementById(id)
const editor = $('editor'), out = $('out'), watEl = $('wat'), stat = $('stat'), expr = $('expr'), hlEl = $('hl')

// ── syntax highlight: one regex, monochrome classes (comment/string/number/keyword/Type) ──
const TOKEN = /(\/\/[^\n]*|\/\*[\s\S]*?\*\/)|('(?:\\.|[^'\\\n])*'?|"(?:\\.|[^"\\\n])*"?|`(?:\\.|[^`\\])*`?)|\b(0[xXbBoO][0-9a-fA-F_]+|\d[\d_]*(?:\.\d+)?(?:[eE][+-]?\d+)?)\b|\b(let|const|var|function|class|new|return|if|else|for|while|do|break|continue|export|import|from|default|try|catch|finally|throw|typeof|instanceof|in|of|switch|case|this|extends|super|static|null|undefined|true|false)\b|\b([A-Z][A-Za-z0-9_]*)\b/g
const TOKEN_CLS = ['c', 's', 'n', 'k', 't']
const highlight = (src) => {
  let html = '', last = 0, m
  TOKEN.lastIndex = 0
  while ((m = TOKEN.exec(src))) {
    html += esc(src.slice(last, m.index))
    const i = m.slice(1).findIndex(g => g !== undefined)
    html += `<span class="${TOKEN_CLS[i]}">${esc(m[0])}</span>`
    last = TOKEN.lastIndex
  }
  return html + esc(src.slice(last))
}
// `errAt` ({line, col}, 1-based) wraps the token at the error position in a
// red-squiggle span. Slicing the source in three keeps character offsets in
// lockstep with the textarea, so the overlay never drifts.
const paint = (errAt = null) => {
  const src = editor.value
  if (!errAt) { hlEl.innerHTML = highlight(src) + '\n'; return }
  const lines = src.split('\n')
  const ln = Math.min(Math.max(errAt.line, 1), lines.length)
  let off = 0
  for (let i = 0; i < ln - 1; i++) off += lines[i].length + 1
  off += Math.min(Math.max(errAt.col - 1, 0), lines[ln - 1].length)
  let tok = src.slice(off).match(/^\S+/)?.[0]
  if (!tok) {            // at line end / EOF — underline the previous char
    if (off > 0) { off -= 1; tok = src[off] === '\n' ? '' : src[off] }
    if (!tok) { hlEl.innerHTML = highlight(src) + '\n'; return }
  }
  hlEl.innerHTML = highlight(src.slice(0, off)) +
    `<span class="e">${highlight(tok)}</span>` +
    highlight(src.slice(off + tok.length)) + '\n'
}
const syncScroll = () => { hlEl.scrollTop = editor.scrollTop; hlEl.scrollLeft = editor.scrollLeft }
editor.addEventListener('scroll', syncScroll)

// ── presets: each one is a use-case ────────────────────────────────────────
const PRESETS = {
  start: {
    name: 'start here',
    expr: 'orbit(100000)',
    src: `// jz — minimal JS that compiles to WASM, on every keystroke.
// Size (top-right) and compile time (console) are real — measured here.
// Call exports from the prompt below — values marshal across.

export let dist = (x, y) => (x*x + y*y) ** 0.5
// ↑ types inferred: f64 — no annotations

export let greet = (name) => 'hello ' + name
// ↑ strings cross the boundary as UTF-8

export let orbit = (n) => {
  let x = 0
  for (let i = 0; i < n; i++) x += Math.sin(i * 0.001) * Math.cos(i * 0.0005)
  return x
}
// ↑ a real workload — hit "js vs wasm" on orbit(100000)

console.log('compiled + instantiated, top-level ran')`,
  },
  simd: {
    name: 'auto-SIMD',
    expr: 'waves(1.5)',
    src: `// Plain loops over typed arrays vectorize to v128 — check the WAT tab
// for f64x2 lanes, and the v128 badge above. Then hit "js vs wasm".

export let waves = (k) => {
  let a = new Float64Array(8192)
  for (let i = 0; i < a.length; i++) a[i] = i * 0.001
  let s = 0
  for (let p = 0; p < 40; p++) {
    for (let i = 0; i < a.length; i++) a[i] = a[i] * 0.9995 + k * 0.001   // ← SIMD map
    for (let i = 0; i < a.length; i++) s += a[i]                          // ← SIMD reduce
  }
  return s
}`,
  },
  plasma: {
    name: 'plasma field',
    expr: 'plasma(1.5)',
    src: `// The classic demoscene plasma — a field of layered sines.
// Transcendental-heavy loops are where AOT wasm beats the JIT.

export let plasma = (t) => {
  let acc = 0
  for (let y = 0; y < 64; y++) {
    for (let x = 0; x < 64; x++) {
      let v = Math.sin(x * 0.12 + t) + Math.sin(y * 0.13 - t)
      v += Math.sin((x + y) * 0.09 + t * 1.3)
      v += Math.cos(x * 0.07 - y * 0.11 + t * 0.5)
      v += Math.sin(Math.sqrt(x*x + y*y) * 0.18 - t * 0.7)
      v += Math.cos(v + t)
      acc += v
    }
  }
  return acc
}`,
  },
  biquad: {
    name: 'audio biquad',
    expr: 'filter(4096)',
    src: `// Audio DSP — 4 cascaded lowpass biquads over a 4096-sample block.
// Recursive filters can't SIMD; jz wins on raw f64 throughput.

export let filter = (n) => {
  let x = new Float64Array(n)
  for (let i = 0; i < n; i++) x[i] = Math.sin(i * 0.3) + Math.sin(i * 1.7) * 0.5
  let b0 = 0.067455, b1 = 0.134911, b2 = 0.067455
  let a1 = -1.142981, a2 = 0.412802
  for (let s = 0; s < 4; s++) {
    let z1 = 0, z2 = 0
    for (let i = 0; i < n; i++) {
      let inp = x[i]
      let out = b0 * inp + z1
      z1 = b1 * inp - a1 * out + z2
      z2 = b2 * inp - a2 * out
      x[i] = out
    }
  }
  let acc = 0
  for (let i = 0; i < n; i++) acc += x[i]
  return acc
}`,
  },
  lint: {
    name: 'the linter',
    expr: 'f(1)',
    src: `// jz lowers legacy JS by default (var, ==, function — see it compile).
// Now tick "strict" above: the canonical subset rejects each legacy
// construct with a pointed error. The language is the linter.

var x = 1

function f(n) {
  if (n == x) return 1
  return 0
}

export { f }`,
  },
}

// ── compile pipeline ────────────────────────────────────────────────────────
const state = { src: '', exports: null, memory: null, bytes: null, wat: '', ok: false }
const opts = () => ({ strict: $('strict').checked, optimize: $('opt').value === 'size' ? 'size' : +$('opt').value, names: $('names').checked })

// pretty size: B under 1k, then kB / MB (SI), trailing zeros trimmed
const fmtB = n =>
  n < 1000 ? n + ' B' :
  n < 1e6  ? +(n / 1000).toFixed(2) + ' kB' :
             +(n / 1e6).toFixed(2) + ' MB'

let buildId = 0
const build = () => {
  const src = editor.value
  const id = ++buildId
  try {
    const o = opts()
    const t0 = performance.now()
    const bytes = compile(src, o)
    const ms = performance.now() - t0
    const logs = capture(() => {
      const { exports, memory } = jz(src, o)        // instantiate — top-level runs
      state.exports = exports; state.memory = memory
    })
    state.src = src; state.bytes = bytes; state.ok = true; state.wat = ''
    stat.textContent = fmtB(bytes.length)        // bar: module size, right by the ↓wasm button
    stat.title = ''
    out.textContent = ''                         // CLI watch-mode: a fresh console each (re)compile
    print('sys', `compiled in ${ms < 1 ? ms.toFixed(2) : ms.toFixed(1)} ms`)
    for (const l of logs) print('log', l)
    // a stale prompt hint (previous preset's export) misleads — point at a real export
    const hinted = expr.placeholder.match(/— (\w+)/)?.[1]
    if (typeof state.exports[hinted] !== 'function') {
      const first = fnExports()[0]
      if (first) expr.placeholder = `call an export — ${first}(…)`
    }
    // WAT (third compile) is always shown in the top split — compute it off the
    // keystroke path so typing stays snappy, then paint it in
    setTimeout(() => {
      if (id !== buildId) return
      try {
        state.wat = compile(src, { ...o, wat: true })
        if (state.wat.includes('v128')) stat.insertAdjacentHTML('beforeend', '<span class="badge">v128</span>')
        watEl.textContent = state.wat
      } catch {}
    }, 0)
    setHash(src)
    paint()                                  // clear a previous error squiggle
  } catch (e) {
    state.ok = false
    const msg = String(e.message || e)
    stat.innerHTML = '<span class="err">✗</span>'   // bar: compact fail marker (full text on hover)
    stat.title = msg
    out.textContent = ''                            // CLI: the compile error IS the console output
    print('err', firstLine(e))
    const at = msg.match(/\bat (\d+):(\d+)/)
    if (at) paint({ line: +at[1], col: +at[2] })
  }
}

// Trailing-throttle the hash write — Safari rate-limits replaceState
// (~100 calls / 30 s); a fast typist at the compile debounce would trip it.
let hashT = 0
const setHash = (src) => {
  clearTimeout(hashT)
  hashT = setTimeout(() => { try { history.replaceState(null, '', '#' + encodeHash(src)) } catch {} }, 800)
}

let deb = 0
editor.addEventListener('input', () => { $('preset').value = ''; paint(); syncScroll(); clearTimeout(deb); deb = setTimeout(build, 250) })
$('strict').addEventListener('change', build)
$('opt').addEventListener('change', build)
$('names').addEventListener('change', build)

// ── output / eval ───────────────────────────────────────────────────────────
const esc = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;')
const firstLine = e => String(e.message || e).split('\n')[0]
const print = (cls, text) => {
  const d = document.createElement('div')
  d.className = cls
  d.textContent = text
  out.appendChild(d)
  out.scrollTop = out.scrollHeight
}
const rule = () => { const d = document.createElement('div'); d.className = 'rule'; out.appendChild(d) }
// render the js-vs-wasm numbers as a compact table; `wins[i]` = the faster column (1=wasm, 2=js)
const benchTable = (rows, wins) => {
  const t = document.createElement('table'); t.className = 'bench'
  rows.forEach((cells, ri) => {
    const tr = document.createElement('tr')
    cells.forEach((c, ci) => {
      const cell = document.createElement(ri ? 'td' : 'th')
      cell.textContent = c
      if (ri && ci === wins[ri - 1]) cell.className = 'win'
      tr.appendChild(cell)
    })
    t.appendChild(tr)
  })
  out.appendChild(t); out.scrollTop = out.scrollHeight
}

// Capture console output during wasm/js execution (default env.print wiring
// routes to console.log/console.error).
const capture = (fn) => {
  const logs = [], { log, error } = console
  console.log = (...a) => logs.push(a.join(' '))
  console.error = (...a) => logs.push(a.join(' '))
  try { fn() } finally { console.log = log; console.error = error }
  return logs
}

const fmt = (v) => {
  if (typeof v === 'number') return Object.is(v, -0) ? '-0' : String(v)
  if (typeof v === 'string') return `'${v}'`
  if (v == null || typeof v === 'boolean') return String(v)
  if (ArrayBuffer.isView(v)) {
    const a = Array.from(v.subarray(0, 8)), tail = v.length > 8 ? `, … ×${v.length}` : ''
    return `${v.constructor.name} [${a.join(', ')}${tail}]`
  }
  try { return JSON.stringify(v) } catch { return String(v) }
}

// Evaluate an expression with the module's exports in scope.
// Function-constructor bodies are sloppy-mode, so `with` is available.
const evalIn = (scope, code) => new Function('$', `with ($) { return (${code}) }`)(scope)

const runExpr = () => {
  const code = expr.value.trim()
  if (!code) return
  if (!state.exports) { print('err', 'nothing compiled yet'); return }
  if (!state.ok) print('note', 'compile error — running the last good module')
  print('in', code)
  try {
    let result
    const logs = capture(() => { result = evalIn(state.exports, code) })
    for (const l of logs) print('log', l)
    print('res', fmt(result))
    state.memory?.reset?.()
  } catch (e) { print('err', firstLine(e)) }
  hist.push(code); hi = hist.length
  expr.value = ''
}

expr.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') runExpr()
  else if (e.key === 'ArrowUp' && hi > 0) { expr.value = hist[--hi]; e.preventDefault() }
  else if (e.key === 'ArrowDown') { hi = Math.min(hist.length, hi + 1); expr.value = hist[hi] || ''; e.preventDefault() }
})
const hist = []; let hi = 0

// ── js vs wasm — same source, two engines, honest numbers ──────────────────
const measure = (fn, after) => {
  // grow batch until it takes ≥60ms, then report ops/s from the largest batch
  let n = 1
  for (;;) {
    const t0 = performance.now()
    for (let i = 0; i < n; i++) fn()
    const dt = performance.now() - t0
    after?.()
    if (dt >= 60) return n / dt * 1000
    n = Math.min(n * 4, n * Math.ceil(80 / Math.max(dt, 0.25)) + 1)
  }
}

const fnExports = () => Object.keys(state.exports || {})
  .filter(k => typeof state.exports[k] === 'function' && !k.startsWith('_'))

$('bench').addEventListener('click', async () => {
  if (!state.exports) { print('err', 'nothing compiled yet'); return }
  // the benched expression is whatever's in the prompt — any call, any export.
  // Empty prompt guesses: the last run expression, else the preset's default
  // (each only if its export still exists in the current module).
  let code = expr.value.trim()
  const callable = (e) => e && typeof state.exports[e.match(/^\w+/)?.[0]] === 'function'
  if (!code) code = [hist[hist.length - 1], $('preset').selectedOptions[0]?.dataset.expr].find(callable) || ''
  if (!code) { print('err', `type a call to bench — exports: ${fnExports().join(', ') || 'none'}`); return }
  if (!state.ok) print('note', 'compile error — benching the last good module')
  print('in', code)
  try {
    // the same source is a valid ES module: import it and run it as plain JS
    const blob = () => URL.createObjectURL(new Blob([state.src], { type: 'text/javascript' }))
    const url = blob()
    let jsMod
    try { jsMod = await import(url) } finally { URL.revokeObjectURL(url) }
    // compile the expression ONCE — a per-iteration `new Function` costs ~µs
    // itself and would drown sub-µs calls / compress every ratio toward 1
    const exprFn = new Function('$', `with ($) { return (${code}) }`)
    const wasmFn = () => exprFn(state.exports)
    const jsFn = () => exprFn(jsMod)
    const wr = wasmFn(), jr = jsFn()
    state.memory?.reset?.()
    // numbers compare with relative epsilon — SIMD reassociates f64 sums, and
    // jz's own sin/cos/exp kernels are ~1e-7-class (drift accumulates in sums)
    const same = typeof wr === 'number' && typeof jr === 'number'
      ? Math.abs(wr - jr) <= 1e-6 * Math.max(Math.abs(wr), Math.abs(jr), 1)
      : fmt(wr) === fmt(jr)
    if (!same) print('note', `results differ — wasm ${fmt(wr)} · js ${fmt(jr)}`)
    // WARM — V8 at full JIT tier-up: interleave engines across rounds, keep medians
    const reset = () => state.memory?.reset?.()
    const ws = [], js_ = []
    for (let r = 0; r < 5; r++) { ws.push(measure(wasmFn, reset)); js_.push(measure(jsFn)) }
    const med = a => a.sort((x, y) => x - y)[a.length >> 1]
    const w = med(ws), j = med(js_)
    const opsFmt = x => x >= 1000 ? Math.round(x).toLocaleString('en-US') : x.toFixed(1)
    // sub-µs calls only time call overhead — say so rather than print a misleading ~1× table
    if (w > 1e6) { print('note', 'call too cheap to compare — bench heavier work, e.g. orbit(100000)'); rule(); return }
    // COLD — first call on fresh copies (jz is machine code at once; JS starts interpreted)
    let wCold, jCold
    if (w < 2e5) {
      const N = Math.min(24, Math.max(12, Math.ceil(w * 0.005)))
      const wasmCopies = [], jsCopies = [], u2 = blob()
      try {
        for (let i = 0; i < N; i++) { wasmCopies.push(jz(state.src, opts()).exports); jsCopies.push(await import(u2 + '#' + i)) }
      } finally { URL.revokeObjectURL(u2) }
      let t0 = performance.now(); for (const e of wasmCopies) exprFn(e); wCold = (performance.now() - t0) / N
      t0 = performance.now(); for (const m of jsCopies) exprFn(m); jCold = (performance.now() - t0) / N
    }
    // table — wasm | js, faster cell highlighted; one-line verdict below
    const msFmt = x => x >= 1 ? x.toFixed(2) + ' ms' : (x * 1000).toFixed(0) + ' µs'
    const rows = [['', 'wasm', 'js'], ['warm', opsFmt(w) + ' ops/s', opsFmt(j) + ' ops/s']]
    const wins = [w >= j ? 1 : 2]
    if (wCold != null) { rows.push(['first call', msFmt(wCold), msFmt(jCold)]); wins.push(wCold <= jCold ? 1 : 2) }
    benchTable(rows, wins)
    const cmp = (r) => r >= 1 ? `wasm ${r.toFixed(2)}×` : `js ${(1 / r).toFixed(2)}×`
    let line = `${cmp(w / j)} faster, warm`
    if (wCold != null) line += ` · ${cmp(jCold / wCold)} on first call`
    print('note', line)
    rule()
  } catch (e) { print('err', firstLine(e)) }
})

// ── presets + download ───────────────────────────────────────────────────────
// first option is the placeholder shown when the editor holds custom (non-preset) code
const phOpt = document.createElement('option')
phOpt.value = ''; phOpt.textContent = 'preset'; phOpt.hidden = true
$('preset').appendChild(phOpt)
for (const [id, p] of Object.entries(PRESETS)) {
  const o = document.createElement('option')
  o.value = id; o.textContent = p.name; o.dataset.expr = p.expr
  $('preset').appendChild(o)
}
const loadPreset = (id) => {
  const p = PRESETS[id]; if (!p) return
  $('preset').value = id
  editor.value = p.src
  paint()
  expr.placeholder = 'call an export — ' + p.expr
  expr.value = ''
  out.textContent = ''
  build()
}
$('preset').addEventListener('change', () => loadPreset($('preset').value))

$('dl').addEventListener('click', () => {
  if (!state.ok || !state.bytes) return
  const a = document.createElement('a')
  a.href = URL.createObjectURL(new Blob([state.bytes], { type: 'application/wasm' }))
  a.download = 'module.wasm'
  a.click()
  URL.revokeObjectURL(a.href)
})

// ── settings popover (⚙) — a disclosure: toggle, click-away, Esc ─────────────
const gear = $('settings'), menu = $('menu')
const closeMenu = () => { menu.hidden = true; gear.setAttribute('aria-expanded', 'false') }
gear.addEventListener('click', (e) => {
  e.stopPropagation()
  menu.hidden = !menu.hidden
  gear.setAttribute('aria-expanded', String(!menu.hidden))
})
menu.addEventListener('click', (e) => e.stopPropagation())   // tweaking a knob keeps it open
document.addEventListener('click', () => { if (!menu.hidden) closeMenu() })
document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && !menu.hidden) { closeMenu(); gear.focus() } })

// ── url hash: #<base64url(source)> ──────────────────────────────────────────
const encodeHash = (src) => {
  const b = new TextEncoder().encode(src)
  let s = ''
  for (let i = 0; i < b.length; i += 8192) s += String.fromCharCode(...b.subarray(i, i + 8192))
  return btoa(s).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '')
}
const decodeHash = (h) => {
  const b = atob(h.replace(/-/g, '+').replace(/_/g, '/'))
  return new TextDecoder().decode(Uint8Array.from(b, c => c.charCodeAt(0)))
}

// editor niceties: Tab = 2 spaces, Cmd/Ctrl+Enter focuses the prompt
editor.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault()
    // execCommand (deprecated but universal) keeps the undo stack intact;
    // direct value surgery would wipe Cmd+Z history on every Tab press
    if (!document.execCommand('insertText', false, '  ')) {
      const { selectionStart: s, selectionEnd: en, value: v } = editor
      editor.value = v.slice(0, s) + '  ' + v.slice(en)
      editor.selectionStart = editor.selectionEnd = s + 2
      editor.dispatchEvent(new Event('input'))
    }
  } else if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) expr.focus()
})

// ── boot ────────────────────────────────────────────────────────────────────
// External hash navigation (pasting a shared link while already here).
// Our own setHash uses replaceState, which never fires hashchange.
addEventListener('hashchange', () => {
  try {
    const src = decodeHash(location.hash.slice(1))
    if (src !== editor.value) { editor.value = src; $('preset').value = ''; paint(); build() }
  } catch {}
})

const h = location.hash.slice(1)
if (h) {
  try {
    const src = decodeHash(h)
    // a reload carries the auto-updated hash — if it's verbatim a preset,
    // keep that preset selected instead of showing a blank select
    const match = Object.keys(PRESETS).find(id => PRESETS[id].src === src)
    if (match) {
      loadPreset(match)
    } else {
      editor.value = src
      $('preset').value = ''   // shared custom code, not a preset → show placeholder
      paint(); build()
    }
  } catch { loadPreset('start') }
} else loadPreset('start')
</script>
</body>
</html>
