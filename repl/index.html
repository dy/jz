<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>jz repl — JS → WASM, compiled in your browser</title>
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon">
<!-- ?embed (the landing iframes this) → drops the masthead and follows the landing's theme: the source
     editor goes dark in the landing's dark theme, stays cassette-gray in light. Same-origin, so we read the
     shared localStorage theme (and the `storage` event live-updates when the landing toggles). -->
<script>(()=>{try{
  const root=document.documentElement
  if(!new URLSearchParams(location.search).has('embed'))return
  root.classList.add('embed')
  const resolve=()=>{let s=null;try{s=localStorage.getItem('theme')}catch(e){}return s||(matchMedia('(prefers-color-scheme: light)').matches?'light':'dark')}
  const apply=()=>{const light=resolve()==='light';root.classList.toggle('embed-light',light);root.classList.toggle('embed-dark',!light)}
  apply()
  addEventListener('storage',e=>{if(e.key==='theme')apply()})
  matchMedia('(prefers-color-scheme: light)').addEventListener('change',apply)
}catch(e){}})()</script>
<style>
/* ── Dark, to match the site (assets/site.css is color-scheme:dark). Geometric sans chrome,
   monospace code; one black REPL — editor (left) over a terminal (right), no white seam. ── */
@font-face {
  font-family: Jost; font-style: normal; font-weight: 100 900; font-display: swap;
  src: url(../assets/jost.woff2) format('woff2');
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --sans: Futura, 'Futura PT', 'Avant Garde', 'ITC Avant Garde Gothic Std', 'Century Gothic', Jost, 'Helvetica Neue', sans-serif;
  --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  /* ── EDITOR THEME (left pane). Light by default — a bright workbench against the dark
     WAT/CLI on the right, which read as the "low-level" output. ?embed flips this whole
     block back to dark (one override) so the landing's dark section stays seamless.
     The right pane (.right) is ALWAYS dark — its colors live in its own var block. ── */
  --ink: #1b1c1e;         /* code text */
  --paper: #d5d8dc;       /* editor / body background — cool, fresh light gray (cassette-like), not stark white */
  --mid: #585b5f;         /* comments */
  --soft: #464a4e;        /* strings */
  --faint: #bbbec2;       /* hairlines (darker than the gray bg so they show) */
  --guide: #adb1b7;       /* nesting guide line */
  --gut-fg: #8a8d91;      /* line numbers */
  --num: #292a2d;         /* number tokens */
  --active: #e1e4e8;      /* active (caret) line — a touch brighter than the gray */
  --sel: rgba(0,0,0,.15); /* selection (light areas) */
  --sb: #b3b6ba;          /* editor scrollbar */
  --err: #c0291f;         /* compile-error squiggle */
  --drop-bg: rgba(213,216,220,.9);
  --code-top: 14px;       /* editor top inset — code starts at the top (logo now lives bottom-left) */
  --band: #000;
  --gutw: 30px;           /* line-number gutter width — recomputed to digit count by renderGutter */
  --lh: 20.15px;          /* code line box (13px × 1.55) — gutter matches it for row alignment */
  --padx: 24px;
  color-scheme: light;    /* editor side; the dark right pane sets its own (below) */
}
html, body { height: 100%; }
body {
  background: var(--paper); color: var(--ink);
  font-family: var(--sans);
  display: flex; overflow: hidden;
  -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
}

/* no masthead — the panes run edge-to-edge. The only brand is the jz logo in the
   top-left corner of the editor (links home); it sits in the editor's top inset,
   aligned with the terminal toolbar opposite it. */
/* the jz mark — a dark tile tucked in the BOTTOM-left corner with an 8px inset (no need to
   shout up top); the code starts at the top. For short kernels it sits in the empty space
   below the code; only a very long paste scrolls under it. */
.brand { position: absolute; left: 8px; bottom: 8px; z-index: 5; display: flex; line-height: 0;
  opacity: .85; transition: opacity .18s; }
.brand:hover { opacity: 1; }
.brand img { display: block; width: 32px; height: 32px; }

/* ── main split: editor (left) · divider · terminal (right) ── */
main { flex: 1; display: flex; min-height: 0; min-width: 0; }   /* min-width:0 lets the column collapse to the viewport on mobile (else the editor lines force its min-content width and the watbar overflows off-screen) */
.pane { min-width: 0; display: flex; flex-direction: column; }
.code { flex: 0 0 var(--lw, 320px); position: relative; overflow: hidden; }   /* editor pane — initial width 320px (the divider/localStorage overrides once dragged) */
.right { flex: 1 1 0; min-height: 0; position: relative; color-scheme: dark;   /* always dark — the "low-level" output side */
  /* every terminal color lives in these vars */
  --bg: #0b0b0b; --fg: #d4d4d4; --dim: #7c7c7c; --bright: #fff; --line: #242424;
  background: var(--bg); color: var(--fg); }

/* draggable seam — 6px grab area, 1px visible line; persisted to localStorage */
.divider { flex: 0 0 6px; position: relative; cursor: col-resize; background: var(--paper);
  align-self: stretch; touch-action: none; }
.divider::before { content: ''; position: absolute; top: 0; bottom: 0; left: 2px; width: 1px;
  background: var(--faint); transition: background .15s; }
.divider:hover::before, .divider.drag::before { background: #3f3f46; }
.divider:focus-visible { outline: 2px solid var(--ink); outline-offset: -2px; }

/* ── editor (left): line-number gutter + indent guides + syntax overlay over a textarea ──
   four stacked layers, all sharing one geometry so the caret, highlight and guides never drift:
   guides (z0) · highlight (z0) · textarea (z1, transparent text + real caret) · gutter (z2). */
#gutter { position: absolute; top: 0; left: 0; bottom: 0; width: var(--gutw); z-index: 2;
  overflow: hidden; pointer-events: none; background: var(--paper); }
#gutter pre { font: 11px/var(--lh) var(--mono); color: var(--gut-fg); text-align: right;
  padding: var(--code-top) 7px 16px 0; will-change: transform; }
#guides, #hl, #editor {
  position: absolute; inset: 0; margin: 0;
  padding: var(--code-top) 16px 16px calc(var(--gutw) + 8px);   /* top inset clears the corner logo */
  font: 13px/1.55 var(--mono); tab-size: 2; white-space: pre; border: 0; background: transparent;
}
#guides { overflow: hidden; pointer-events: none; color: transparent; z-index: 0; }
#guides .ig { display: inline-block; width: 1ch; border-left: 1px solid var(--guide); }
#hl { overflow: hidden; pointer-events: none; color: var(--ink); z-index: 0; }
#editor { resize: none; overflow: auto; color: transparent; caret-color: var(--ink); z-index: 1; }
#editor:focus, #editor:focus-visible { outline: none; }   /* the caret shows focus — a ring adds nothing */
/* active (caret) line — a full-width band behind the code; its gutter number brightens */
#activeline { position: absolute; left: var(--gutw); right: 0; height: var(--lh); z-index: 0;
  background: var(--active); pointer-events: none; visibility: hidden; }
#gutter .acn { color: var(--ink); }
/* selection — one language everywhere: a neutral translucent band that contrasts each
   surface (dark on the light editor, light on the dark WAT/CLI). */
#editor::selection { background: var(--sel); }
#wat ::selection, #out ::selection, #expr::selection { background: rgba(255,255,255,.20); }
/* monochrome syntax: weight + gray steps. The editor (#hl) follows its theme; the WAT (#wat)
   is always on the dark pane, so its number/string/comment hues are fixed light. */
#hl .k, #wat .k { font-weight: 700; }                  /* keyword */
#hl .t, #wat .t { font-weight: 600; }                  /* Type / builtin / $name */
#hl .n { font-weight: 600; color: var(--num); }        /* number (editor) */
#hl .s { color: var(--soft); }                         /* string  (editor) */
#hl .c { color: var(--mid); }                          /* comment (editor) */
#wat .n { font-weight: 600; color: #c8c8c8; }          /* number  (WAT, dark) */
#wat .s { color: #9a9a9a; }                            /* string  (WAT, dark) */
#wat .c { color: var(--dim); }                         /* comment (WAT, dark) */
/* the page's only hue: semantic red, compile-error position */
#hl .e { text-decoration: underline wavy var(--err) 2px; text-underline-offset: 3px; }

/* drop a file → the editor pane is the target; dashed overlay while dragging */
.code.drag::after { content: 'drop a .js file to load it'; position: absolute; inset: 8px; z-index: 4;
  display: flex; align-items: center; justify-content: center; pointer-events: none;
  border: 1.5px dashed var(--mid); border-radius: 6px; background: var(--drop-bg);
  color: var(--soft); font-family: var(--sans); font-size: 13px; letter-spacing: .04em; }

/* ── terminal (right): controls float over the WAT · WAT (foldable) · console ── */
/* a full-width toolbar across the top of the WAT pane: the speed selector at the left, then size · ↓wasm · ⚙
   grouped at the right. A solid band with a hairline rule; #wat is padded below it so no code hides behind it. */
.watbar { position: absolute; top: 0; left: 0; right: 0; z-index: 5; height: 36px;
  display: flex; align-items: center; justify-content: flex-end; gap: 12px;
  padding: 0 4px; color: #c2c2c2; background: var(--bg); border-bottom: 1px solid var(--line); }
#stat { display: inline-flex; align-items: center; white-space: nowrap; color: inherit; font-size: 12px; }
#stat .err { font-weight: 700; color: #ff6b6b; }
.badge { display: inline-block; border: 1px solid #6a6a6a; color: #ddd; font-size: 9.5px; font-weight: 700;
  letter-spacing: .1em; padding: 1px 5px; vertical-align: 1px; margin-left: 8px; }
.wb-actions { display: flex; align-items: center; gap: 2px; }

select { font-family: var(--sans); font-size: 12px; background: transparent; color: inherit;
  border: 0; border-radius: 0; padding: 4px 6px 4px 0; cursor: pointer; }
#opt { margin-right: auto; }   /* speed selector to the left; size + actions stay grouped at the right */
select:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible { outline: 2px solid var(--ink); outline-offset: -1px; }

/* icons (wasm · settings) — inherit the pane color, fade until hover */
.ico { display: inline-flex; align-items: center; gap: 5px; padding: 6px 7px; border: 0;
  background: transparent; color: inherit; opacity: .62; cursor: pointer; font: inherit; transition: opacity .18s; }
.ico:hover { opacity: 1; }
.ico.wasm { font-size: 11px; text-transform: uppercase; letter-spacing: .12em; }

.check { display: flex; align-items: center; gap: 6px; cursor: pointer; user-select: none; }
.check input { appearance: none; width: 13px; height: 13px; border: 1px solid #6a6a6a; cursor: pointer; }
.check input:checked { background: var(--fg); box-shadow: inset 0 0 0 2px #14141a; }

/* ⚙ compile-options popover: strict · names — always on the dark pane, so its colors
   come from the terminal's own vars (not the themed editor --ink). */
.gear { position: relative; display: flex; }
.menu { position: absolute; right: 0; top: calc(100% + 8px); z-index: 10;
  display: flex; flex-direction: column; gap: 11px; min-width: 160px; padding: 13px 15px;
  background: #14141a; color: var(--fg); border: 1px solid var(--line); }
.menu[hidden] { display: none; }
.menu .check { justify-content: flex-start; gap: 8px; color: var(--fg); }
.menu .opt-field { display: flex; flex-direction: column; gap: 7px; }
.menu .opt-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .14em; color: var(--dim); }
.menu .opt-seg { display: flex; border: 1px solid var(--line); border-radius: 5px; overflow: hidden; }
.menu .opt-seg label { flex: 1; display: flex; position: relative; }
.menu .opt-seg input { position: absolute; inset: 0; margin: 0; opacity: 0; cursor: pointer; }
.menu .opt-seg span { flex: 1; text-align: center; padding: 5px 6px; font-size: 11px; color: var(--dim); white-space: nowrap; transition: background .12s, color .12s; }
.menu .opt-seg label + label span { border-left: 1px solid var(--line); }
.menu .opt-seg input:checked + span { background: #2a2a2a; color: var(--bright); }
.menu .opt-seg input:focus-visible + span { outline: 1px solid #6a6a6a; outline-offset: -2px; }

/* WAT + console share a resizable vertical split below the toolbar */
.terminal { flex: 1 1 0; min-height: 0; display: flex; flex-direction: column; }

/* WAT view — read-only, structural folds (module/func/global/…); no line numbers */
#wat { flex: 0 0 var(--wh, 60%); min-height: 0; overflow: auto; padding: 44px 0 8px 6px; font: 11.5px/1.55 var(--mono); color: #b3b3b3; }   /* 44px top clears the 36px .watbar above */
.wrow { display: flex; white-space: pre; min-width: 100%; }
.wrow:hover { background: #ffffff07; }
.wfold { flex: 0 0 18px; position: sticky; left: 0; z-index: 1; background: var(--bg);
  text-align: center; color: #777; }
.wfold[data-l] { cursor: pointer; }
.wfold[data-l]:hover { color: #fff; }
.wcode { flex: 1 0 auto; padding-right: 16px; }
.wdots { color: #666; }

/* horizontal seam between WAT and console — 6px grab, 1px line; persisted */
.hdivider { flex: 0 0 6px; position: relative; cursor: row-resize; background: var(--bg); touch-action: none; }
.hdivider::before { content: ''; position: absolute; left: 0; right: 0; top: 2px; height: 1px;
  background: var(--line); transition: background .15s; }
.hdivider:hover::before, .hdivider.drag::before { background: #3f3f46; }
.hdivider:focus-visible { outline: 2px solid var(--ink); outline-offset: -2px; }

/* output console (bottom of the split) — terminal-style */
.console { flex: 1 1 0; min-height: 0; display: flex; flex-direction: column; }
#out { flex: 1; min-height: 0; overflow: auto; padding: 14px var(--padx) 14px 16px; font: 12.5px/1.6 var(--mono); }
#out div { white-space: pre-wrap; word-break: break-word; }
#out .sys { color: var(--dim); }
#out .sys::before { content: '✓ '; }
#out .in { color: var(--dim); }
#out .in::before { content: '❯ '; }
#out .res { font-weight: 700; color: var(--bright); }
#out .log { color: var(--fg); }
#out .log::before { content: '  '; }   /* no marker glyph — just a 2ch blank indent so output lines up under the ❯/✓/✗ lines */
#out .err { font-weight: 700; color: #ff6b6b; }
#out .err::before { content: '✗ '; }
#out .note { color: var(--dim); }
#out a { color: inherit; }
#out .rule { border-top: 1px solid var(--line); margin: 8px 0; }

/* CLI input — a devtools-style caret line: type a call, Enter runs it, Bench races it vs plain JS */
.prompt { display: flex; gap: 9px; align-items: center; padding: 5px 16px 11px; }
.prompt .chev { font-family: var(--mono); font-size: 13px; line-height: 1; color: var(--bright); }
.prompt input { flex: 1; border: 0; font: 13px/1.4 var(--mono); color: var(--bright); background: transparent;
  caret-color: var(--bright); padding: 2px 0; }
.prompt input:focus, .prompt input:focus-visible { outline: none; }   /* the bright caret already shows focus */
.prompt input::placeholder { color: #5c5c5c; }
.prompt .bench { flex: 0 0 auto; display: inline-flex; align-items: center; gap: 6px; position: relative;
  font: 400 11px/1 var(--sans); text-transform: uppercase; letter-spacing: .12em;
  color: var(--dim); background: transparent; border: 1px solid var(--line); padding: 6px 11px; cursor: pointer;
  transition: color .15s, border-color .15s; }
.prompt .bench svg { width: 13px; height: 13px; }
.prompt .bench:hover { color: var(--bright); border-color: var(--bright); }
/* hover tooltip explaining what "bench" does (uses the aria-label, so a11y + the visible tip share one source) */
.prompt .bench::after { content: attr(aria-label); position: absolute; bottom: calc(100% + 8px); right: 0;
  width: max-content; max-width: 230px; white-space: normal; text-align: left; padding: 8px 10px;
  background: #161616; color: #cfcfcf; border: 1px solid var(--line); border-radius: 5px;
  font: 400 11px/1.45 var(--sans); text-transform: none; letter-spacing: normal;
  opacity: 0; transform: translateY(4px); pointer-events: none; transition: opacity .15s, transform .15s; z-index: 20; }
.prompt .bench:hover::after, .prompt .bench:focus-visible::after { opacity: 1; transform: translateY(0); }

/* thin dark scrollbars throughout */
#editor { scrollbar-width: thin; scrollbar-color: var(--sb) transparent; }
#out, #wat { scrollbar-width: thin; scrollbar-color: #3a3a3a transparent; }
#editor::-webkit-scrollbar, #out::-webkit-scrollbar, #wat::-webkit-scrollbar { width: 8px; height: 8px; }
#editor::-webkit-scrollbar-thumb { background: var(--sb); }
#out::-webkit-scrollbar-thumb, #wat::-webkit-scrollbar-thumb { background: #333; }
#editor::-webkit-scrollbar-thumb:hover { background: var(--mid); }
#out::-webkit-scrollbar-thumb:hover, #wat::-webkit-scrollbar-thumb:hover { background: #555; }

@media (max-width: 760px) {
  main { flex-direction: column; }
  .code { flex: 1 1 0; }                       /* ignore the persisted --lw; stack 50/50 */
  .divider { display: none; }
  .right { border-top: 1px solid var(--faint); }
  /* ≥ 44px touch targets; 16px input so iOS doesn't zoom on focus */
  select { padding: 11px 13px; font-size: 14px; }
  .prompt input { font-size: 16px; }
  .check input { width: 18px; height: 18px; }
}

/* ?embed: the landing iframes this — hide the brand (the landing shows it) and reclaim the logo's top
   inset so the code starts at the top. The editor follows the landing theme: .embed-dark flips the whole
   token block to dark (for the landing's dark theme); .embed-light keeps the standalone cassette-gray
   editor (for the landing's light theme). The right (WAT/CLI) pane is dark either way. */
html.embed { --code-top: 12px; }
html.embed .brand { display: none; }
html.embed.embed-dark {
  --ink: #e6e6e6; --paper: #0b0b0b; --mid: #8a8a8a; --soft: #b3b3b3; --faint: #242424;
  --guide: #ffffff24; --gut-fg: #4e4e4e; --num: #c8c8c8; --active: #17181d; --sel: rgba(255,255,255,.20);
  --sb: #3a3a3a; --err: #ff5a5a; --drop-bg: rgba(20,20,26,.78);
  color-scheme: dark;
}
</style>
</head>
<body>

<main>
  <div class="pane code">
    <div id="activeline"></div>
    <a class="brand" href="../" aria-label="jz — home" title="jz — home">
      <img src="../jz.svg" alt="jz" width="22" height="22">
    </a>
    <div id="gutter"><pre id="gutterlines"></pre></div>
    <pre id="guides" aria-hidden="true"></pre>
    <pre id="hl" aria-hidden="true"></pre>
    <textarea id="editor" spellcheck="false" autocomplete="off" autocapitalize="off" aria-label="jz source — paste or drop a .js file"></textarea>
  </div>
  <div class="divider" id="divider" role="separator" aria-orientation="vertical" aria-label="resize panes" tabindex="0"></div>
  <div class="pane right">
    <div class="watbar">
      <span id="stat"></span>
      <span class="wb-actions">
        <button id="dl" class="ico wasm" title="download .wasm" aria-label="download wasm">
          <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
          <span>wasm</span>
        </button>
        <div class="gear">
          <button id="settings" class="ico" aria-label="compile options" aria-controls="menu" aria-expanded="false" title="compile options">
            <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
          <div id="menu" class="menu" hidden>
            <div class="opt-field">
              <span class="opt-lbl">optimize</span>
              <div class="opt-seg" role="radiogroup" aria-label="optimization level">
                <label><input type="radio" name="opt" value="0"><span>none</span></label>
                <label><input type="radio" name="opt" value="3" checked><span>speed</span></label>
                <label><input type="radio" name="opt" value="size"><span>size</span></label>
              </div>
            </div>
            <label class="check"><input type="checkbox" id="strict"> strict</label>
            <label class="check"><input type="checkbox" id="names"> names</label>
          </div>
        </div>
      </span>
    </div>
    <div class="terminal">
      <div id="wat"></div>
      <div class="hdivider" id="hdivider" role="separator" aria-orientation="horizontal" aria-label="resize WAT / console" tabindex="0"></div>
      <div class="console">
        <div id="out" aria-live="polite"></div>
        <div class="prompt">
          <span class="chev">❯</span>
          <input id="expr" aria-label="expression to run against the compiled exports" placeholder="orbit(100000)" spellcheck="false" autocomplete="off">
          <button id="bench" class="bench" aria-label="Benchmark this call — runs it as jz-compiled WASM and as the same source in plain JS, then compares their speed (Shift+Enter)"><svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="13.5" r="7.5"/><path d="M12 13.5V9.5"/><path d="M9.5 2.5h5M12 2.5v3.5"/></svg><span>bench</span></button>
        </div>
      </div>
    </div>
  </div>
</main>

<script type="module">
// The whole point: the compiler runs HERE, in the page — parse, type inference,
// WASM emit, instantiate. No server, no build step. (dist/jz.js is the
// standalone bundle — `npm run build` regenerates it.)
import jz, { compile } from '../dist/jz.js'

const $ = id => document.getElementById(id)
const editor = $('editor'), out = $('out'), watEl = $('wat'), stat = $('stat'), expr = $('expr')
const hlEl = $('hl'), guidesEl = $('guides'), gutterEl = $('gutterlines'), activeEl = $('activeline'), mainEl = document.querySelector('main')

const esc = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;')

// ── syntax highlight: one regex per language, monochrome classes ──
// JS: comment/string/number/keyword/Type
const TOKEN = /(\/\/[^\n]*|\/\*[\s\S]*?\*\/)|('(?:\\.|[^'\\\n])*'?|"(?:\\.|[^"\\\n])*"?|`(?:\\.|[^`\\])*`?)|\b(0[xXbBoO][0-9a-fA-F_]+|\d[\d_]*(?:\.\d+)?(?:[eE][+-]?\d+)?)\b|\b(let|const|var|function|class|new|return|if|else|for|while|do|break|continue|export|import|from|default|try|catch|finally|throw|typeof|instanceof|in|of|switch|case|this|extends|super|static|null|undefined|true|false)\b|\b([A-Z][A-Za-z0-9_]*)\b/g
const TOKEN_CLS = ['c', 's', 'n', 'k', 't']
// WAT: comment(;;)/string/$name/keyword/type/number
const WTOKEN = /(;;[^\n]*)|("(?:\\.|[^"\\\n])*")|(\$[^\s()";]+)|\b(module|func|param|result|local|global|memory|data|table|elem|type|import|export|start|mut|offset|align|shared|block|loop|if|then|else|end|br|br_if|call|call_indirect|return)\b|\b(i32|i64|f32|f64|v128|funcref|externref)\b|(-?(?:0x[0-9a-fA-F_]+|\d[\d_]*(?:\.\d+)?(?:[eE][+-]?\d+)?|nan|inf))/g
const WCLS = ['c', 's', 't', 'k', 't', 'n']
const tokenize = (src, re, cls) => {
  let html = '', last = 0, m; re.lastIndex = 0
  while ((m = re.exec(src))) {
    html += esc(src.slice(last, m.index))
    const i = m.slice(1).findIndex(g => g !== undefined)
    html += `<span class="${cls[i]}">${esc(m[0])}</span>`
    last = re.lastIndex
  }
  return html + esc(src.slice(last))
}
const highlight = src => tokenize(src, TOKEN, TOKEN_CLS)
const highlightWat = line => tokenize(line, WTOKEN, WCLS)
// Custom sections (jz:schema/rest/noalias/…) carry long byte tuples; collapse the
// payload to `a b c … z` so the WAT stays scannable. Display-only — fold math reads
// the original lines, and no parens are dropped, so paren depth is unchanged.
const shrinkCustom = line => {
  const m = line.match(/^(\s*\(@custom\s+"[^"]*"\s+\()([\d ]+?)\s*(\)*)$/)
  if (!m) return line
  const nums = m[2].trim().split(/\s+/)
  return nums.length <= 8 ? line : `${m[1]}${nums.slice(0, 6).join(' ')} … ${nums[nums.length - 1]}${m[3]}`
}

// `errAt` ({line, col}, 1-based) wraps the token at the error position in a
// red-squiggle span. Slicing the source in three keeps character offsets in
// lockstep with the textarea, so the overlay never drifts.
const paint = (errAt = null) => {
  const src = editor.value
  if (!errAt) { hlEl.innerHTML = highlight(src) + '\n'; return }
  const lines = src.split('\n')
  const ln = Math.min(Math.max(errAt.line, 1), lines.length)
  let off = 0
  for (let i = 0; i < ln - 1; i++) off += lines[i].length + 1
  off += Math.min(Math.max(errAt.col - 1, 0), lines[ln - 1].length)
  let tok = src.slice(off).match(/^\S+/)?.[0]
  if (!tok) {            // at line end / EOF — underline the previous char
    if (off > 0) { off -= 1; tok = src[off] === '\n' ? '' : src[off] }
    if (!tok) { hlEl.innerHTML = highlight(src) + '\n'; return }
  }
  hlEl.innerHTML = highlight(src.slice(0, off)) +
    `<span class="e">${highlight(tok)}</span>` +
    highlight(src.slice(off + tok.length)) + '\n'
}

// the caret's line index — drives the active-line band + the brightened gutter number
const caretLine = () => editor.value.slice(0, editor.selectionStart).split('\n').length - 1
let activeLine = 0

// gutter (line numbers) — dynamic width; the caret's line number is brightened
const renderGutter = () => {
  const n = editor.value.split('\n').length
  // dynamic width: fit the widest line number (min 2 digits → 32px, matching the corner logo;
  // grows for 3+ digit files)
  const digits = Math.max(2, String(n).length)
  document.documentElement.style.setProperty('--gutw', (digits * 8 + 16) + 'px')
  let s = ''
  for (let i = 1; i <= n; i++) s += (i - 1 === activeLine ? `<span class="acn">${i}</span>` : i) + '\n'
  gutterEl.innerHTML = s
}
// nesting guides (JS only): a faint vertical rule at every ENCLOSING indent level —
// columns 0, 2, 4 … within this line's leading whitespace — so each level of nesting
// shows one continuous line down its block.
const renderGuides = () => {
  let html = ''
  for (const line of editor.value.split('\n')) {
    const lead = line.match(/^ */)[0].length
    let cells = ''
    for (let c = 0; c < lead; c++) cells += (c % 2 === 0) ? '<span class="ig"> </span>' : ' '
    html += cells + '\n'
  }
  guidesEl.innerHTML = html
}
// line metrics (constant per page) — used to place the active-line band
const _cs = getComputedStyle(editor)
const LH = parseFloat(_cs.lineHeight) || 20.15
const PADTOP = parseFloat(_cs.paddingTop) || 44
const positionActive = () => {
  if (document.activeElement !== editor) { activeEl.style.visibility = 'hidden'; return }   // only while editing
  const y = PADTOP + activeLine * LH - editor.scrollTop
  activeEl.style.top = y + 'px'
  activeEl.style.visibility = (y < PADTOP - 1 || y > editor.clientHeight) ? 'hidden' : 'visible'
}
const updateActive = () => {
  const nl = caretLine()
  if (nl !== activeLine) { activeLine = nl; renderGutter() }
  positionActive()
}
const syncScroll = () => {
  hlEl.scrollTop = guidesEl.scrollTop = editor.scrollTop
  hlEl.scrollLeft = guidesEl.scrollLeft = editor.scrollLeft
  gutterEl.style.transform = `translateY(${-editor.scrollTop}px)`
  positionActive()
}
const refresh = () => { activeLine = caretLine(); paint(); renderGutter(); renderGuides(); syncScroll() }
editor.addEventListener('scroll', syncScroll)
document.addEventListener('selectionchange', () => { if (document.activeElement === editor) updateActive() })
editor.addEventListener('focus', updateActive)
editor.addEventListener('blur', positionActive)

// ── WAT view — read-only, structural folds (no line numbers) ─────────────────
// fold toggles only on definition headers (module/func/global/…), matched to
// their closing line by paren depth, so the outline stays tidy. Fold state is
// keyed to the current WAT text and reset only when the text actually changes.
const FOLDABLE = /^\s*\((?:module|func|global|memory|data|table|elem|type|import|export)\b/
const parenDelta = (line) => {
  let d = 0, str = false
  for (let i = 0; i < line.length; i++) {
    const c = line[i]
    if (str) { if (c === '\\') i++; else if (c === '"') str = false; continue }
    if (c === '"') str = true
    else if (c === ';' && line[i + 1] === ';') break
    else if (c === '(') d++
    else if (c === ')') d--
  }
  return d
}
let watFolded = new Set(), watLast = null
const renderWat = (wat) => {
  if (wat !== watLast) { watFolded = new Set(); watLast = wat }
  const lines = wat.split('\n'), n = lines.length
  const start = new Array(n), end = new Array(n)
  let d = 0
  for (let i = 0; i < n; i++) { start[i] = d; d += parenDelta(lines[i]); end[i] = d }
  const isHeader = i => i + 1 < n && end[i] > start[i] && FOLDABLE.test(lines[i])
  const foldEnd = i => { let j = i + 1; while (j < n && end[j] > start[i]) j++; return j }   // closing line
  let html = '', i = 0
  while (i < n) {
    const hdr = isHeader(i), folded = hdr && watFolded.has(i)
    const tog = hdr ? `<span class="wfold" data-l="${i}">${folded ? '▸' : '▾'}</span>` : '<span class="wfold"></span>'
    html += `<div class="wrow">${tog}<span class="wcode">${highlightWat(shrinkCustom(lines[i]))}${folded ? '<span class="wdots"> … </span>' : ''}</span></div>`
    i = folded ? foldEnd(i) + 1 : i + 1
  }
  watEl.innerHTML = html
}
watEl.addEventListener('click', (e) => {
  const f = e.target.closest('.wfold')
  if (!f || f.dataset.l === undefined) return
  const l = +f.dataset.l
  watFolded.has(l) ? watFolded.delete(l) : watFolded.add(l)
  renderWat(watLast)
})

// ── intro — the default scratch when the URL carries no source ────────────────
// (presets live in /bench/ — each card's "repl" button deep-links its source here.)
const INTRO_EXPR = 'orbit(100000)'
const INTRO_SRC = `// Paste your own code, or drop a .js file here

export let orbit = (n) => {
  let x = 0
  for (let i = 0; i < n; i++) x += Math.sin(i * 0.001) * Math.cos(i * 0.0005)
  return x
}
// ↑ a real workload — run orbit(100000) below, or hit Bench to race jz vs plain JS

export let shout = (s) => s.toUpperCase() + '!'
// ↑ strings cross the boundary as UTF-8

export let count = (s) => s.charCodeAt(0)
// ↑ typed by method call — i32 return

console.log('compiled + instantiated, top-level ran')`

// ── compile pipeline ────────────────────────────────────────────────────────
const state = { src: '', exports: null, memory: null, bytes: null, wat: '', ok: false }
const optVal = () => (document.querySelector('input[name=opt]:checked') || { value: '3' }).value
const opts = () => { const o = optVal(); return { strict: $('strict').checked, optimize: o === 'size' ? 'size' : +o, names: $('names').checked } }

// pretty size: B under 1k, then kB / MB (SI), trailing zeros trimmed
const fmtB = n =>
  n < 1000 ? n + ' B' :
  n < 1e6  ? +(n / 1000).toFixed(2) + ' kB' :
             +(n / 1e6).toFixed(2) + ' MB'

let buildId = 0
const build = () => {
  const src = editor.value
  const id = ++buildId
  try {
    const o = opts()
    const t0 = performance.now()
    const bytes = compile(src, o)
    const ms = performance.now() - t0
    const logs = capture(() => {
      const { exports, memory } = jz(src, o)        // instantiate — top-level runs
      state.exports = exports; state.memory = memory
    })
    state.src = src; state.bytes = bytes; state.ok = true; state.wat = ''
    stat.textContent = fmtB(bytes.length)        // bar: module size, by the opt selector
    stat.title = ''
    if (out.childElementCount) rule()            // gentle separator — the source recompiled (history kept)
    print('sys', `compiled in ${ms < 1 ? ms.toFixed(2) : ms.toFixed(1)} ms`)
    for (const l of logs) print('log', l)
    // a stale prompt hint (previous export) misleads — point at a real export
    const hinted = expr.placeholder.match(/^(\w+)/)?.[1]
    if (typeof state.exports[hinted] !== 'function') {
      const first = fnExports()[0]
      if (first) expr.placeholder = `${first}(…)`
    }
    // WAT (third compile) is always shown in the top split — compute it off the
    // keystroke path so typing stays snappy, then paint it in
    setTimeout(() => {
      if (id !== buildId) return
      try {
        state.wat = compile(src, { ...o, wat: true })
        if (state.wat.includes('v128')) stat.insertAdjacentHTML('beforeend', '<span class="badge">v128</span>')
        renderWat(state.wat)
      } catch {}
    }, 0)
    setHash(src)
    paint()                                  // clear a previous error squiggle
  } catch (e) {
    state.ok = false
    const msg = String(e.message || e)
    stat.innerHTML = '<span class="err">✗</span>'   // bar: compact fail marker (full text on hover)
    stat.title = msg
    if (out.childElementCount) rule()               // gentle separator — recompiled, then the error
    print('err', firstLine(e))
    const at = msg.match(/\bat (\d+):(\d+)/)
    if (at) paint({ line: +at[1], col: +at[2] })
  }
}

// Trailing-throttle the hash write — Safari rate-limits replaceState
// (~100 calls / 30 s); a fast typist at the compile debounce would trip it.
let hashT = 0
const setHash = (src) => {
  clearTimeout(hashT)
  hashT = setTimeout(() => { try { history.replaceState(null, '', '#' + encodeHash(src)) } catch {} }, 800)
}

let deb = 0
editor.addEventListener('input', () => { refresh(); clearTimeout(deb); deb = setTimeout(build, 250) })
$('strict').addEventListener('change', build)
for (const r of document.querySelectorAll('input[name=opt]')) r.addEventListener('change', build)
$('names').addEventListener('change', build)

// ── output / eval ───────────────────────────────────────────────────────────
const firstLine = e => String(e.message || e).split('\n')[0]
const print = (cls, text) => {
  const d = document.createElement('div')
  d.className = cls
  d.textContent = text
  out.appendChild(d)
  out.scrollTop = out.scrollHeight
}
const rule = () => { const d = document.createElement('div'); d.className = 'rule'; out.appendChild(d) }

// Capture console output during wasm/js execution (default env.print wiring
// routes to console.log/console.error).
const capture = (fn) => {
  const logs = [], { log, error } = console
  console.log = (...a) => logs.push(a.join(' '))
  console.error = (...a) => logs.push(a.join(' '))
  try { fn() } finally { console.log = log; console.error = error }
  return logs
}

const fmt = (v) => {
  if (typeof v === 'number') return Object.is(v, -0) ? '-0' : String(v)
  if (typeof v === 'string') return `'${v}'`
  if (v == null || typeof v === 'boolean') return String(v)
  if (ArrayBuffer.isView(v)) {
    const a = Array.from(v.subarray(0, 8)), tail = v.length > 8 ? `, … ×${v.length}` : ''
    return `${v.constructor.name} [${a.join(', ')}${tail}]`
  }
  try { return JSON.stringify(v) } catch { return String(v) }
}

// Evaluate an expression with the module's exports in scope.
// Function-constructor bodies are sloppy-mode, so `with` is available.
const evalIn = (scope, code) => new Function('$', `with ($) { return (${code}) }`)(scope)

const runExpr = () => {
  const code = expr.value.trim()
  if (!code) return
  if (!state.exports) { print('err', 'nothing compiled yet'); return }
  if (!state.ok) print('note', 'compile error — running the last good module')
  print('in', code)
  try {
    let result
    const logs = capture(() => { result = evalIn(state.exports, code) })
    for (const l of logs) print('log', l)
    print('res', fmt(result))
    state.memory?.reset?.()
  } catch (e) { print('err', firstLine(e)) }
  hist.push(code); hi = hist.length
  expr.value = ''
}

expr.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') e.shiftKey ? benchExpr() : runExpr()
  else if (e.key === 'ArrowUp' && hi > 0) { expr.value = hist[--hi]; e.preventDefault() }
  else if (e.key === 'ArrowDown') { hi = Math.min(hist.length, hi + 1); expr.value = hist[hi] || ''; e.preventDefault() }
})
const hist = []; let hi = 0

// ── bench: race a call — jz-wasm vs the SAME source as plain JS. The honest line is
//    "faster on the kernels it's for, or it's a bug" — so when jz loses, offer a 1-click report. ──
let jsTwin = { src: null, mod: null, url: null }
const jsTwinOf = async (src) => {                 // the source as a plain-JS module (valid jz is valid JS)
  if (jsTwin.src === src && jsTwin.mod) return jsTwin.mod
  if (jsTwin.url) URL.revokeObjectURL(jsTwin.url)
  const url = URL.createObjectURL(new Blob([src], { type: 'text/javascript' }))
  const mod = await import(url)
  jsTwin = { src, mod, url }
  return mod
}
const makeRunner = (scope, code) => { const fn = new Function('$', `with ($) { return (${code}) }`); return () => fn(scope) }
const medianMs = (run, reset) => {                // median per-call ms over 40 reps, after an 8-rep warmup
  for (let i = 0; i < 8; i++) { run(); reset && reset() }
  const t = []
  for (let i = 0; i < 40; i++) { const a = performance.now(); run(); t.push(performance.now() - a); reset && reset() }
  return t.sort((x, y) => x - y)[20]
}
const fx = n => n < 1 ? n.toFixed(3) : n < 10 ? n.toFixed(2) : n.toFixed(1)
const reportUrl = (code, jzMs, jsMs) => {
  const slower = (jzMs / jsMs).toFixed(2)
  const permalink = location.origin + location.pathname + '#' + encodeHash(state.src)
  const body = [
    `jz is slower than plain JS on this kernel — from the REPL bench (a slowdown on a compute kernel is a bug we want).`, '',
    `**Call:** \`${code}\``,
    `**jz (wasm):** ${jzMs.toFixed(3)} ms · **JS (V8):** ${jsMs.toFixed(3)} ms · **${slower}× slower** (median of 40, in-browser)`,
    `**opt:** ${optVal()}${$('strict').checked ? ' · strict' : ''}`, '',
    `**Repro — REPL permalink (exact source):** ${permalink}`,
  ].join('\n')
  return `https://github.com/dy/jz/issues/new?labels=slowdown&title=${encodeURIComponent(`Slowdown: jz ${slower}× slower than JS on ${code}`)}&body=${encodeURIComponent(body)}`
}
const benchRow = (label, ms) => `  ${label.padEnd(3)}${fx(ms).padStart(7)} ms\n`   // monospace table row, ms right-aligned
const printBench = (code, jzMs, jsMs) => {
  const d = document.createElement('div'); d.className = 'res'
  const table = benchRow('jz', jzMs) + benchRow('js', jsMs)
  const ratio = jsMs / jzMs                          // > 1 → jz faster
  if (ratio >= 1.03) d.textContent = table + `  ${fx(ratio)}× faster · median of 40`
  else if (ratio >= 0.97) d.textContent = table + `  ≈ even (${fx(ratio)}×) · median of 40`
  else if (ratio >= 0.8) d.textContent = table + `  ${fx(1 / ratio)}× slower · median of 40`   // modest (< 1.25×) — within the expected range; no report, to avoid normal-case spam
  else {                                             // a meaningful slowdown (≥ 1.25×) on a kernel jz is meant for — invite a 1-click report
    d.append(table + `  ${fx(1 / ratio)}× slower · median of 40 · `)
    const a = document.createElement('a')
    a.href = reportUrl(code, jzMs, jsMs); a.target = '_blank'; a.rel = 'noopener'; a.textContent = 'Report it →'
    d.append(a)
  }
  out.appendChild(d); out.scrollTop = out.scrollHeight
}
const benchExpr = async () => {
  const code = expr.value.trim()
  if (!code) { print('note', 'type a call to bench — e.g. orbit(100000)'); return }
  if (!state.ok || !state.exports) { print('err', 'nothing compiled yet'); return }
  print('in', `bench ${code}`)
  await new Promise(r => setTimeout(r))            // paint the prompt line before the (blocking) timing loop
  let js
  try { js = await jsTwinOf(state.src) }
  catch (e) { print('err', 'could not run the source as plain JS — ' + firstLine(e)); return }
  try {
    const runJz = makeRunner(state.exports, code), runJs = makeRunner(js, code)
    const reset = () => state.memory?.reset?.()
    runJz(); runJs()                               // one call each first — a thrown expr surfaces here
    const jzMs = medianMs(runJz, reset), jsMs = medianMs(runJs)
    if (jzMs < 0.01 || jsMs < 0.01) print('note', "too fast to measure — under the timer's resolution. Try a bigger input, e.g. orbit(100000).")
    else printBench(code, jzMs, jsMs)
    reset()
  } catch (e) { print('err', firstLine(e)) }
}
$('bench').addEventListener('click', benchExpr)

// exports the prompt can call — drives the placeholder hint (to bench a kernel, use /bench/)
const fnExports = () => Object.keys(state.exports || {})
  .filter(k => typeof state.exports[k] === 'function' && !k.startsWith('_'))

// ── download .wasm ────────────────────────────────────────────────────────────
$('dl').addEventListener('click', () => {
  if (!state.ok || !state.bytes) return
  const a = document.createElement('a')
  a.href = URL.createObjectURL(new Blob([state.bytes], { type: 'application/wasm' }))
  a.download = 'module.wasm'
  a.click()
  URL.revokeObjectURL(a.href)
})

gear.addEventListener('click', (e) => {

  menu.hidden = !menu.hidden
  gear.setAttribute('aria-expanded', String(!menu.hidden))
})

// ── resizable splits — vertical (editor/terminal) + horizontal (WAT/console),
//    each persisted to localStorage. One helper drives both axes. ──────────────
const rightEl = document.querySelector('.right'), termEl = document.querySelector('.terminal')
const store = (k, v) => { try { localStorage.setItem(k, v) } catch {} }
// makeResizer(el, {target, prop, key, min, max, reset, axis, decKey, incKey})
// — axis(e) → percent along the resize axis; prop is the CSS var it sets on target.
const makeResizer = (el, c) => {
  const cur = () => parseFloat(getComputedStyle(c.target).getPropertyValue(c.prop)) || c.reset
  const set = (pct, save) => {
    pct = Math.min(c.max, Math.max(c.min, pct))
    c.target.style.setProperty(c.prop, pct + '%')
    if (save) store(c.key, pct + '%')
  }
  try { const sv = localStorage.getItem(c.key); if (sv) c.target.style.setProperty(c.prop, sv) } catch {}
  let on = false
  el.addEventListener('pointerdown', (e) => { on = true; el.classList.add('drag'); el.setPointerCapture(e.pointerId); e.preventDefault() })
  el.addEventListener('pointermove', (e) => { if (on) set(c.axis(e), false) })
  el.addEventListener('pointerup', () => { if (!on) return; on = false; el.classList.remove('drag'); set(cur(), true) })
  el.addEventListener('dblclick', () => set(c.reset, true))
  el.addEventListener('keydown', (e) => {
    if (e.key === c.decKey) { set(cur() - 2, true); e.preventDefault() }
    else if (e.key === c.incKey) { set(cur() + 2, true); e.preventDefault() }
  })
}
makeResizer($('divider'), {
  target: mainEl, prop: '--lw', key: 'jz-repl-split', min: 20, max: 80, reset: 50,
  decKey: 'ArrowLeft', incKey: 'ArrowRight',
  axis: (e) => { const r = mainEl.getBoundingClientRect(); return (e.clientX - r.left) / r.width * 100 },
})
makeResizer($('hdivider'), {
  target: rightEl, prop: '--wh', key: 'jz-repl-wat', min: 15, max: 85, reset: 60,
  decKey: 'ArrowUp', incKey: 'ArrowDown',
  axis: (e) => { const r = termEl.getBoundingClientRect(); return (e.clientY - r.top) / r.height * 100 },
})

// ── file drop — replaces the editor content (single file; the repl compiles one source) ──
const codePane = document.querySelector('.code')
let dragDepth = 0
codePane.addEventListener('dragenter', (e) => {
  if (![...(e.dataTransfer?.types || [])].includes('Files')) return
  e.preventDefault(); if (dragDepth++ === 0) codePane.classList.add('drag')
})
codePane.addEventListener('dragover', (e) => {
  if ([...(e.dataTransfer?.types || [])].includes('Files')) e.preventDefault()
})
codePane.addEventListener('dragleave', () => { if (--dragDepth <= 0) { dragDepth = 0; codePane.classList.remove('drag') } })
codePane.addEventListener('drop', async (e) => {
  e.preventDefault(); dragDepth = 0; codePane.classList.remove('drag')
  const f = e.dataTransfer?.files?.[0]
  if (!f) return
  try { setSource(await f.text()); build() } catch {}
})

// ── url hash: #<base64url(source)> ──────────────────────────────────────────
const encodeHash = (src) => {
  const b = new TextEncoder().encode(src)
  let s = ''
  for (let i = 0; i < b.length; i += 8192) s += String.fromCharCode(...b.subarray(i, i + 8192))
  return btoa(s).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '')
}
const decodeHash = (h) => {
  const b = atob(h.replace(/-/g, '+').replace(/_/g, '/'))
  return new TextDecoder().decode(Uint8Array.from(b, c => c.charCodeAt(0)))
}

// editor niceties: Tab = 2 spaces, Cmd/Ctrl+Enter focuses the prompt
editor.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault()
    // execCommand (deprecated but universal) keeps the undo stack intact;
    // direct value surgery would wipe Cmd+Z history on every Tab press
    if (!document.execCommand('insertText', false, '  ')) {
      const { selectionStart: s, selectionEnd: en, value: v } = editor
      editor.value = v.slice(0, s) + '  ' + v.slice(en)
      editor.selectionStart = editor.selectionEnd = s + 2
      editor.dispatchEvent(new Event('input'))
    }
  } else if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) expr.focus()
})

// ── boot ────────────────────────────────────────────────────────────────────
const setSource = (src) => { editor.value = src; refresh() }

// External hash navigation (pasting a shared link while already here).
// Our own setHash uses replaceState, which never fires hashchange.
addEventListener('hashchange', () => {
  try {
    const src = decodeHash(location.hash.slice(1))
    if (src !== editor.value) { setSource(src); build() }
  } catch {}
})

const h = location.hash.slice(1)
if (h) {
  try { setSource(decodeHash(h)); build() }
  catch { setSource(INTRO_SRC); expr.placeholder = INTRO_EXPR; build() }
} else { setSource(INTRO_SRC); expr.placeholder = INTRO_EXPR; build() }
</script>
</body>
</html>
