<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 104" width="720" height="104" role="img" aria-label="JS to WASM landscape — tools on a single trade-off axis from tiny, fast AOT subsets (jz, AssemblyScript) to full-spec bundled engines (Javy, ComponentizeJS).">
  <rect width="720" height="104" rx="12" fill="#ffffff"/>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
    <!-- axis -->
    <rect x="150" y="50.5" width="450" height="3" rx="1.5" fill="#edf0f2"/>
    <path d="M150 52 L158 47.5 L158 56.5 Z" fill="#ced4da"/>
    <path d="M600 52 L592 47.5 L592 56.5 Z" fill="#ced4da"/>
    <text x="140" y="49" text-anchor="end" font-size="12" font-weight="700" fill="#868e96">tiny · fast</text>
    <text x="140" y="63" text-anchor="end" font-size="10" fill="#aeb4ba">JS subset</text>
    <text x="610" y="49" font-size="12" font-weight="700" fill="#868e96">full JS spec</text>
    <text x="610" y="63" font-size="10" fill="#aeb4ba">bundled engine</text>

    <!-- jz — above -->
    <line x1="177" y1="36" x2="177" y2="50" stroke="#999999" stroke-width="1"/>
    <circle cx="177" cy="52" r="6" fill="#000000"/>
    <text x="177" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#000000">jz</text>

    <!-- AssemblyScript — below -->
    <line x1="244.5" y1="54" x2="244.5" y2="68" stroke="#ced4da" stroke-width="1"/>
    <circle cx="244.5" cy="52" r="5" fill="#868e96"/>
    <text x="244.5" y="84" text-anchor="middle" font-size="13" font-weight="600" fill="#343a40">AssemblyScript</text>

    <!-- Porffor — above -->
    <line x1="352.5" y1="36" x2="352.5" y2="50" stroke="#ced4da" stroke-width="1"/>
    <circle cx="352.5" cy="52" r="5" fill="#868e96"/>
    <text x="352.5" y="26" text-anchor="middle" font-size="13" font-weight="600" fill="#343a40">Porffor</text>

    <!-- jawsm — below -->
    <line x1="433.5" y1="54" x2="433.5" y2="68" stroke="#ced4da" stroke-width="1"/>
    <circle cx="433.5" cy="52" r="5" fill="#868e96"/>
    <text x="433.5" y="84" text-anchor="middle" font-size="13" font-weight="600" fill="#343a40">jawsm</text>

    <!-- Javy — above -->
    <line x1="519" y1="36" x2="519" y2="50" stroke="#ced4da" stroke-width="1"/>
    <circle cx="519" cy="52" r="5" fill="#868e96"/>
    <text x="519" y="26" text-anchor="middle" font-size="13" font-weight="600" fill="#343a40">Javy</text>

    <!-- ComponentizeJS — below -->
    <line x1="577.5" y1="54" x2="577.5" y2="68" stroke="#ced4da" stroke-width="1"/>
    <circle cx="577.5" cy="52" r="5" fill="#868e96"/>
    <text x="577.5" y="84" text-anchor="middle" font-size="13" font-weight="600" fill="#343a40">ComponentizeJS</text>
  </g>
</svg>
