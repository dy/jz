<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 124" width="720" height="124" role="img" aria-label="JS to WASM landscape — tools on a single trade-off axis from tiny, fast AOT subsets (jz, AssemblyScript) to full-spec bundled engines (Javy, ComponentizeJS).">
  <rect width="720" height="124" rx="12" fill="#ffffff"/>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif">
    <!-- axis -->
    <rect x="150" y="58.5" width="450" height="3" rx="1.5" fill="#edf0f2"/>
    <path d="M150 60 L158 55.5 L158 64.5 Z" fill="#ced4da"/>
    <path d="M600 60 L592 55.5 L592 64.5 Z" fill="#ced4da"/>
    <text x="140" y="57" text-anchor="end" font-size="12" font-weight="700" fill="#868e96">tiny · fast</text>
    <text x="140" y="71" text-anchor="end" font-size="10" fill="#aeb4ba">JS subset</text>
    <text x="610" y="57" font-size="12" font-weight="700" fill="#868e96">full JS spec</text>
    <text x="610" y="71" font-size="10" fill="#aeb4ba">bundled engine</text>

    <!-- jz — above -->
    <line x1="177" y1="44" x2="177" y2="58" stroke="#f0a787" stroke-width="1"/>
    <circle cx="177" cy="60" r="6" fill="#e8590c"/>
    <text x="177" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#e8590c">jz</text>
    <text x="177" y="40" text-anchor="middle" font-size="10" fill="#c2622f">AOT · subset</text>

    <!-- AssemblyScript — below -->
    <line x1="244.5" y1="62" x2="244.5" y2="76" stroke="#ced4da" stroke-width="1"/>
    <circle cx="244.5" cy="60" r="5" fill="#868e96"/>
    <text x="244.5" y="92" text-anchor="middle" font-size="13" font-weight="600" fill="#343a40">AssemblyScript</text>
    <text x="244.5" y="106" text-anchor="middle" font-size="10" fill="#adb5bd">AOT · TS dialect</text>

    <!-- Porffor — above -->
    <line x1="352.5" y1="44" x2="352.5" y2="58" stroke="#ced4da" stroke-width="1"/>
    <circle cx="352.5" cy="60" r="5" fill="#868e96"/>
    <text x="352.5" y="26" text-anchor="middle" font-size="13" font-weight="600" fill="#343a40">Porffor</text>
    <text x="352.5" y="40" text-anchor="middle" font-size="10" fill="#adb5bd">AOT · growing TC39</text>

    <!-- jawsm — below -->
    <line x1="433.5" y1="62" x2="433.5" y2="76" stroke="#ced4da" stroke-width="1"/>
    <circle cx="433.5" cy="60" r="5" fill="#868e96"/>
    <text x="433.5" y="92" text-anchor="middle" font-size="13" font-weight="600" fill="#343a40">jawsm</text>
    <text x="433.5" y="106" text-anchor="middle" font-size="10" fill="#adb5bd">compiled · WasmGC</text>

    <!-- Javy — above -->
    <line x1="519" y1="44" x2="519" y2="58" stroke="#ced4da" stroke-width="1"/>
    <circle cx="519" cy="60" r="5" fill="#868e96"/>
    <text x="519" y="26" text-anchor="middle" font-size="13" font-weight="600" fill="#343a40">Javy</text>
    <text x="519" y="40" text-anchor="middle" font-size="10" fill="#adb5bd">embeds QuickJS</text>

    <!-- ComponentizeJS — below -->
    <line x1="577.5" y1="62" x2="577.5" y2="76" stroke="#ced4da" stroke-width="1"/>
    <circle cx="577.5" cy="60" r="5" fill="#868e96"/>
    <text x="577.5" y="92" text-anchor="middle" font-size="13" font-weight="600" fill="#343a40">ComponentizeJS</text>
    <text x="577.5" y="106" text-anchor="middle" font-size="10" fill="#adb5bd">embeds SpiderMonkey</text>
  </g>
</svg>
