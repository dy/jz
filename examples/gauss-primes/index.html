<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo } from "../lib/jzdemo.js"

let panX = 0, panY = 0, lastX = 0, lastY = 0, dragging = false
const demo = runDemo({
  name: "gauss-primes",
  hint: "Gaussian primes — primes in ℤ[i]; drag to pan. 8-fold symmetry from the Gaussian units ±1, ±i",
  frame: (e, t) => {
    e.frame(t, panX, panY)
  },
})

demo.cv.addEventListener("pointerdown", e => {
  lastX = e.clientX; lastY = e.clientY; dragging = true
})
demo.cv.addEventListener("pointermove", e => {
  if (!dragging) return
  panX += (e.clientX - lastX) * (demo.W / innerWidth)
  panY += (e.clientY - lastY) * (demo.H / innerHeight)
  lastX = e.clientX; lastY = e.clientY
})
demo.cv.addEventListener("pointerup", () => { dragging = false })
</script>
</body>
</html>
