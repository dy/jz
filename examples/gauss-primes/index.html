<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo } from "../lib/jzdemo.js"

let panX = 0, panY = 0, zoom = 1, lastX = 0, lastY = 0, dragging = false
const demo = runDemo({
  name: "gauss-primes",
  hint: "Gaussian primes — primes in ℤ[i]; drag to pan, scroll to zoom. 8-fold symmetry from the units ±1, ±i",
  frame: (e, t) => {
    e.frame(t, panX, panY, zoom)
  },
})

demo.cv.addEventListener("pointerdown", e => {
  lastX = e.clientX; lastY = e.clientY; dragging = true
})
demo.cv.addEventListener("pointermove", e => {
  if (!dragging) return
  panX += (e.clientX - lastX) * (demo.W / innerWidth)
  panY += (e.clientY - lastY) * (demo.H / innerHeight)
  lastX = e.clientX; lastY = e.clientY
})
demo.cv.addEventListener("pointerup", () => { dragging = false })
// scroll to zoom, anchored on the cursor (the lattice point under it stays put)
demo.cv.addEventListener("wheel", e => {
  e.preventDefault()
  const sx = demo.W / demo.cv.clientWidth, sy = demo.H / demo.cv.clientHeight
  const mx = e.offsetX * sx, my = e.offsetY * sy
  const stepOld = 6 * zoom
  const a = (mx - (demo.W * 0.5 + panX)) / stepOld
  const b = (my - (demo.H * 0.5 + panY)) / stepOld
  zoom *= Math.exp(-e.deltaY * 0.0015)
  if (zoom < 0.3) zoom = 0.3
  if (zoom > 10) zoom = 10
  const stepNew = 6 * zoom
  panX = mx - a * stepNew - demo.W * 0.5
  panY = my - b * stepNew - demo.H * 0.5
}, { passive: false })
</script>
</body>
</html>
