<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, panZoom } from "../lib/jzdemo.js"

// The kernel already takes (t, cx, cy, halfH) — centre + half-height — so pan/zoom is just a
// matter of driving those from the shared panZoom: drag to pan, scroll to zoom into the masts
// and reflection, double-click to reset to the whole ship.
const home = { cx: -0.45, cy: -0.5, scale: 1.35 }
const view = { ...home }
const demo = runDemo({
  name: "burningship",
  hint: "Burning Ship fractal — drag to pan · scroll to zoom",
  frame: (e, t) => { e.frame(t, view.cx, view.cy, view.scale) },
})
panZoom(demo.cv, view, home, () => {})
</script>
</body>
</html>
