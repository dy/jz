<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, panZoom } from "../lib/jzdemo.js"

// The kernel takes (t, cx, cy, halfH, rot) — centre, half-height, and a tiny twist that morphs the
// ship on its own. pan/zoom drives the view from the shared panZoom; the twist breathes by itself,
// slowing as you zoom in so deep rigging sways gently instead of flickering.
const home = { cx: -0.45, cy: -0.5, scale: 1.35 }
const view = { ...home }
const demo = runDemo({
  name: "burningship",
  hint: "Burning Ship fractal — the rigging sways on its own · drag to pan · scroll to zoom",
  frame: (e, t) => {
    const zoomRate = Math.max(0.12, Math.min(1, view.scale / home.scale))
    const rot = 0.16 * Math.sin(t * 0.21 * zoomRate)   // gentle twist, calmer when zoomed in
    e.frame(t, view.cx, view.cy, view.scale, rot)
  },
})
panZoom(demo.cv, view, home, () => {})
</script>
</body>
</html>
