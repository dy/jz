<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, trackPointer } from "../lib/jzdemo.js"

let baseCx = -0.45, baseCy = -0.5, userSet = false
const demo = runDemo({
  name: "burningship",
  hint: "Burning Ship fractal — drag to recenter, auto-zoom breathes",
  frame: (e, t) => {
    if (ptr.down) {
      baseCx += (ptr.x - 0.5) * 0.04
      baseCy += (ptr.y - 0.5) * 0.04
      userSet = true
    }
    const cx = baseCx + Math.cos(t * 0.07) * 0.01
    const cy = baseCy + Math.sin(t * 0.05) * 0.01
    // gentle breathing zoom: halfH oscillates around 1.35
    const halfH = 1.35 * (1.0 + 0.15 * Math.sin(t * 0.08))
    e.frame(t, cx, cy, halfH)
  },
})
const ptr = trackPointer(demo.cv)
</script>
</body>
</html>
