<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo } from "../lib/jzdemo.js"

// a base point in de-Jong parameter space; slow LFOs drift all four params (no hover).
// Click anywhere to jump to a fresh random attractor.
let base = [1.9, -2.5, 1.7, -0.3]
const ITERS = 1_200_000

const demo = runDemo({
  name: "attractors",
  hint: "a de Jong strange attractor · click to morph it",
  size: { dpr: 1.5, budget: null },
  cursor: "pointer",
  frame: (e, t) => {
    const a = base[0] + Math.sin(t * 0.05) * 0.22
    const b = base[1] + Math.cos(t * 0.08) * 0.22
    const c = base[2] + Math.sin(t * 0.07) * 0.22
    const d = base[3] + Math.cos(t * 0.13) * 0.22
    e.frame(a, b, c, d, ITERS)
  },
})
demo.cv.addEventListener("pointerdown", () => { base = base.map(() => Math.random() * 6 - 3) })
</script>
</body>
</html>
