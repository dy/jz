<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, trackPointer } from "../lib/jzdemo.js"

let baseAngle = 0.0, userSet = false
const demo = runDemo({
  name: "hyperbolic",
  hint: "Poincaré disk tessellation — drag to rotate the hyperbolic plane",
  frame: (e, t) => {
    let rot
    if (ptr.down) {
      // Map horizontal drag to rotation angle: full width = full rotation
      rot = (ptr.x * 2 - 1) * Math.PI
      baseAngle = rot
      userSet = true
    } else {
      // Slow autonomous rotation when not dragging
      const drift = userSet ? 0.0 : 0.12
      rot = baseAngle + t * drift
    }
    e.frame(t, rot)
  },
})
const ptr = trackPointer(demo.cv)
</script>
</body>
</html>
