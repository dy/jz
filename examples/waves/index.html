<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo } from "../lib/jzdemo.js"

// Monochrome caustics after KZ_LAB_E's simulation: drops and pointer pressure disturb a
// neutral sheet, then the wave equation opens them into silver fold lines. The untouched
// demo receives only occasional drops—no synthetic pointer choreography. Click adds a drop,
// drag draws your own stroke, and scroll changes the refraction depth.
let foc = 240                         // focal depth of the refraction
let down = false, stick = false       // stick engages only after real movement — a clean
let sx = 0, sy = 0, dx0 = 0, dy0 = 0  // click must NOT press the stick under its own drop
let nextDrop = 0, breakTrail = false
const scheduleDrop = (t) => { nextDrop = t + 2.5 + Math.random() * 2.5 }

const demo = runDemo({
  name: "waves",
  hint: "monochrome caustics — click to drop · drag through the sheet · scroll = refraction depth",
  size: { budget: 420000 },
  bg: "#9e9e9e",
  load: (e, d) => { e.clear(); nextDrop = d.t + 0.8 },
  frame: (e, t, d) => {
    if (!down && t >= nextDrop) {
      e.drop(d.W * (0.15 + Math.random() * 0.7), d.H * (0.15 + Math.random() * 0.7))
      scheduleDrop(t)
    }
    let active = stick ? 1.0 : 0.0
    if (breakTrail) { active = 0.0; breakTrail = false }
    e.frame(t, sx, sy, active, foc)
  },
  randomize: (e, d) => {
    scheduleDrop(d.t)
    for (let i = 0; i < 3; i++) e.drop(d.W * (0.15 + Math.random() * 0.7), d.H * (0.15 + Math.random() * 0.7))
  },
})

const toPx = (e, snap = false) => {
  const r = demo.cv.getBoundingClientRect()
  const x = (e.clientX - r.left) / r.width * demo.W
  const y = (e.clientY - r.top) / r.height * demo.H
  // Pointer events can arrive as a jagged, low-rate polyline. A short event-space low-pass
  // removes those corners while staying close enough to the hand to feel immediate.
  if (snap) { sx = x; sy = y }
  else { sx += (x - sx) * 0.55; sy += (y - sy) * 0.55 }
}
demo.cv.addEventListener("pointerdown", (e) => {
  toPx(e, true); scheduleDrop(demo.t)
  down = true; stick = false; breakTrail = true; dx0 = sx; dy0 = sy
  try { demo.cv.setPointerCapture(e.pointerId) } catch {}
})
demo.cv.addEventListener("pointermove", (e) => {
  if (!down) return
  toPx(e)
  if (!stick && Math.hypot(sx - dx0, sy - dy0) > 8) stick = true   // it's a drag — engage the stick
})
demo.cv.addEventListener("pointerup", (e) => {
  if (down && !stick) demo.engine?.drop(dx0, dy0)                  // it was a clean click — drop
  down = false; stick = false
  try { demo.cv.releasePointerCapture(e.pointerId) } catch {}
})
demo.cv.addEventListener("pointerleave", () => { down = false; stick = false })
demo.cv.addEventListener("pointercancel", () => { down = false; stick = false })
demo.cv.addEventListener("wheel", (e) => {
  e.preventDefault(); scheduleDrop(demo.t)
  foc *= Math.exp(-e.deltaY * 0.001)
  if (foc < 80) foc = 80
  if (foc > 360) foc = 360
}, { passive: false })
</script>
</body>
</html>
