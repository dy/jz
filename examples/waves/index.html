<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo } from "../lib/jzdemo.js"

// autonomous: drop random ripples at random intervals so the surface keeps ringing (screensaver)
let frameCount = 0, nextDrop = 30
let painting = false, lastX = 0, lastY = 0

const drop = (x, y) => {
  if (demo.engine) demo.engine.drop(x * demo.W / demo.cv.clientWidth, y * demo.H / demo.cv.clientHeight, 14, 0.9)
}
const strokeTo = (x, y) => {
  const dx = x - lastX, dy = y - lastY, n = Math.max(1, Math.ceil(Math.hypot(dx, dy) / 5))
  for (let i = 1; i <= n; i++) drop(lastX + dx * i / n, lastY + dy * i / n)
  lastX = x; lastY = y
}

const demo = runDemo({
  name: "waves",
  hint: "the 2D wave equation — ripples ring, reflect, and interfere · click to drop one",
  size: { budget: 420000 },
  bg: "#808080",
  load: (e) => { e.clear() },
  frame: (e) => {
    frameCount++
    if (frameCount > nextDrop) {
      e.drop(Math.random() * demo.W, Math.random() * demo.H, 14, 0.85)
      nextDrop = frameCount + 28 + Math.random() * 70   // drop often → ripples keep crossing & interfering
    }
    e.frame(0)
  },
  // re-roll: clear the pond and scatter a handful of fresh packets that immediately interfere
  randomize: (e, d) => { e.clear?.(); for (let i = 0; i < 6; i++) e.drop(Math.random() * d.W, Math.random() * d.H, 14, 0.95) },
})

demo.cv.addEventListener("pointerdown", (e) => {
  painting = true; lastX = e.offsetX; lastY = e.offsetY
  try { demo.cv.setPointerCapture(e.pointerId) } catch {}
  drop(e.offsetX, e.offsetY)
})
demo.cv.addEventListener("pointermove", (e) => { if (painting) strokeTo(e.offsetX, e.offsetY) })
demo.cv.addEventListener("pointerup", (e) => { painting = false; try { demo.cv.releasePointerCapture(e.pointerId) } catch {} })
demo.cv.addEventListener("pointerleave", () => { painting = false })
</script>
</body>
</html>
