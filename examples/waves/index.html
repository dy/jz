<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo } from "../lib/jzdemo.js"

// The 2D wave equation: each drop rings out slowly, trails a soft wake, fades, and glows where waves cross.
let frameCount = 0, nextDrop = 20, lastStepMs = 0, painting = false, lastX = 0, lastY = 0

const drop = (x, y) => { if (demo.engine) demo.engine.drop(x * demo.W / demo.cv.clientWidth, y * demo.H / demo.cv.clientHeight) }
const strokeTo = (x, y) => {
  const dx = x - lastX, dy = y - lastY, n = Math.max(1, Math.ceil(Math.hypot(dx, dy) / 14))
  for (let i = 1; i <= n; i++) drop(lastX + dx * i / n, lastY + dy * i / n)
  lastX = x; lastY = y
}

const demo = runDemo({
  name: "waves",
  hint: "the 2D wave equation — ripples ring out slowly, fade, and glow where they cross · click to drop one",
  size: { budget: 420000 },
  bg: "#000",
  load: (e) => e.clear(),
  frame: (e) => {
    // throttle to ~60 Hz of real time so the deceleration plays at a steady pace on any display
    const now = performance.now()
    if (now - lastStepMs < 15) return
    lastStepMs = now
    frameCount++
    if (frameCount > nextDrop) {
      // the waves are slow and fade as they spread, so two far-apart drops never meet while still bright.
      // Drop a small BURST of a couple of near-simultaneous drops a short distance apart, at a random
      // spot: their fresh rings expand into each other and glint — different circles interfering, which is
      // the whole point. A fresh lone ring stays dim; only the overlap glows.
      const cx = demo.W * (0.2 + Math.random() * 0.6), cy = demo.H * (0.2 + Math.random() * 0.6)
      const a0 = Math.random() * 6.283, gap = 34 + Math.random() * 16
      const k = 2 + (Math.random() * 2 | 0)               // 2-3 circles
      for (let i = 0; i < k; i++) { const ang = a0 + i * 6.283 / k; e.drop(cx + Math.cos(ang) * gap, cy + Math.sin(ang) * gap) }
      nextDrop = frameCount + 120 + Math.random() * 60     // ~2-3s between bursts
    }
    e.frame(0)
  },
  // re-roll: clear and scatter a few fresh rings that immediately cross
  randomize: (e, d) => { e.clear?.(); for (let i = 0; i < 5; i++) e.drop(Math.random() * d.W, Math.random() * d.H) },
})

demo.cv.addEventListener("pointerdown", (e) => {
  painting = true; lastX = e.offsetX; lastY = e.offsetY
  try { demo.cv.setPointerCapture(e.pointerId) } catch {}
  drop(e.offsetX, e.offsetY)
})
demo.cv.addEventListener("pointermove", (e) => { if (painting) strokeTo(e.offsetX, e.offsetY) })
demo.cv.addEventListener("pointerup", (e) => { painting = false; try { demo.cv.releasePointerCapture(e.pointerId) } catch {} })
demo.cv.addEventListener("pointerleave", () => { painting = false })
</script>
</body>
</html>
