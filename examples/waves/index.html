<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<title>Wave ripples - jz</title>
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; background: #808080; color: #111;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  body { border-top: 2px solid #ddd; }
  #c { position: fixed; inset: 0; width: 100%; height: 100%; display: block; image-rendering: pixelated; cursor: crosshair; }
  #hint { position: fixed; left: 0; right: 0; bottom: 20px; text-align: center; z-index: 20;
    font-size: 13px; color: #333; opacity: .8; pointer-events: none; transition: opacity .5s; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">two driven sources — wavefronts interfere into standing fringes · click to drop a ripple</div>

<script type="module">
import { loadEngine, hud } from "../lib/jzdemo.js"

const cv = document.getElementById("c"), g = cv.getContext("2d")
let W = 0, H = 0, img, out32, px

const sizeTo = (engine) => {
  const budget = 420000
  let scale = Math.min(1, window.devicePixelRatio || 1)
  const want = innerWidth * innerHeight * scale * scale
  if (want > budget) scale *= Math.sqrt(budget / want)
  W = Math.round(innerWidth * scale) >> 1 << 1
  H = Math.round(innerHeight * scale) >> 1 << 1
  cv.width = W; cv.height = H
  img = g.createImageData(W, H); out32 = new Uint32Array(img.data.buffer)
  px = engine.resize(W, H)
}

// two in-phase driven oscillators set up the standing interference pattern. Stored in cell
// coords, so re-place them whenever the buffer is (re)sized.
let srcAngle = 0, srcSep = 0.13
const placeSources = () => {
  if (!engine?.source) return
  const f = 0.22, amp = 0.5, R = Math.min(W, H) * srcSep
  const cxp = W / 2, cyp = H / 2, ca = Math.cos(srcAngle), sa = Math.sin(srcAngle)
  engine.source(0, cxp - R * ca, cyp - R * sa, f, amp)
  engine.source(1, cxp + R * ca, cyp + R * sa, f, amp)
}

let engine = null, gen = 0
const setEngine = async (kind) => {
  const my = ++gen
  const e = await loadEngine(kind, { js: "./waves.js", wasm: "./waves.wasm" })
  if (my !== gen) return
  engine = e; sizeTo(engine); engine.clear(); placeSources()
}
addEventListener("resize", () => { if (engine) { sizeTo(engine); placeSources() } })

const hint = document.getElementById("hint")
let painting = false, lastX = 0, lastY = 0
const drop = (x, y) => { if (engine) engine.drop(x * W / cv.clientWidth, y * H / cv.clientHeight, 4, 1.2) }
const strokeTo = (x, y) => {
  const dx = x - lastX, dy = y - lastY, n = Math.max(1, Math.ceil(Math.hypot(dx, dy) / 5))
  for (let i = 1; i <= n; i++) drop(lastX + dx * i / n, lastY + dy * i / n)
  lastX = x; lastY = y
}
cv.addEventListener("pointerdown", (e) => { painting = true; lastX = e.offsetX; lastY = e.offsetY; try { cv.setPointerCapture(e.pointerId) } catch {}; drop(e.offsetX, e.offsetY);})
cv.addEventListener("pointermove", (e) => { if (painting) strokeTo(e.offsetX, e.offsetY) })
cv.addEventListener("pointerup", (e) => { painting = false; try { cv.releasePointerCapture(e.pointerId) } catch {} })
cv.addEventListener("pointerleave", () => { painting = false })

// autonomous: the two sources run continuously; occasionally re-orient them and toss in a
// stray pulse so the fringe field keeps reshaping (screensaver).
let t = 0, nextDrop = 120, nextMove = 480
const loop = () => {
  requestAnimationFrame(loop)
  if (!engine) return
  t++
  if (t > nextDrop) {
    engine.drop(Math.random() * W, Math.random() * H, 4, 1.4)
    nextDrop = t + 160 + Math.random() * 220
  }
  if (t > nextMove) {
    srcAngle = Math.random() * Math.PI
    srcSep = 0.09 + Math.random() * 0.09
    placeSources()
    nextMove = t + 420 + Math.random() * 360
  }
  const t0 = performance.now()
  engine.frame(0)
  const ms = performance.now() - t0
  out32.set(px); g.putImageData(img, 0, 0)
  ui.frame(ms)
}

const ui = hud({
  kind: "jz",
  meter: new URLSearchParams(location.search).get("fps") !== "0",
  src: "https://github.com/dy/jz/tree/main/examples/waves",
  code: "./waves.js",
  nav: "waves",
  onSwitch: setEngine,
})
await setEngine(ui.kind)
loop()
</script>
</body>
</html>
