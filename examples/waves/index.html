<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo } from "../lib/jzdemo.js"

// Swimming-pool caustics (see waves.js — after KZ_LAB_E's caustics simulation): a calm
// viscous pool whose gentle swell folds sunlight into the classic slowly-shimmering caustic
// net. Click presses a dip — the water itself makes the ring. Drag is a STICK drawn through
// the water: one continuous wake. Scroll sets the POOL DEPTH (shallow barely bends the
// light, deep folds every ripple hard). Dice throws a few drops.
let foc = 240                         // pool depth (focal length of the refraction)
let down = false, stick = false       // stick engages only after real movement — a clean
let sx = 0, sy = 0, dx0 = 0, dy0 = 0  // click must NOT press the stick under its own drop

const demo = runDemo({
  name: "waves",
  hint: "a calm pool folding sunlight — real caustics · click to drop · drag a stick through the water · scroll = depth",
  size: { budget: 420000 },
  bg: "#2b98ac",
  load: (e) => { e.clear() },
  frame: (e, t) => { e.frame(t, sx, sy, stick ? 1.0 : 0.0, foc) },
  randomize: (e, d) => {
    for (let i = 0; i < 3; i++) e.drop(d.W * (0.15 + Math.random() * 0.7), d.H * (0.15 + Math.random() * 0.7))
  },
})

const toPx = (e) => {
  const r = demo.cv.getBoundingClientRect()
  sx = (e.clientX - r.left) / r.width * demo.W
  sy = (e.clientY - r.top) / r.height * demo.H
}
demo.cv.addEventListener("pointerdown", (e) => {
  toPx(e)
  down = true; stick = false; dx0 = sx; dy0 = sy
  try { demo.cv.setPointerCapture(e.pointerId) } catch {}
})
demo.cv.addEventListener("pointermove", (e) => {
  if (!down) return
  toPx(e)
  if (!stick && Math.hypot(sx - dx0, sy - dy0) > 8) stick = true   // it's a drag — engage the stick
})
demo.cv.addEventListener("pointerup", (e) => {
  if (down && !stick) demo.engine?.drop(dx0, dy0)                  // it was a clean click — drop
  down = false; stick = false
  try { demo.cv.releasePointerCapture(e.pointerId) } catch {}
})
demo.cv.addEventListener("pointerleave", () => { down = false; stick = false })
demo.cv.addEventListener("wheel", (e) => {
  e.preventDefault()
  foc *= Math.exp(-e.deltaY * 0.001)
  if (foc < 80) foc = 80
  if (foc > 360) foc = 360
}, { passive: false })
</script>
</body>
</html>
