<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo } from "../lib/jzdemo.js"

// 2D wave-equation drops: each front bursts out, slows as it damps, trails an oscillating wake,
// and interferes with its neighbours — the crossings glare. Drops are kept a minimum distance
// apart (esp. on drag) so near-identical rings don't stack into one smeared front.
const REACHFRAC = 0.34                // ≈ how far a front reaches before it fades — sets drop spacing
let nextDropMs = 0, painting = false, lastX = 0, lastY = 0
let ldx = -1, ldy = -1                // last emitted drop, in canvas pixels

const rmaxPx = () => REACHFRAC * Math.min(demo.W, demo.H)
const minDist = () => 0.22 * rmaxPx()   // rings must differ enough to cross, not stack
const clampX = (v) => v < 12 ? 12 : v > demo.W - 12 ? demo.W - 12 : v
const clampY = (v) => v < 12 ? 12 : v > demo.H - 12 ? demo.H - 12 : v

// emit a drop in canvas coords, but skip it if it's closer than minDist to the last one (unless forced)
const emit = (cx, cy, force) => {
  if (!demo.engine) return
  if (!force && ldx >= 0) { const dx = cx - ldx, dy = cy - ldy, md = minDist(); if (dx * dx + dy * dy < md * md) return }
  demo.engine.drop(cx, cy); ldx = cx; ldy = cy
}
const dropClient = (x, y, force) => emit(x * demo.W / demo.cv.clientWidth, y * demo.H / demo.cv.clientHeight, force)
const strokeTo = (x, y) => {
  const dx = x - lastX, dy = y - lastY, n = Math.max(1, Math.ceil(Math.hypot(dx, dy) / 8))
  for (let i = 1; i <= n; i++) dropClient(lastX + dx * i / n, lastY + dy * i / n, false)   // minDist thins these
  lastX = x; lastY = y
}

const demo = runDemo({
  name: "waves",
  hint: "the 2D wave equation (nonlinear) — drops burst out, slow, and interfere; crossings glare · click or drag to drop",
  size: { budget: 420000 },
  bg: "#000",
  load: (e) => { e.clear(); ldx = -1; ldy = -1; nextDropMs = 0 },
  frame: (e) => {
    // the kernel paces itself against this clock — no throttle needed, any refresh rate
    const now = performance.now()
    if (nextDropMs === 0) nextDropMs = now + 500
    if (now > nextDropMs) {
      // place the next ring near the last (so the circles overlap & cross), but at least minDist away;
      // occasionally jump somewhere fresh so the activity spreads across the field.
      if (ldx >= 0 && Math.random() < 0.7) {
        const ang = Math.random() * 6.283, rad = minDist() + Math.random() * rmaxPx()
        emit(clampX(ldx + Math.cos(ang) * rad), clampY(ldy + Math.sin(ang) * rad), true)
      } else {
        emit(demo.W * (0.18 + Math.random() * 0.64), demo.H * (0.18 + Math.random() * 0.64), true)
      }
      nextDropMs = now + 1200 + Math.random() * 800    // ~1.2-2s → several fronts in flight
    }
    e.frame(now * 0.001)
  },
  randomize: (e, d) => { e.clear?.(); ldx = -1; ldy = -1; for (let i = 0; i < 4; i++) emit(d.W * (0.3 + Math.random() * 0.4), d.H * (0.3 + Math.random() * 0.4), true) },
})

demo.cv.addEventListener("pointerdown", (e) => {
  painting = true; lastX = e.offsetX; lastY = e.offsetY
  try { demo.cv.setPointerCapture(e.pointerId) } catch {}
  dropClient(e.offsetX, e.offsetY, true)       // a deliberate click always drops
})
demo.cv.addEventListener("pointermove", (e) => { if (painting) strokeTo(e.offsetX, e.offsetY) })
demo.cv.addEventListener("pointerup", (e) => { painting = false; try { demo.cv.releasePointerCapture(e.pointerId) } catch {} })
demo.cv.addEventListener("pointerleave", () => { painting = false })
</script>
</body>
</html>
