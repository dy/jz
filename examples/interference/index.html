<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, trackPointer } from "../lib/jzdemo.js"

// Drag to place the two wave sources; they stay where you leave them and the field
// keeps rippling (double-click to resume the orbiting sources).
const step = 0.012
let tick = 0.0
const demo = runDemo({
  name: "interference",
  hint: "two-source wave interference · drag the sources, double-click to resume",
  size: { dpr: 1, budget: null },
  frame: (e) => {
    if (ptr.down && e.setSources) {
      const x1 = ptr.x * demo.W, y1 = ptr.y * demo.H
      const x2 = (1 - ptr.x) * demo.W, y2 = (1 - ptr.y) * demo.H
      e.setSources(x1, y1, x2, y2)
    }
    e.update(tick += step)
  },
})

const ptr = trackPointer(demo.cv)
demo.cv.addEventListener("dblclick", () => demo.engine?.resume?.())
</script>
</body>
</html>
