<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<title>Interference effect - jz</title>
<link rel="icon" href="https://github.com/evanw/jz/favicon.ico" type="image/x-icon"/>
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; color: #111; background: #fff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  body { border-top: 2px solid #ddd; }
  canvas { position: fixed; inset: 0; width: 100%; height: 100%; background: #000; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<script type="module">
import { loadEngine, hud, trackPointer } from "../lib/jzdemo.js";

const urls = { js: "./interference.js", wasm: "./interference.wasm" };
const canvas = document.getElementById("canvas");
const context = canvas.getContext("2d");
var step = 0.012;

const h = hud({ kind: "jz", hint: "two-source wave interference · drag the sources, double-click to resume", src: "https://github.com/dy/jz/tree/main/examples/interference", code: "./interference.js", nav: "interference", onSwitch: start });

let gen = 0;
async function start(kind) {
  const my = ++gen;
  const engine = await loadEngine(kind, urls);

  let width, height, image, mem;
  const onresize = () => {
    const dpr = Math.min(1, window.devicePixelRatio || 1);   // wave field per pixel — full screen at CSS-pixel res
    width = Math.round(canvas.offsetWidth * dpr);
    height = Math.round(canvas.offsetHeight * dpr);
    canvas.width = width;
    canvas.height = height;
    image = context.createImageData(width, height);
    mem = engine.resize(width, height); // typed array: JS buffer or wasm view
  };
  onresize();
  window.onresize = onresize;

  // Drag to place the two wave sources; they stay where you leave them and the field
  // keeps rippling (double-click to resume the orbiting sources).
  const ptr = trackPointer(canvas)
  canvas.addEventListener("dblclick", () => engine.resume?.())
  let tick = 0.0;
  (function update() {
    if (my !== gen) return; // a newer engine took over
    requestAnimationFrame(update);
    if (ptr.down && engine.setSources) {
      const x1 = ptr.x * width, y1 = ptr.y * height
      const x2 = (1 - ptr.x) * width, y2 = (1 - ptr.y) * height
      engine.setSources(x1, y1, x2, y2)
    }
    const t0 = performance.now();
    engine.update(tick += step);
    const work = performance.now() - t0;
    h.paint(mem, new Uint32Array(image.data.buffer));
    context.putImageData(image, 0, 0);
    h.frame(work);
  })();
}
start(h.kind);
</script>
</body>
</html>
