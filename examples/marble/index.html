<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<title>Paper marbling - jz</title>
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; background: #fff; color: #222;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  body { border-top: 2px solid #ddd; }
  #c { position: fixed; inset: 0; width: 100%; height: 100%; display: block; cursor: crosshair; }
  #hint { position: fixed; left: 0; right: 0; bottom: 20px; text-align: center; z-index: 20;
    font-size: 13px; color: #999; opacity: .85; pointer-events: none; transition: opacity .5s; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">paper marbling — drag to comb the ink</div>

<script type="module">
import { loadEngine, hud } from "../lib/jzdemo.js"

const cv = document.getElementById("c"), g = cv.getContext("2d")
let W = 0, H = 0, img, out32, px

const sizeTo = (engine) => {
  const budget = 300000
  let scale = Math.min(1, window.devicePixelRatio || 1)
  const want = innerWidth * innerHeight * scale * scale
  if (want > budget) scale *= Math.sqrt(budget / want)
  W = Math.round(innerWidth * scale) >> 1 << 1
  H = Math.round(innerHeight * scale) >> 1 << 1
  cv.width = W; cv.height = H
  img = g.createImageData(W, H); out32 = new Uint32Array(img.data.buffer)
  px = engine.resize(W, H)
}

let engine = null, gen = 0
const setEngine = async (kind) => {
  const my = ++gen
  const e = await loadEngine(kind, { js: "./marble.js", wasm: "./marble.wasm" })
  if (my !== gen) return
  engine = e; sizeTo(engine); engine.clear()
  // a few starting drops
  for (let i = 0; i < 9; i++) engine.drop((0.15 + i * 0.09) * W, (0.4 + (i % 2) * 0.2) * H, W * 0.04)
}
addEventListener("resize", () => engine && sizeTo(engine))

const hint = document.getElementById("hint")
const sx = () => W / cv.clientWidth, sy = () => H / cv.clientHeight
let combing = false, lastX = 0, lastY = 0
cv.addEventListener("pointerdown", (e) => {
  if (!engine) return
  combing = true; lastX = e.offsetX; lastY = e.offsetY
  try { cv.setPointerCapture(e.pointerId) } catch {}
  engine.drop(e.offsetX * sx(), e.offsetY * sy(), W * 0.04)   // click drops ink
})
cv.addEventListener("pointermove", (e) => {
  if (!combing || !engine) return
  engine.tine(lastX * sx(), lastY * sy(), e.offsetX * sx(), e.offsetY * sy())
  lastX = e.offsetX; lastY = e.offsetY
})
cv.addEventListener("pointerup", (e) => { combing = false; try { cv.releasePointerCapture(e.pointerId) } catch {} })
cv.addEventListener("pointerleave", () => { combing = false })

let t = 0, nextDrop = 60
const loop = () => {
  requestAnimationFrame(loop)
  if (!engine) return
  t += 1
  if (t > nextDrop) {                       // auto-drop ink so the bath never empties
    engine.drop(Math.random() * W, Math.random() * H, W * 0.035)
    nextDrop = t + 90 + Math.random() * 120
  }
  const t0 = performance.now()
  engine.frame(t * 0.05)
  const ms = performance.now() - t0
  out32.set(px); g.putImageData(img, 0, 0)
  ui.frame(ms)
}

const ui = hud({
  kind: "jz",
  meter: new URLSearchParams(location.search).get("fps") !== "0",
  src: "https://github.com/dy/jz/tree/main/examples/marble",
  code: "./marble.js",
  nav: "marble",
  onSwitch: setEngine,
})
await setEngine(ui.kind)
loop()
</script>
</body>
</html>
