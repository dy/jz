<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo } from "../lib/jzdemo.js"

let t = 0, nextDrop = 60
const demo = runDemo({
  name: "marble",
  hint: "paper marbling — drag to comb the ink",
  size: { budget: 300000 },
  bg: "#fff",
  load: (e) => {
    e.clear()
    for (let i = 0; i < 9; i++) e.drop((0.15 + i * 0.09) * demo.W, (0.4 + (i % 2) * 0.2) * demo.H, demo.W * 0.04)
  },
  frame: (e) => {
    t += 1
    if (t > nextDrop) {
      e.drop(Math.random() * demo.W, Math.random() * demo.H, demo.W * 0.035)
      nextDrop = t + 90 + Math.random() * 120
    }
    e.frame(t * 0.05)
  },
  // re-roll: fresh ink stones, then a few random comb strokes to swirl them
  randomize: (e, d) => {
    e.clear()
    for (let i = 0; i < 9; i++) e.drop(Math.random() * d.W, Math.random() * d.H, d.W * (0.025 + Math.random() * 0.03))
    for (let i = 0; i < 6; i++) e.tine?.(Math.random() * d.W, Math.random() * d.H, Math.random() * d.W, Math.random() * d.H)
  },
})

const sx = () => demo.W / demo.cv.clientWidth, sy = () => demo.H / demo.cv.clientHeight
let combing = false, lastX = 0, lastY = 0
demo.cv.addEventListener("pointerdown", (e) => {
  if (!demo.engine) return
  combing = true; lastX = e.offsetX; lastY = e.offsetY
  try { demo.cv.setPointerCapture(e.pointerId) } catch {}
  demo.engine.drop(e.offsetX * sx(), e.offsetY * sy(), demo.W * 0.04)
})
demo.cv.addEventListener("pointermove", (e) => {
  if (!combing || !demo.engine) return
  demo.engine.tine(lastX * sx(), lastY * sy(), e.offsetX * sx(), e.offsetY * sy())
  lastX = e.offsetX; lastY = e.offsetY
})
demo.cv.addEventListener("pointerup", (e) => { combing = false; try { demo.cv.releasePointerCapture(e.pointerId) } catch {} })
demo.cv.addEventListener("pointerleave", () => { combing = false })
</script>
</body>
</html>
