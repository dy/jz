<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, panZoom } from "../lib/jzdemo.js"

// The complex plane is a proper pan/zoom view now (drag to pan, scroll to zoom, double-click to
// reset) — c keeps orbiting on its own so the zeros and poles drift through whatever you frame.
const home = { cx: 0, cy: 0, scale: 2.5 }
const view = { ...home }
let cPhase = 0
const demo = runDemo({
  name: "domain-color",
  hint: "Domain coloring of f(z) = (z²−1)(z−c)/(z²+1) — drag to pan · scroll to zoom",
  frame: (e, t) => {
    // c orbits slowly: zeros and poles drift
    const cx = Math.cos(t * 0.23 + cPhase) * 0.4
    const cy = Math.sin(t * 0.17 + cPhase) * 0.4
    e.frame(t, cx, cy, view.cx, view.cy, view.scale)
  },
  // re-frame to a fresh region of the landscape + jump the moving zero
  randomize: () => { view.cx = (Math.random() - 0.5) * 2.2; view.cy = (Math.random() - 0.5) * 2.2; view.scale = 1.6 + Math.random() * 1.8; cPhase = Math.random() * 6.2832 },
})
panZoom(demo.cv, view, home, () => {})
</script>
</body>
</html>
