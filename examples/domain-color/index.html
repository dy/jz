<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, trackPointer } from "../lib/jzdemo.js"

let panX = 0.0, panY = 0.0, userSet = false
const demo = runDemo({
  name: "domain-color",
  hint: "Domain coloring of f(z) = (z²−1)(z−c)/(z²+1) — drag to pan the complex plane",
  frame: (e, t) => {
    // c orbits slowly: zeros and poles drift
    const cx = Math.cos(t * 0.23) * 0.4
    const cy = Math.sin(t * 0.17) * 0.4
    if (ptr.down) {
      panX = (ptr.x - 0.5) * -2.0
      panY = (ptr.y - 0.5) * 2.0
      userSet = true
    }
    e.frame(t, cx, cy, panX, panY)
  },
})
const ptr = trackPointer(demo.cv)
</script>
</body>
</html>
