<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<title>Mandelbrot set - jz</title>
<link rel="icon" href="https://github.com/evanw/jz/favicon.ico" type="image/x-icon" />
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; color: #111; background: #fff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  /* scope to DIRECT body children only — a bare `canvas` rule also hits the HUD's nested
     sparkline <canvas> and pins it top-left. body > canvas matches just the demo + gradient. */
  body > canvas { position: fixed; inset: 0; width: 100%; height: 100%; background: #eee; }
  body > canvas.gradient { inset: 0 0 auto 0; height: 3px; z-index: 1; }
</style>
</head>
<body>
<canvas></canvas>
<script type="module">
import { loadEngine, hud } from "../lib/jzdemo.js";

// One source both ways: the JS toggle imports mandelbrot.js, the jz toggle runs the SAME file
// compiled to wasm — where jz's escape-time vectorizer lifts the inner loop to f64x2 on its own
// (no hand-written SIMD kernel needed). Same image, large bail-out smooth colour.
const urls = { js: "./mandelbrot.js", wasm: "./mandelbrot.wasm" };

// Set up the canvas with a 2D rendering context
const cnv = document.getElementsByTagName("canvas")[0];
const ctx = cnv.getContext("2d");
// Build the masthead + bottom bar first so the canvas-fit framing is applied before we
// measure — the backing then matches the framed box (fills edge-to-edge, no letterbox).
const h = hud({ kind: "jz", hint: "the Mandelbrot set · scroll to zoom, double-click to reset", src: "https://github.com/dy/jz/tree/main/examples/mandelbrot", code: "./mandelbrot.js", nav: "mandelbrot", onSwitch: start });

// Viewport size — the framed canvas box at CSS-pixel res (every frame recomputes the whole
// set, so we don't multiply by DPR: retina would 4× the per-frame cost).
const bcr = cnv.getBoundingClientRect();
const width  = bcr.width  | 0;
const height = bcr.height | 0;
cnv.width  = width;
cnv.height = height;
const imageData = ctx.createImageData(width, height);
const argb = new Uint32Array(imageData.data.buffer);

let gen = 0, engine, mem;

// View state in complex-plane coordinates: (cx,cy) center, zoom = complex units per pixel.
const view = { cx: 0, cy: 0, zoom: 0 };
let homeZoom = 0;   // the reset zoom — reference for how deep we've zoomed (drives the iteration budget)
let dirty = true;   // recompute only when the view changed — a static set needn't be re-rendered 60×/s
const resetView = () => {
  const s = 10.0 / (3 * width < 4 * height ? 3 * width : 4 * height);
  view.cx = (width * 0.5 - width * (1.0 / 1.6)) * s;
  view.cy = 0;
  view.zoom = s;
  homeZoom = s;
  dirty = true;
  if (engine?.setView) engine.setView(view.cx, view.cy, view.zoom);
};

async function start(kind) {
  const my = ++gen;
  engine = await loadEngine(kind, urls);
  mem = engine.resize(width, height); // Uint16Array: JS buffer or wasm view
  resetView();

  (function render() {
    if (my !== gen) return;
    requestAnimationFrame(render);

    // Recompute only when the view moved. A static Mandelbrot is identical frame to frame, so once
    // it's drawn we just keep the last image (the FPS meter ticks on; the ms holds its last value).
    if (!dirty) { h.frame(); return; }
    dirty = false;

    // One-directional quality: a stable base iteration count, raised with zoom DEPTH so deeper views
    // resolve the boundary crisply instead of going blocky. No breathing oscillation — that flickered
    // detail in and out ("reverse animation") and never helped. +48 iterations per 2× zoom, capped.
    const depth = homeZoom > 0 ? Math.max(0, Math.log2(homeZoom / view.zoom)) : 0;
    const limit = Math.min(1500, 80 + Math.round(depth * 48));
    const t0 = performance.now();
    for (let y = 0; y < height; ++y) engine.computeLine(y, width, height, limit);
    const work = performance.now() - t0;
    for (let i = 0, n = width * height; i < n; ++i) argb[i] = colors[mem[i]];
    h.paint(argb, argb);
    ctx.putImageData(imageData, 0, 0);
    h.frame(work);
  })();
}
start(h.kind);

// Pan / zoom / reset interactions.
let dragging = false, lastX = 0, lastY = 0;
cnv.addEventListener('pointerdown', e => {
  dragging = true;
  lastX = e.clientX; lastY = e.clientY;
  try { cnv.setPointerCapture(e.pointerId) } catch {}
});
cnv.addEventListener('pointermove', e => {
  if (!dragging) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  view.cx -= dx * view.zoom;
  view.cy -= dy * view.zoom;
  dirty = true;
  if (engine?.setView) engine.setView(view.cx, view.cy, view.zoom);
});
cnv.addEventListener('pointerup', e => { dragging = false; try { cnv.releasePointerCapture(e.pointerId) } catch {} });
cnv.addEventListener('pointerleave', () => { dragging = false });
cnv.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = cnv.getBoundingClientRect();
  const pxX = e.clientX - rect.left, pxY = e.clientY - rect.top;
  const k = Math.exp(e.deltaY * 0.001);   // scroll up → zoom IN (consistent with julia / ship / buddhabrot)
  const preX = view.cx + (pxX - width * 0.5) * view.zoom;
  const preY = view.cy + (pxY - height * 0.5) * view.zoom;
  view.zoom *= k;
  view.cx = preX - (pxX - width * 0.5) * view.zoom;
  view.cy = preY - (pxY - height * 0.5) * view.zoom;
  dirty = true;
  if (engine?.setView) engine.setView(view.cx, view.cy, view.zoom);
}, { passive: false });
cnv.addEventListener('dblclick', resetView);

// Compute a nice set of colors using a gradient
const colors = (() => {
  const cnv  = document.createElement("canvas");
  cnv.width  = 2048;
  cnv.height = 1;
  const ctx = cnv.getContext("2d");
  const grd = ctx.createLinearGradient(0, 0, 2048, 0);
  grd.addColorStop(0.0000, "#000000");
  grd.addColorStop(0.1600, "#555555");
  grd.addColorStop(0.4200, "#ffffff");
  grd.addColorStop(0.6425, "#cccccc");
  grd.addColorStop(0.8575, "#000000");
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, 2048, 1);
  cnv.className = "gradient";
  setTimeout(() => document.body.appendChild(cnv));
  return new Uint32Array(ctx.getImageData(0, 0, 2048, 1).data.buffer);
})();
</script>
</body>
</html>
