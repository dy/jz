<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<title>Mandelbrot set - jz</title>
<link rel="icon" href="https://github.com/evanw/jz/favicon.ico" type="image/x-icon" />
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; color: #111; background: #fff; font-family: sans-serif; }
  h1 { padding: 20px; font-size: 12pt; margin: 0; }
  a { color: #111; text-decoration: none; }
  a:hover { color: #0074C1; text-decoration: underline; }
  h1 .src { display: inline-flex; align-items: center; margin-left: 6px; opacity: .45; vertical-align: middle; text-decoration: none; }
  h1 .src:hover { opacity: 1; color: #111; text-decoration: none; }
  canvas { position: absolute; top: 60px; left: 20px; width: calc(100% - 40px); height: calc(100% - 80px); background: #eee; }
  canvas.gradient { left: 0; top: 0px; height: 2px; width: 100%; }
</style>
</head>
<body>
<h1>
  <a href="https://en.wikipedia.org/wiki/Mandelbrot_set">Mandelbrot set</a> in
  <a href="https://github.com/dy/jz">jz</a>
  <a class="src" href="https://github.com/dy/jz/tree/main/examples/mandelbrot" title="source" aria-label="source"><svg viewBox="0 0 16 16" width="15" height="15" aria-hidden="true"><path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg></a>
</h1>
<canvas></canvas>
<script type="module">
import { loadEngine, hud } from "../lib/jzdemo.js";

const urls = { js: "./mandelbrot.js", wasm: "./mandelbrot.wasm" };

// Set up the canvas with a 2D rendering context
const cnv = document.getElementsByTagName("canvas")[0];
const ctx = cnv.getContext("2d");
const bcr = cnv.getBoundingClientRect();

// Viewport size (CSS pixels — every frame recomputes the whole set, so keep it sane)
const width  = bcr.width  | 0;
const height = bcr.height | 0;

cnv.width  = width;
cnv.height = height;

const imageData = ctx.createImageData(width, height);
const argb = new Uint32Array(imageData.data.buffer);

const h = hud({ kind: "jz", note: "full recompute / rAF", onSwitch: start });

let gen = 0;
async function start(kind) {
  const my = ++gen;
  const engine = await loadEngine(kind, urls);
  const mem = engine.resize(width, height); // Uint16Array: JS buffer or wasm view

  let t = 0;
  (function render() {
    if (my !== gen) return;
    requestAnimationFrame(render);

    // Breathing iteration limit gives motion, so the metric reflects real cost.
    const limit = 28 + (24 * (0.5 - 0.5 * Math.cos(t += 0.04))) | 0;
    const t0 = performance.now();
    for (let y = 0; y < height; ++y) engine.computeLine(y, width, height, limit);
    const work = performance.now() - t0;
    for (let i = 0, n = width * height; i < n; ++i) argb[i] = colors[mem[i]];
    ctx.putImageData(imageData, 0, 0);
    h.frame(work);
  })();
}
start(h.kind);

// Compute a nice set of colors using a gradient
const colors = (() => {
  const cnv  = document.createElement("canvas");
  cnv.width  = 2048;
  cnv.height = 1;
  const ctx = cnv.getContext("2d");
  const grd = ctx.createLinearGradient(0, 0, 2048, 0);
  grd.addColorStop(0.0000, "#000764");
  grd.addColorStop(0.1600, "#2068CB");
  grd.addColorStop(0.4200, "#EDFFFF");
  grd.addColorStop(0.6425, "#FFAA00");
  grd.addColorStop(0.8575, "#000200");
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, 2048, 1);
  cnv.className = "gradient";
  setTimeout(() => document.body.appendChild(cnv));
  return new Uint32Array(ctx.getImageData(0, 0, 2048, 1).data.buffer);
})();
</script>
</body>
</html>
