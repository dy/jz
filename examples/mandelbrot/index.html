<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<title>Mandelbrot set - jz</title>
<link rel="icon" href="https://github.com/evanw/jz/favicon.ico" type="image/x-icon" />
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; color: #111; background: #fff; font-family: sans-serif; }
  canvas { position: fixed; inset: 0; width: 100%; height: 100%; background: #eee; }
  canvas.gradient { inset: 0 0 auto 0; height: 3px; z-index: 1; }
</style>
</head>
<body>
<canvas></canvas>
<script type="module">
import { loadEngine, hud } from "../lib/jzdemo.js";

// jz runs the 4-wide SIMD kernel (mandelbrot.simd.js → .wasm); the JS toggle runs the
// scalar mandelbrot.js. Same image (large bail-out smooth colour), ~1.5–2.5× on jz.
const urls = { js: "./mandelbrot.js", wasm: "./mandelbrot.simd.wasm" };

// Set up the canvas with a 2D rendering context
const cnv = document.getElementsByTagName("canvas")[0];
const ctx = cnv.getContext("2d");
const bcr = cnv.getBoundingClientRect();

// Viewport size — full screen at CSS-pixel res (every frame recomputes the whole set,
// so we don't multiply by DPR: retina would 4× the per-frame cost).
const width  = bcr.width  | 0;
const height = bcr.height | 0;

cnv.width  = width;
cnv.height = height;

const imageData = ctx.createImageData(width, height);
const argb = new Uint32Array(imageData.data.buffer);

const h = hud({ kind: "jz", src: "https://github.com/dy/jz/tree/main/examples/mandelbrot", code: "./mandelbrot.js", nav: "mandelbrot", onSwitch: start });

let gen = 0;
async function start(kind) {
  const my = ++gen;
  const engine = await loadEngine(kind, urls);
  const mem = engine.resize(width, height); // Uint16Array: JS buffer or wasm view

  let t = 0;
  (function render() {
    if (my !== gen) return;
    requestAnimationFrame(render);

    // Breathing iteration limit gives motion, so the metric reflects real cost.
    const limit = 28 + (24 * (0.5 - 0.5 * Math.cos(t += 0.04))) | 0;
    const t0 = performance.now();
    for (let y = 0; y < height; ++y) engine.computeLine(y, width, height, limit);
    const work = performance.now() - t0;
    for (let i = 0, n = width * height; i < n; ++i) argb[i] = colors[mem[i]];
    ctx.putImageData(imageData, 0, 0);
    h.frame(work);
  })();
}
start(h.kind);

// Compute a nice set of colors using a gradient
const colors = (() => {
  const cnv  = document.createElement("canvas");
  cnv.width  = 2048;
  cnv.height = 1;
  const ctx = cnv.getContext("2d");
  const grd = ctx.createLinearGradient(0, 0, 2048, 0);
  grd.addColorStop(0.0000, "#000000");
  grd.addColorStop(0.1600, "#555555");
  grd.addColorStop(0.4200, "#ffffff");
  grd.addColorStop(0.6425, "#cccccc");
  grd.addColorStop(0.8575, "#000000");
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, 2048, 1);
  cnv.className = "gradient";
  setTimeout(() => document.body.appendChild(cnv));
  return new Uint32Array(ctx.getImageData(0, 0, 2048, 1).data.buffer);
})();
</script>
</body>
</html>
