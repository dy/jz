<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, trackPointer } from "../lib/jzdemo.js"

// Flow-Lenia (see lenia.js — after Waterflowing0's mass-conserving Lenia): creatures emerge
// from the soup and can never die out or bloom to white, because mass only MOVES. Drag
// shepherds them — the flow field gains a gentle pull toward the pointer, and whole creatures
// migrate. Shift-drag (or right-drag) pours fresh mass instead. Double-click or the dice
// reseed the soup.
const BR = 9
let herd = false, pour = false

const demo = runDemo({
  name: "lenia",
  hint: "Flow-Lenia — mass-conserving Lenia · drag shepherds the creatures · shift-drag pours mass · dice reseeds",
  size: { cap: 192 },              // six ring convolutions per cell — small grid, chunky creatures
  bg: "#000",
  load: (e) => e.seed(),
  frame: (e) => { e.frame(0.2, ptr.x * demo.W, ptr.y * demo.H, herd ? 1.0 : 0.0) },
  randomize: (e) => e.seed(),
})

const cv = demo.cv
const ptr = trackPointer(cv)
cv.addEventListener("contextmenu", (e) => e.preventDefault())   // allow right-drag without a context menu
cv.addEventListener("pointerdown", (e) => {
  if (e.shiftKey || e.button === 2) { pour = true; demo.engine?.seedBrush(ptr.x * demo.W, ptr.y * demo.H, BR) }
  else herd = true
  try { cv.setPointerCapture(e.pointerId) } catch {}
})
cv.addEventListener("pointermove", () => { if (pour) demo.engine?.seedBrush(ptr.x * demo.W, ptr.y * demo.H, BR) })
cv.addEventListener("pointerup", (e) => { herd = false; pour = false; try { cv.releasePointerCapture(e.pointerId) } catch {} })
cv.addEventListener("pointerleave", () => { herd = false; pour = false })
cv.addEventListener("dblclick", () => demo.engine?.seed())
</script>
</body>
</html>
