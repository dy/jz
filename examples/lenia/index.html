<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<title>Lenia - jz</title>
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; background: #07070c; color: #eee;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  body { border-top: 2px solid #ddd; }
  #c { position: fixed; inset: 0; width: 100%; height: 100%; display: block; image-rendering: pixelated; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script type="module">
import { loadEngine, hud, trackPointer } from "../lib/jzdemo.js"

const cv = document.getElementById("c"), g = cv.getContext("2d")
// Internal resolution: scaled to the screen aspect (no stretch), capped on the long
// side so the ring convolution (~230 entries/cell at R=9) stays real-time. Bigger and
// correctly-proportioned vs the old fixed 160×120.
const CAP = 340
const _ar = innerWidth / innerHeight
const IW = ((_ar >= 1 ? CAP : Math.round(CAP * _ar)) & ~1) || 2
const IH = ((_ar >= 1 ? Math.round(CAP / _ar) : CAP) & ~1) || 2
cv.width = IW; cv.height = IH

const img = g.createImageData(IW, IH)
const out32 = new Uint32Array(img.data.buffer)
let px = null

let engine = null, gen = 0

const setEngine = async (kind) => {
  const my = ++gen
  const e = await loadEngine(kind, { js: "./lenia.js", wasm: "./lenia.wasm" })
  if (my !== gen) return
  engine = e
  px = engine.resize(IW, IH)
  engine.seed()
}

// Drag to paint living "soup" that blooms into Lenia creatures; double-click to reseed.
// Stamps are interpolated along the drag so a fast stroke seeds a continuous trail.
const ptr = trackPointer(cv)
const BR = 11
let painting = false, lx = 0, ly = 0
const stamp = (px_, py_) => { if (engine) engine.seedBrush(px_ * IW, py_ * IH, BR) }
const strokeTo = (x, y) => {
  const dx = x - lx, dy = y - ly
  const n = Math.max(1, Math.ceil(Math.hypot(dx * IW, dy * IH) / (BR * 0.5)))
  for (let i = 1; i <= n; i++) stamp(lx + dx * i / n, ly + dy * i / n)
  lx = x; ly = y
}
cv.addEventListener("pointerdown", (e) => {
  painting = true; lx = ptr.x; ly = ptr.y
  try { cv.setPointerCapture(e.pointerId) } catch {}
  stamp(ptr.x, ptr.y)
})
cv.addEventListener("pointermove", () => { if (painting) strokeTo(ptr.x, ptr.y) })
cv.addEventListener("pointerup", (e) => { painting = false; try { cv.releasePointerCapture(e.pointerId) } catch {} })
cv.addEventListener("pointerleave", () => { painting = false })
cv.addEventListener("dblclick", () => { if (engine) { px = engine.resize(IW, IH); engine.seed() } })

const ui = hud({
  kind: "jz", hint: "Lenia — a continuous-kernel cellular automaton · double-click to reseed",
  meter: new URLSearchParams(location.search).get("fps") !== "0",
  src: "https://github.com/dy/jz/tree/main/examples/lenia",
  code: "./lenia.js",
  nav: "lenia",
  onSwitch: setEngine,
})

const loop = () => {
  requestAnimationFrame(loop)
  if (!engine || !px) return
  const t0 = performance.now()
  engine.frame(0.1)
  const ms = performance.now() - t0
  ui.paint(px, out32)
  g.putImageData(img, 0, 0)
  ui.frame(ms)
}

await setEngine(ui.kind)
loop()
</script>
</body>
</html>
