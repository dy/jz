<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<div id="tools">
  <button data-el="1" class="on">sand</button>
  <button data-el="2">water</button>
  <button data-el="3">wall</button>
  <button data-el="0">erase</button>
</div>

<script type="module">
import { runDemo } from "../lib/jzdemo.js"

// On load, strew the canvas with random walls, then sand & water blobs to settle.
const scatter = (engine, demo) => {
  for (let i = 0; i < 9; i++) engine.paint(Math.random() * demo.W, (0.45 + Math.random() * 0.5) * demo.H, 8 + Math.random() * 22 | 0, 3)
  for (let i = 0; i < 16; i++) engine.paint(Math.random() * demo.W, Math.random() * demo.H * 0.6, 12 + Math.random() * 20 | 0, Math.random() < 0.6 ? 1 : 2)
}

const demo = runDemo({
  name: "sand",
  hint: "a falling-sand automaton — pick a material and pour",
  size: { budget: 950000 },
  frame: (e) => e.frame(0),
  load: (e, d) => { e.clear(); scatter(e, d) },
})

// element selector
let el = 1, brush = 7
for (const b of document.querySelectorAll("#tools button"))
  b.onclick = () => { el = +b.dataset.el; document.querySelectorAll("#tools button").forEach(x => x.classList.toggle("on", x === b)) }

// drag to pour; interpolated so a fast stroke is continuous
let painting = false, lastX = 0, lastY = 0
const stamp = (x, y) => { demo.engine.paint(x * demo.W / demo.cv.clientWidth, y * demo.H / demo.cv.clientHeight, brush, el) }
const strokeTo = (x, y) => {
  const dx = x - lastX, dy = y - lastY, n = Math.max(1, Math.ceil(Math.hypot(dx, dy) / 3))
  for (let i = 1; i <= n; i++) stamp(lastX + dx * i / n, lastY + dy * i / n)
  lastX = x; lastY = y
}
demo.cv.addEventListener("pointerdown", (e) => { painting = true; lastX = e.offsetX; lastY = e.offsetY; try { demo.cv.setPointerCapture(e.pointerId) } catch {}; stamp(e.offsetX, e.offsetY) })
demo.cv.addEventListener("pointermove", (e) => { if (painting) strokeTo(e.offsetX, e.offsetY) })
demo.cv.addEventListener("pointerup", (e) => { painting = false; try { demo.cv.releasePointerCapture(e.pointerId) } catch {} })
demo.cv.addEventListener("pointerleave", () => { painting = false })
demo.cv.addEventListener("wheel", (e) => { e.preventDefault(); brush += e.deltaY > 0 ? -1 : 1; if (brush < 2) brush = 2; if (brush > 24) brush = 24 }, { passive: false })
</script>

<style>
  #tools { position: fixed; left: 50%; bottom: 64px; transform: translateX(-50%); z-index: 40;
    display: flex; gap: 1px; background: rgba(255,255,255,.16); border: 1px solid rgba(255,255,255,.16); }
  #tools button { border: 0; background: rgba(12,12,14,.82); color: #bbb; cursor: pointer;
    font: 600 11px 'Helvetica Neue', Helvetica, Arial, sans-serif; text-transform: uppercase;
    letter-spacing: .12em; padding: 8px 16px; backdrop-filter: blur(8px); }
  #tools button.on { background: #eee; color: #111; }
</style>
</body>
</html>
