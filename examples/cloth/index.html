<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo } from "../lib/jzdemo.js"

const demo = runDemo({
  name: "cloth",
  hint: "a spring-mass cloth — grab and swing it",
  size: { dpr: 1.5, budget: 600000 },
  bg: "#f3f1ec",
  cursor: "grab",
  frame: (e, t) => e.frame(t),
})

const sx = () => demo.W / demo.cv.clientWidth, sy = () => demo.H / demo.cv.clientHeight
let dragging = false
demo.cv.addEventListener("pointerdown", (e) => {
  if (!demo.engine) return
  dragging = true; demo.cv.style.cursor = "grabbing"
  try { demo.cv.setPointerCapture(e.pointerId) } catch {}
  demo.engine.grab(e.offsetX * sx(), e.offsetY * sy())
})
demo.cv.addEventListener("pointermove", (e) => { if (dragging && demo.engine) demo.engine.drag(e.offsetX * sx(), e.offsetY * sy()) })
demo.cv.addEventListener("pointerup", (e) => { dragging = false; demo.cv.style.cursor = "grab"; demo.engine?.release(); try { demo.cv.releasePointerCapture(e.pointerId) } catch {} })
demo.cv.addEventListener("pointerleave", () => { dragging = false; demo.cv.style.cursor = "grab"; demo.engine?.release() })
demo.cv.addEventListener("dblclick", () => demo.engine && demo.engine.init())
</script>
</body>
</html>
