<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, trackPointer } from "../lib/jzdemo.js"

let baseT = 2.269, userSet = false
const demo = runDemo({
  name: "ising",
  hint: "2D Ising model — drag ↕ to set temperature T (phase transition near Tc≈2.27)",
  size: { budget: 160000 },
  load: (e) => e.init?.(),
  frame: (e, t) => {
    // Start COLD (below Tc) so ordered domains nucleate and coarsen on screen right away, then
    // breathe slowly up across Tc (≈2.27) to melt into disorder and back — the order↔disorder
    // transition made visible. The old default sat AT/above Tc, so the first thing you saw was
    // paramagnetic noise. The periodic warm pass also un-sticks metastable stripe states.
    let T
    if (ptr.down) { T = 1.0 + ptr.y * 3.5; baseT = T; userSet = true }
    else T = userSet ? baseT : 2.10 - 0.55 * Math.cos(t * 0.13)
    e.frame(t, T)
  },
})
const ptr = trackPointer(demo.cv)
</script>
</body>
</html>
