<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, trackPointer } from "../lib/jzdemo.js"

// Press and hold to grow a new blob under the cursor; release to let it drift.
let holding = false
const demo = runDemo({
  name: "metaballs",
  hint: "metaballs — a 2D implicit surface · hold to grow one",
  size: { budget: 1000000, dpr: 2 },
  load: (e) => { e.init() },
  frame: (e, t) => {
    if (holding && e.grow) e.grow(ptr.x, ptr.y)
    e.frame(t)
  },
})

const ptr = trackPointer(demo.cv)
demo.cv.addEventListener("pointerdown", (e) => {
  holding = true
  try { demo.cv.setPointerCapture(e.pointerId) } catch {}
  demo.engine?.spawn?.(ptr.x, ptr.y)
})
demo.cv.addEventListener("pointerup", (e) => {
  holding = false; demo.engine?.release?.()
  try { demo.cv.releasePointerCapture(e.pointerId) } catch {}
})
demo.cv.addEventListener("pointerleave", () => { if (holding) { holding = false; demo.engine?.release?.() } })
</script>
</body>
</html>
