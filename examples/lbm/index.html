<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo } from "../lib/jzdemo.js"

// Hold to draw a circular obstacle under the cursor; it grows while held. Double-click resets.
let drawing = false, dx = 0, dy = 0, dr = 4
const sx = (d) => d.W / d.cv.clientWidth, sy = (d) => d.H / d.cv.clientHeight

const demo = runDemo({
  name: "lbm",
  hint: "lattice-Boltzmann flow — a von Kármán vortex street · hold to draw an obstacle",
  size: { budget: 170000 },
  frame: (e, t, d) => {
    if (drawing && e.addObstacle) { e.addObstacle(dx, dy, dr); dr = Math.min(dr + 0.8, (d.W < d.H ? d.W : d.H) * 0.25) }
    e.frame(0)
  },
})

const cv = demo.cv
cv.addEventListener("pointerdown", (e) => { drawing = true; dr = 4; dx = e.offsetX * sx(demo); dy = e.offsetY * sy(demo); try { cv.setPointerCapture(e.pointerId) } catch {} })
cv.addEventListener("pointermove", (e) => { dx = e.offsetX * sx(demo); dy = e.offsetY * sy(demo) })
cv.addEventListener("pointerup", (e) => { drawing = false; try { cv.releasePointerCapture(e.pointerId) } catch {} })
cv.addEventListener("pointerleave", () => { drawing = false })
cv.addEventListener("dblclick", () => demo.engine && demo.engine.reseed())
</script>
</body>
</html>
