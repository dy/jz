<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<title>Lattice-Boltzmann fluid - jz</title>
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; background: #808080; color: #111;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  body { border-top: 2px solid #ddd; }
  #c { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
  #hint { position: fixed; left: 0; right: 0; bottom: 20px; text-align: center; z-index: 20;
    font-size: 13px; color: #333; opacity: .8; pointer-events: none; transition: opacity .5s; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">lattice-Boltzmann flow — a von Kármán vortex street · hold to draw an obstacle</div>

<script type="module">
import { loadEngine, hud } from "../lib/jzdemo.js"

const cv = document.getElementById("c"), g = cv.getContext("2d")
let W = 0, H = 0, img, out32, px

const sizeTo = (engine) => {
  // 9 fields × substeps is heavy — cap the lattice, CSS upscales the smooth flow
  const budget = 170000
  let scale = Math.min(1, window.devicePixelRatio || 1)
  const want = innerWidth * innerHeight * scale * scale
  if (want > budget) scale *= Math.sqrt(budget / want)
  W = Math.round(innerWidth * scale) >> 1 << 1
  H = Math.round(innerHeight * scale) >> 1 << 1
  cv.width = W; cv.height = H
  img = g.createImageData(W, H); out32 = new Uint32Array(img.data.buffer)
  px = engine.resize(W, H)
}

let engine = null, gen = 0
const setEngine = async (kind) => {
  const my = ++gen
  const e = await loadEngine(kind, { js: "./lbm.js", wasm: "./lbm.wasm" })
  if (my !== gen) return
  engine = e; sizeTo(engine)
}
addEventListener("resize", () => engine && sizeTo(engine))

// hold to draw a circular obstacle under the cursor; it grows while held. double-click resets.
let drawing = false, dx = 0, dy = 0, dr = 4
const sx = () => W / cv.clientWidth, sy = () => H / cv.clientHeight
cv.addEventListener("pointerdown", (e) => { drawing = true; dr = 4; dx = e.offsetX * sx(); dy = e.offsetY * sy(); try { cv.setPointerCapture(e.pointerId) } catch {} })
cv.addEventListener("pointermove", (e) => { dx = e.offsetX * sx(); dy = e.offsetY * sy() })
cv.addEventListener("pointerup", (e) => { drawing = false; try { cv.releasePointerCapture(e.pointerId) } catch {} })
cv.addEventListener("pointerleave", () => { drawing = false })
cv.addEventListener("dblclick", () => engine && engine.reseed())

const loop = () => {
  requestAnimationFrame(loop)
  if (!engine) return
  if (drawing && engine.addObstacle) { engine.addObstacle(dx, dy, dr); dr = Math.min(dr + 0.8, (W < H ? W : H) * 0.25) }
  const t0 = performance.now()
  engine.frame(0)
  const ms = performance.now() - t0
  out32.set(px); g.putImageData(img, 0, 0)
  ui.frame(ms)
}

const ui = hud({
  kind: "jz",
  meter: new URLSearchParams(location.search).get("fps") !== "0",
  src: "https://github.com/dy/jz/tree/main/examples/lbm",
  code: "./lbm.js",
  nav: "lbm",
  onSwitch: setEngine,
})
await setEngine(ui.kind)
loop()
</script>
</body>
</html>
