<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, trackPointer } from "../lib/jzdemo.js"

const demo = runDemo({
  name: "sph",
  hint: "SPH fluid — smoothed-particle hydrodynamics · drag to push it",
  size: { budget: 500000 },
  load: (e) => e.init(),
  frame: (e) => { if (e.setPointer) e.setPointer(ptr.x, ptr.y, ptr.down ? 1 : 0); e.frame(0) },
})
const ptr = trackPointer(demo.cv)
demo.cv.addEventListener("dblclick", () => demo.engine && demo.engine.init())
</script>
</body>
</html>
