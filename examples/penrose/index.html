<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, trackPointer } from "../lib/jzdemo.js"

let baseRot = 0, userSet = false
const demo = runDemo({
  name: "penrose",
  hint: "Penrose P3 tiling — aperiodic order from the golden ratio — drag to rotate",
  frame: (e, t) => {
    let rot, zoom
    if (ptr.down) {
      rot = (ptr.x * 2 - 1) * Math.PI
      baseRot = rot; userSet = true
    } else {
      rot = baseRot + (userSet ? 0 : t * 0.04)
    }
    zoom = 1.0 + 0.08 * Math.sin(t * 0.31)
    e.frame(t, rot, zoom)
  },
})
const ptr = trackPointer(demo.cv)
</script>
</body>
</html>
