<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, panZoom } from "../lib/jzdemo.js"

// Penrose P3 tiling — infinite aperiodic order from φ. Every finite patch appears infinitely
// often, yet the whole never repeats. Seven rounds of golden-ratio deflation grow ~6100 triangles;
// the slow idle rotation reveals five-fold local symmetry. Pan, zoom, and explore: no level of
// detail repeats, but every neighborhood looks familiar.
//
// Gold = fat Robinson triangles (forming fat rhombi), indigo = thin (forming thin rhombi).
// Black 1-px edges separate tiles so the aperiodic geometry reads at a glance.
// Drag to pan · scroll to zoom · double-click to reset.

// the deflated patch is the unit decagon — scale 0.45 overfills a wide viewport with it
const view = { cx: 0, cy: 0, scale: 0.45 }
const home = { cx: 0, cy: 0, scale: 0.45 }

const demo = runDemo({
  name: "penrose",
  hint: "Penrose P3 tiling — gold fat rhombi, indigo thin — drag to pan · scroll to zoom · dbl-click to reset",
  size: { dpr: 2, budget: null },
  frame: (e, t) => {
    e.frame(t, view.cx, view.cy, view.scale)
  },
  // re-roll: fly to a random patch of the tiling at a random zoom — staying inside the
  // unit-decagon patch the deflation actually covers
  randomize: () => { view.cx = (Math.random() - 0.5) * 0.8; view.cy = (Math.random() - 0.5) * 0.8; view.scale = 0.12 + Math.random() * 0.33 },
})

panZoom(demo.cv, view, home, () => {}, { drag: true })
</script>
</body>
</html>
