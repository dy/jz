<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo } from "../lib/jzdemo.js"

// Idle auto-launch: once the map has settled and nobody's touched the canvas for a bit, drop a
// live bob from a random point every few seconds so the demo keeps breathing (same cadence
// style as waves/index.html's nextDropMs).
let lastInteractMs = 0, nextIdleMs = 0
const scheduleIdle = (now) => { nextIdleMs = now + 4000 + Math.random() * 3000 }

const demo = runDemo({
  name: "magnet",
  hint: "drag a magnet to reshape the basins · click anywhere to drop a bob and watch it hunt",
  size: { budget: 110000 },
  frame: (e, t) => {
    const now = performance.now()
    if (nextIdleMs === 0) { lastInteractMs = now; scheduleIdle(now) }
    if (now > nextIdleMs && now - lastInteractMs > 1500) {
      e.launch(Math.random() * demo.W, Math.random() * demo.H)
      scheduleIdle(now)
    }
    e.frame(t)
  },
})

// Pointer coords in the engine's own backing-pixel space (canvas CSS size may differ from W×H).
const toPx = (e) => ({ x: e.offsetX * demo.W / demo.cv.clientWidth, y: e.offsetY * demo.H / demo.cv.clientHeight })

let dragIdx = -1
demo.cv.addEventListener("pointerdown", (e) => {
  if (!demo.engine) return
  const { x, y } = toPx(e)
  lastInteractMs = performance.now()
  const idx = demo.engine.pickMagnet(x, y)
  if (idx >= 0) {
    dragIdx = idx
    try { demo.cv.setPointerCapture(e.pointerId) } catch {}
  } else {
    demo.engine.launch(x, y)
    scheduleIdle(lastInteractMs)
  }
})
demo.cv.addEventListener("pointermove", (e) => {
  if (dragIdx < 0 || !demo.engine) return
  const { x, y } = toPx(e)
  lastInteractMs = performance.now()
  demo.engine.setMagnet(dragIdx, x, y)
})
demo.cv.addEventListener("pointerup", (e) => { dragIdx = -1; try { demo.cv.releasePointerCapture(e.pointerId) } catch {} })
demo.cv.addEventListener("pointerleave", () => { dragIdx = -1 })
</script>
</body>
</html>
