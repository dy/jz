<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, trackPointer } from "../lib/jzdemo.js"

const demo = runDemo({
  name: "fern",
  hint: "Barnsley fern — chaos game IFS with wind sway",
  load: (e) => e.init(),
  frame: (e, t) => {
    const sway = ptr.down ? (ptr.x * 2 - 1) * 0.1 : 0.03 * Math.sin(t * 0.7)
    e.frame(t, sway)
  },
})
const ptr = trackPointer(demo.cv)
</script>
</body>
</html>
