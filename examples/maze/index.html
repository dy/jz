<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo } from "../lib/jzdemo.js"

const demo = runDemo({
  name: "maze",
  hint: "a maze, carved then solved by flood-fill — click to regenerate",
  size: { budget: 110000, odd: true },   // odd dims = walls + passages; chunky cells, CSS upscales
  bg: "#ececec",
  cursor: "pointer",
  frame: (e) => e.frame(0),
})
demo.cv.addEventListener("pointerdown", () => { if (demo.engine) demo.engine.restart() })
</script>
</body>
</html>
