<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<title>Reaction-Diffusion - jz</title>
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; background: #07070c; color: #eee;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  body { border-top: 2px solid #ddd; }
  #c { position: fixed; inset: 0; width: 100%; height: 100%; display: block; image-rendering: pixelated; }
  #sel { position: fixed; z-index: 20; border: 1px solid #fff; background: #ffffff14;
    pointer-events: none; display: none; }
  #hint { position: fixed; left: 0; right: 0; bottom: 20px; text-align: center; z-index: 20;
    font-size: 13px; color: #aaa; opacity: .7; pointer-events: none; transition: opacity .5s; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="sel"></div>
<div id="hint">drag a rectangle to seed · click to scatter fresh</div>

<script type="module">
import { loadEngine, hud } from "../lib/jzdemo.js"

const cv = document.getElementById("c"), g = cv.getContext("2d")
let W = 0, H = 0, img, out32, px

// internal resolution: capped so Gray-Scott runs at ~60fps
const sizeTo = (engine) => {
  const dpr = Math.min(1, window.devicePixelRatio || 1)   // Gray-Scott is heavy — full screen at CSS-pixel res
  W = Math.round(innerWidth  * dpr) >> 1 << 1
  H = Math.round(innerHeight * dpr) >> 1 << 1
  cv.width = W; cv.height = H
  img = g.createImageData(W, H); out32 = new Uint32Array(img.data.buffer)
  px = engine.resize(W, H)
}

let engine = null, gen = 0

// Seeds are stored NORMALISED ([0,1] rects) so they survive a resize / engine swap; the host
// converts to pixels and drives the engine, so js and jz get identical seeds → identical fields.
let seeds = []
const applySeeds = () => {
  if (!engine) return
  engine.clear()
  for (const [x0, y0, x1, y1] of seeds) engine.seedRect(x0 * W | 0, y0 * H | 0, x1 * W | 0, y1 * H | 0)
}
const randRect = () => {
  const cx = 0.12 + Math.random() * 0.76, cy = 0.12 + Math.random() * 0.76
  const sx = 0.03 + Math.random() * 0.09, sy = 0.03 + Math.random() * 0.09
  return [cx - sx, cy - sy, cx + sx, cy + sy]
}
const scatter = () => { seeds = [randRect(), randRect()]; if (Math.random() < 0.6) seeds.push(randRect()); applySeeds() }

const setEngine = async (kind) => {
  const my = ++gen
  const e = await loadEngine(kind, { js: "./diffusion.js", wasm: "./diffusion.wasm" })
  if (my !== gen) return
  engine = e; sizeTo(engine); applySeeds()        // re-seed the same field on the new engine
}

addEventListener("resize", () => { if (engine) { sizeTo(engine); applySeeds() } })

// Drag a selection rectangle → drop a reacting patch there (live, additive). A plain click
// scatters a fresh set of random squares.
const sel = document.getElementById("sel"), hint = document.getElementById("hint")
let down = null
const nx = (x) => x / cv.clientWidth, ny = (y) => y / cv.clientHeight
cv.addEventListener("pointerdown", (e) => {
  down = { x: e.clientX, y: e.clientY }
  sel.style.display = "block"; sel.style.left = e.clientX + "px"; sel.style.top = e.clientY + "px"; sel.style.width = "0px"; sel.style.height = "0px"
  hint.style.opacity = 0
})
addEventListener("pointermove", (e) => {
  if (!down) return
  const l = Math.min(down.x, e.clientX), t = Math.min(down.y, e.clientY)
  sel.style.left = l + "px"; sel.style.top = t + "px"
  sel.style.width = Math.abs(e.clientX - down.x) + "px"; sel.style.height = Math.abs(e.clientY - down.y) + "px"
})
addEventListener("pointerup", (e) => {
  if (!down) return
  sel.style.display = "none"
  const moved = Math.abs(e.clientX - down.x) > 6 || Math.abs(e.clientY - down.y) > 6
  if (moved) {                                    // a drag → seed that rectangle into the live field
    const r = [nx(Math.min(down.x, e.clientX)), ny(Math.min(down.y, e.clientY)), nx(Math.max(down.x, e.clientX)), ny(Math.max(down.y, e.clientY))]
    seeds.push(r); engine && engine.seedRect(r[0] * W | 0, r[1] * H | 0, r[2] * W | 0, r[3] * H | 0)
  } else scatter()                                // a click → fresh random squares
  down = null
})

const loop = () => {
  requestAnimationFrame(loop)
  if (!engine) return
  const t0 = performance.now()
  engine.frame()
  const ms = performance.now() - t0
  out32.set(px); g.putImageData(img, 0, 0)
  ui.frame(ms)
}

const ui = hud({
  kind: "jz",
  meter: new URLSearchParams(location.search).get("fps") !== "0",
  src: "https://github.com/dy/jz/tree/main/examples/diffusion",
  code: "./diffusion.js",
  nav: "diffusion",
  onSwitch: setEngine,
})
await setEngine(ui.kind)
scatter()                     // start on random squares, not the fixed pair
loop()
</script>
</body>
</html>
