<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo } from "../lib/jzdemo.js"

// Seeds are stored NORMALISED ([0,1] rects) so they survive a resize / engine swap; the host
// converts to pixels and drives the engine, so js and jz get identical seeds → identical fields.
let seeds = [], seeded = false
const applySeeds = (engine, demo) => {
  engine.clear()
  for (const [x0, y0, x1, y1] of seeds) engine.seedRect(x0 * demo.W | 0, y0 * demo.H | 0, x1 * demo.W | 0, y1 * demo.H | 0)
}
const randRect = () => {
  const cx = 0.12 + Math.random() * 0.76, cy = 0.12 + Math.random() * 0.76
  const sx = 0.03 + Math.random() * 0.09, sy = 0.03 + Math.random() * 0.09
  return [cx - sx, cy - sy, cx + sx, cy + sy]
}
const scatter = (engine, demo) => { seeds = [randRect(), randRect()]; if (Math.random() < 0.6) seeds.push(randRect()); applySeeds(engine, demo) }

const demo = runDemo({
  name: "diffusion",
  hint: "Gray–Scott reaction–diffusion",
  size: { dpr: 1, budget: null },
  frame: (e) => e.frame(),
  load: (e, d) => {
    e.setParams?.(0.054, 0.062)
    if (!seeded) { seeded = true; scatter(e, d) }   // first load: randomise the field
    else applySeeds(e, d)                            // resize/swap: re-apply same seeds
  },
})

// Pointer interaction: drag to paint, right-drag to erase. Stamps are interpolated
// between successive points so a fast drag paints a continuous line, not dots.
const R = 8
let drawing = false, erasing = false, lastX = 0, lastY = 0
const stampAt = (px, py, erase) => {
  if (!demo.engine) return
  const cx = px * demo.W / demo.cv.clientWidth, cy = py * demo.H / demo.cv.clientHeight
  if (erase) demo.engine.eraseBrush(cx, cy, R)
  else demo.engine.seedBrush(cx, cy, R)
}
const strokeTo = (px, py, erase) => {
  const dx = px - lastX, dy = py - lastY
  const dist = Math.hypot(dx, dy)
  const step = Math.max(1, R * 0.4)               // overlap stamps so the line is solid
  const n = Math.max(1, Math.ceil(dist / step))
  for (let i = 1; i <= n; i++) stampAt(lastX + dx * i / n, lastY + dy * i / n, erase)
  lastX = px; lastY = py
}
demo.cv.addEventListener("pointerdown", (e) => {
  drawing = true
  erasing = e.button === 2
  try { demo.cv.setPointerCapture(e.pointerId) } catch {}
  lastX = e.offsetX; lastY = e.offsetY
  stampAt(e.offsetX, e.offsetY, erasing)
})
demo.cv.addEventListener("pointermove", (e) => {
  if (drawing) strokeTo(e.offsetX, e.offsetY, erasing)
})
demo.cv.addEventListener("pointerup", (e) => { drawing = false; try { demo.cv.releasePointerCapture(e.pointerId) } catch {} })
demo.cv.addEventListener("pointerleave", () => { drawing = false })
demo.cv.addEventListener("contextmenu", e => e.preventDefault())
</script>
</body>
</html>
