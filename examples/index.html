<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>jz examples</title>
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="../assets/site.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: #000;
  color: #f0f0f0;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* masthead + grid share the ONE site content column (assets/site.css): content-left = gx-pad, width = cw,
   so the examples grid lines up edge-to-edge with the landing and bench. */
.masthead { max-width: var(--colw); margin-inline: calc(var(--gx-pad) - var(--padx)) auto; padding-inline: var(--padx); }

/* Classical Swiss grid on the shared content column, even gutters, caption under each frame */
.grid {
  max-width: var(--colw);
  margin-inline: calc(var(--gx-pad) - var(--padx)) auto;
  padding: 36px var(--padx) 72px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(248px, 1fr));
  gap: 44px 28px;
}

.cell { display: block; text-decoration: none; color: inherit; }

.cell .shot {
  aspect-ratio: 760 / 468;
  overflow: hidden;
  background: #000;
}

.cell img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: grayscale(1) contrast(1.05);
  transition: filter .35s ease, transform .5s cubic-bezier(.22,.6,.36,1);
}

.cell:hover img {
  filter: grayscale(1) brightness(1.22) contrast(1.08);
  transform: scale(1.035);
}

.cell .cap { padding-top: 11px; }

.cell .name {
  display: block;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 400;
  letter-spacing: -.01em;
  color: #f4f4f4;
}

.cell .desc {
  display: block;
  margin-top: 3px;
  font-size: 12px;
  line-height: 1.45;
  color: #8a8a8a;
}
</style>
</head>
<body>

<header class="masthead">
  <div class="brand"><a class="logo" href="../"><img src="../jz.svg" width="40" height="40" alt="jz"></a><span class="sub">examples</span></div>
  <nav>
    <a href="../repl/">repl</a>
    <a href="../bench/">bench</a>
    <a class="ver" href="https://www.npmjs.com/package/jz" target="_blank" rel="noopener">v0.6.0</a>
    <a class="gh" href="https://github.com/dy/jz" aria-label="jz on GitHub">
      <svg viewBox="0 0 16 16" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
    </a>
  </nav>
</header>

<main class="grid" id="grid"></main>

<script type="module">
import { examples } from './examples.js'

document.getElementById('grid').innerHTML = examples.map(({ name, blurb }) => `
  <a class="cell" href="./${name}/">
    <div class="shot"><img src="./thumbs/${name}.webp" width="760" height="468" loading="lazy" alt="${name}"></div>
    <div class="cap">
      <span class="name">${name.replace(/-/g, '‑')}</span>
      <span class="desc">${blurb}</span>
    </div>
  </a>`).join('')
</script>
</body>
</html>
