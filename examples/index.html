<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script>(()=>{try{const s=localStorage.getItem('theme');document.documentElement.dataset.theme=s||(matchMedia('(prefers-color-scheme: light)').matches?'light':'dark')}catch(e){}})()</script>
<title>JZ examples</title>
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="../assets/site.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* masthead + grid share the ONE site content column (assets/site.css): content-left = gx-pad, width = cw,
   so the examples grid lines up edge-to-edge with the landing and bench. */
.masthead { max-width: var(--colw); margin-inline: calc(var(--gx-pad) - var(--padx)) auto; padding-inline: var(--padx); }

/* Classical Swiss grid on the shared content column, even gutters, caption under each frame */
.grid {
  max-width: var(--colw);
  margin-inline: calc(var(--gx-pad) - var(--padx)) auto;
  padding: 36px var(--padx) 72px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(248px, 1fr));
  gap: 44px 28px;
}

.cell { display: block; text-decoration: none; color: inherit; }

.cell .shot {
  aspect-ratio: 760 / 468;
  overflow: hidden;
  background: #000;
}

.cell img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: grayscale(1) contrast(1.05);
  transition: filter .35s ease, transform .5s cubic-bezier(.22,.6,.36,1);
}

.cell:hover img {
  filter: grayscale(1) brightness(1.22) contrast(1.08);
  transform: scale(1.035);
}

.cell .cap { padding-top: 11px; }

.cell .name {
  display: block;
  font-family: var(--font);
  font-size: 15px;
  font-weight: 400;
  letter-spacing: -.01em;
  color: var(--ink);
}

.cell .desc {
  display: block;
  margin-top: 3px;
  font-size: 12px;
  line-height: 1.45;
  color: var(--dim);
}

@media (max-width: 640px) {
  .masthead, .grid { padding-inline: 20px; }   /* halve the side inset on phones — matches bench (header + body) */
  .grid { gap: 28px 16px; }                     /* tighter cells; the big desktop gaps read as too large stacked */
}
</style>
</head>
<body>

<header class="masthead">
  <div class="brand"><a class="logo" href="../"><img src="../jz.svg" width="40" height="40" alt="jz"></a><span class="sub">examples</span></div>
  <nav>
    <a href="../repl/">repl</a>
    <a href="../bench/">bench</a>
    <a class="ver" href="https://www.npmjs.com/package/jz" target="_blank" rel="noopener"><span data-ver>v0.7.0</span> <span class="exp">experimental</span></a>
    <button class="theme-toggle" type="button" aria-label="Toggle light or dark theme" title="Toggle theme">
      <svg class="i-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
      <svg class="i-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.4 1.4M17.6 17.6 19 19M19 5l-1.4 1.4M6.4 17.6 5 19"/></svg>
    </button>
    <a class="gh" href="https://github.com/dy/jz" aria-label="jz on GitHub">
      <svg viewBox="0 0 16 16" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
    </a>
  </nav>
</header>

<main class="grid" id="grid"></main>
<footer>
  <div class="fwrap">
    <a class="wordmark" href="../" aria-label="jz — home"><img src="../jz.svg" width="40" height="40" alt="jz"></a>
    <nav class="fcol">
      <a href="../repl/">repl</a>
      <a href="../examples/">examples</a>
      <a href="../bench/">bench</a>
    </nav>
    <nav class="fcol">
      <a href="https://github.com/dy/jz">github</a>
      <a href="https://www.npmjs.com/package/jz">npm</a>
      <a href="https://github.com/dy/jz/issues">issues</a>
    </nav>
    <div class="legal">
      <span class="by"><a href="https://github.com/dy">dy</a></span>
      <span class="lic"><a href="https://github.com/krishnized/license/" aria-label="krishnized license"><span class="om">ॐ</span></a></span>
    </div>
  </div>
</footer>

<script type="module">
import { examples } from './examples.js'

document.getElementById('grid').innerHTML = examples.map(({ name, blurb }) => `
  <a class="cell" href="./${name}/">
    <div class="shot"><img src="./thumbs/${name}.webp" width="760" height="468" loading="lazy" alt="${name}"></div>
    <div class="cap">
      <span class="name">${name.replace(/-/g, '‑')}</span>
      <span class="desc">${blurb}</span>
    </div>
  </a>`).join('')
</script>
<script type="module" src="../assets/version.js"></script>
<script type="module" src="../assets/theme.js"></script>
</body>
</html>
