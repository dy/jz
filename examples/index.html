<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>jz examples</title>
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon">
<style>
/* Jost (libre Futura) self-hosted — geometric fallback where Futura isn't installed */
@font-face {
  font-family: Jost; font-style: normal; font-weight: 100 900; font-display: swap;
  src: url(lib/jost.woff2) format('woff2');
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: #0a0a0a;
  color: #f0f0f0;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

body { border-top: 2px solid #fff; }

/* Masthead — "jz examples" (left), GitHub (right corner) */
.masthead {
  max-width: 1280px;
  margin: 0 auto;
  padding: 30px 32px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: Futura, 'Futura PT', 'Avant Garde', 'ITC Avant Garde Gothic Std', 'Century Gothic', Jost, 'Helvetica Neue', sans-serif;
}

.wordmark { font-size: 19px; letter-spacing: -.02em; line-height: 1; }
.wordmark .mark { font-weight: 700; color: #fff; }
.wordmark .sub  { font-weight: 400; color: #8a8a8a; margin-left: .45em; }

.gh { display: flex; color: #fff; opacity: .7; transition: opacity .18s; }
.gh:hover { opacity: 1; }
.repl { margin-left: auto; margin-right: 22px; color: #fff; opacity: .7; text-decoration: none;
  font-size: 12px; text-transform: uppercase; letter-spacing: .14em; transition: opacity .18s; }
.repl:hover { opacity: 1; }

/* Classical Swiss grid — contained, even gutters, caption set under each frame */
.grid {
  max-width: 1280px;
  margin: 0 auto;
  padding: 36px 32px 72px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(248px, 1fr));
  gap: 44px 28px;
}

.cell { display: block; text-decoration: none; color: inherit; }

.cell .shot {
  aspect-ratio: 760 / 468;
  overflow: hidden;
  background: #000;
}

.cell img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: grayscale(1) contrast(1.05);
  transition: filter .35s ease, transform .5s cubic-bezier(.22,.6,.36,1);
}

.cell:hover img {
  filter: grayscale(1) brightness(1.22) contrast(1.08);
  transform: scale(1.035);
}

.cell .cap { padding-top: 11px; }

.cell .name {
  display: block;
  font-size: 14px;
  font-weight: 700;
  letter-spacing: -.01em;
  color: #f4f4f4;
}

.cell .desc {
  display: block;
  margin-top: 3px;
  font-size: 12px;
  line-height: 1.45;
  color: #8a8a8a;
}
</style>
</head>
<body>

<header class="masthead">
  <div class="wordmark"><span class="mark">JZ</span><span class="sub">examples</span></div>
  <a class="repl" href="../repl/">repl</a>
  <a class="repl" style="margin-left:0" href="../bench/">bench</a>
  <a class="gh" href="https://github.com/dy/jz" aria-label="jz on GitHub">
    <svg viewBox="0 0 16 16" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
  </a>
</header>

<main class="grid" id="grid"></main>

<script>
const EXAMPLES = [
  // audio first
  ['rfft',               'live log/mel spectrogram from a jz real FFT'],
  ['zzfx',               'the unmodified ZzFX sfx synth, compiled as-is'],
  ['jukebox',            'looping procedural-jazz floatbeat — tap to play'],
  ['game-of-life',       "Conway's Life, straight into shared pixel memory"],
  ['lenia',              'continuous cellular automaton — smooth-kernel "digital life"'],
  ['diffusion', 'Gray–Scott — organic coral & labyrinths'],
  ['interference',       'two-source wave field, recomputed every frame'],
  ['plasma',             'FBM domain-warp — the classic flowing plasma'],
  ['chladni',            'Camerata plate — frequency sweeps the nodal figure'],
  ['mandelbrot',         'escape-time fractal with smooth coloring'],
  ['attractors',         'de Jong map — millions of iters into luminous curves'],
  ['raymarcher',         'an SDF sphere field — Shadertoy on the CPU'],
]

document.getElementById('grid').innerHTML = EXAMPLES.map(([name, desc]) => `
  <a class="cell" href="./${name}/">
    <div class="shot"><img src="./thumbs/${name}.webp" width="760" height="468" loading="lazy" alt="${name}"></div>
    <div class="cap">
      <span class="name">${name.replace(/-/g, '‑')}</span>
      <span class="desc">${desc}</span>
    </div>
  </a>`).join('')
</script>
</body>
</html>
