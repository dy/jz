<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo } from "../lib/jzdemo.js"

// Drag any ball to pull it aside; release to let it swing. Double-click resets.
const sx = (d) => d.W / d.cv.clientWidth, sy = (d) => d.H / d.cv.clientHeight
let dragging = false

const demo = runDemo({
  name: "cradle",
  hint: "Newton's cradle — kinetic energy passing through",
  size: { budget: 1800000, dpr: 2 },
  bg: "#f2f0ea",
  cursor: "pointer",
  frame: (e) => e.frame(0),
})

const cv = demo.cv
cv.addEventListener("pointerdown", (e) => { if (!demo.engine) return; dragging = true; try { cv.setPointerCapture(e.pointerId) } catch {}; demo.engine.grab(e.offsetX * sx(demo), e.offsetY * sy(demo)) })
cv.addEventListener("pointermove", (e) => { if (dragging && demo.engine) demo.engine.dragTo(e.offsetX * sx(demo)) })
cv.addEventListener("pointerup", (e) => { dragging = false; demo.engine?.release(); try { cv.releasePointerCapture(e.pointerId) } catch {} })
cv.addEventListener("pointerleave", () => { dragging = false; demo.engine?.release() })
cv.addEventListener("dblclick", () => demo.engine && demo.engine.init())
</script>
</body>
</html>
