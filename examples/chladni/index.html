<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, trackPointer } from "../lib/jzdemo.js"

// The figure F(x,y)=cos(nπx)cos(mπy)−cos(mπx)cos(nπy) is the COMBINATION of two standing waves: n
// half-waves across (x), m down (y). So we drive them straight from the cursor — horizontal travel
// sets n, vertical sets m — and you watch the two axes interfere into a nodal figure. Idle, they
// drift on their own. n,m are integers (true eigenmodes) and kept distinct: n=m is the degenerate
// all-nodal plate.
const LO = 2, HI = 10
let manual = false, manualAt = -10, nowT = 0, curN = 3, curM = 5

const demo = runDemo({
  name: "chladni",
  hint: "Chladni plate — nodal lines of two standing waves; drag: horizontal sets n, vertical sets m",
  // No simulation state (see chladni.js) but the per-pixel field itself isn't free: each pixel
  // takes 4 transcendentals (2 cos + 2 sin, for F and its analytic gradient) plus the exp() ridge —
  // a true 4K@2x backing no longer holds 60fps, so budget bounds the worst case the same way the
  // old grain pass did, just at a lower cap (the grain sum's fixed per-frame cost no longer offsets
  // a cheaper field pass — this field pass alone is pricier than the old one was).
  size: { dpr: 2, budget: 1000000 },
  cursor: "move",
  frame: (e, t) => {
    nowT = t
    if (manual && t - manualAt > 6) manual = false
    if (!manual) {
      curN = LO + Math.round((HI - LO) * (0.5 - 0.5 * Math.cos(t * 0.11)))
      curM = LO + Math.round((HI - LO) * (0.5 - 0.5 * Math.cos(t * 0.083 + 2.0)))
    }
    let n = curN, m = curM
    if (n === m) m = m < HI ? m + 1 : m - 1     // skip the degenerate n=m (whole plate nodal)
    e.frame(n, m)
  },
  // re-roll: jump to a fresh random mode pair, held like a drag (same convention as interference)
  randomize: (e, d) => {
    curN = LO + Math.floor(Math.random() * (HI - LO + 1))
    curM = LO + Math.floor(Math.random() * (HI - LO + 1))
    manual = true; manualAt = nowT
  },
})

const ptr = trackPointer(demo.cv)
const dial = () => {
  manual = true; manualAt = nowT
  curN = LO + Math.round((HI - LO) * ptr.x)
  curM = LO + Math.round((HI - LO) * ptr.y)
}
demo.cv.addEventListener("pointerdown", dial)
demo.cv.addEventListener("pointermove", () => { if (ptr.down) dial() })
</script>
</body>
</html>
