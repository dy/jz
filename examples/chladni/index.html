<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<title>Chladni plate - jz</title>
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; background: #000; color: #eee;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  body { border-top: 2px solid #ddd; }
  #c { position: fixed; inset: 0; width: 100%; height: 100%; display: block; image-rendering: pixelated; }
  /* the driving frequency — the soul of the Camerata generator (after Demian Conrad) */
  #hz { position: fixed; left: 50%; bottom: 18px; transform: translateX(-50%); z-index: 30;
    font: 600 13px/1 'Helvetica Neue', Helvetica, Arial, sans-serif; letter-spacing: .12em; color: #aaa;
    opacity: .8; pointer-events: none; text-shadow: 0 0 8px #000; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hz"></div>

<script type="module">
import { loadEngine, hud } from "../lib/jzdemo.js"

const cv = document.getElementById("c"), g = cv.getContext("2d"), hzEl = document.getElementById("hz")
let img, out32, px

// Full-screen at device-pixel res; the kernel maps to the plate with one uniform scale,
// so the nodal figure stays square at any aspect (the long side just shows more of it).
const sizeTo = (engine) => {
  const dpr = Math.min(2, window.devicePixelRatio || 1)
  const W = Math.round(innerWidth * dpr) >> 1 << 1, H = Math.round(innerHeight * dpr) >> 1 << 1
  cv.width = W; cv.height = H
  img = g.createImageData(W, H); out32 = new Uint32Array(img.data.buffer)
  px = engine.resize(W, H)
}

let engine = null, gen = 0, t = 0
const setEngine = async (kind) => {
  const my = ++gen
  const e = await loadEngine(kind, { js: "./chladni.js", wasm: "./chladni.wasm" })
  if (my !== gen) return
  engine = e; sizeTo(engine)
}
addEventListener("resize", () => engine && sizeTo(engine))

// A Chladni plate only resonates at DISCRETE eigenmodes, so the engine snaps the swept
// frequency to the nearest (n,m) pair — a band of frequencies legitimately shares one figure.
// 1 ≤ n < m ≤ 12 → C(12,2) = 66 modes. Showing the mode's representative frequency makes the
// Hz step in lock-step with the image (instead of a number that drifts over a static figure).
const NMODES = 66
let paused = false, lastHz = ""
const loop = () => {
  requestAnimationFrame(loop)
  if (!engine || paused) return                 // frozen — last figure stays put to save / inspect
  t += 1 / 60
  // sweep the frequency like Camerata's "time of day" — a slow ease through the modes,
  // low (simple figures) ⇄ high (dense lattices). (Audio-driven later.)
  const freq = 40 + (0.5 - 0.5 * Math.cos(t * 0.09)) * 1960
  const t0 = performance.now()
  engine.frame(freq)
  const ms = performance.now() - t0
  out32.set(px); g.putImageData(img, 0, 0)
  const idx = Math.round((freq - 40) / 1960 * (NMODES - 1))
  lastHz = (40 + idx / (NMODES - 1) * 1960 | 0) + " Hz"
  hzEl.textContent = lastHz
  ui.frame(ms)
}

// Click freezes / unfreezes the sweep; right-click freezes too, so the context menu's
// "Save image as…" captures a still figure rather than a smeared one.
const freeze = (on) => { paused = on; hzEl.style.opacity = on ? 1 : .8; hzEl.textContent = (on ? "❚❚ " : "") + lastHz }
cv.addEventListener("click", () => freeze(!paused))
cv.addEventListener("contextmenu", () => freeze(true))

const ui = hud({
  kind: "jz",
  meter: new URLSearchParams(location.search).get("fps") !== "0",
  src: "https://github.com/dy/jz/tree/main/examples/chladni",
  code: "./chladni.js",
  nav: "chladni",
  onSwitch: setEngine,
})
await setEngine(ui.kind)
loop()
</script>
</body>
</html>
