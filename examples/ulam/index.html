<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, trackPointer } from "../lib/jzdemo.js"

// speed: pixels per second to reveal; drag left/right to slow/fast
let baseSpeed = 3000
const demo = runDemo({
  name: "ulam",
  hint: "Primes on a square spiral — diagonal streaks emerge from quadratic polynomials landing many primes",
  frame: (e, t) => {
    let speed = baseSpeed
    if (ptr.down) speed = Math.round(baseSpeed * (0.2 + ptr.x * 3.6))
    e.frame(t, speed)
  },
})
const ptr = trackPointer(demo.cv)
</script>
</body>
</html>
