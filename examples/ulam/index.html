<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, trackPointer } from "../lib/jzdemo.js"

// speed: cells per second to reveal; drag left/right to slow/fast. High by default so the spiral
// fills in a handful of seconds — the kernel now re-walks the whole spiral each frame, so this is
// just how fast the reveal front advances.
let baseSpeed = 90000
const demo = runDemo({
  name: "ulam",
  hint: "Primes on a square spiral — diagonal streaks emerge from quadratic polynomials landing many primes",
  frame: (e, t) => {
    let speed = baseSpeed
    if (ptr.down) speed = Math.round(baseSpeed * (0.15 + ptr.x * 2.5))
    e.frame(t, speed)
  },
})
const ptr = trackPointer(demo.cv)
</script>
</body>
</html>
