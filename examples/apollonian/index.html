<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, trackPointer } from "../lib/jzdemo.js"

let panX = 0.0, panY = 0.0, zoom = 1.0
let lastPx = 0, lastPy = 0
const demo = runDemo({
  name: "apollonian",
  hint: "Apollonian gasket — drag to pan, scroll to zoom",
  frame: (e, t) => {
    if (ptr.down) {
      const dx = (ptr.x - lastPx) / (innerWidth || 1)
      const dy = (ptr.y - lastPy) / (innerHeight || 1)
      panX += dx * 1.5
      panY += dy * 1.5
    }
    lastPx = ptr.x; lastPy = ptr.y
    e.frame(t, panX, panY, zoom)
  },
})
const ptr = trackPointer(demo.cv)

demo.cv.addEventListener("wheel", (e) => {
  e.preventDefault()
  zoom *= Math.exp(-e.deltaY * 0.001)
  if (zoom < 0.1) zoom = 0.1
  if (zoom > 20.0) zoom = 20.0
}, { passive: false })
</script>
</body>
</html>
