<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo } from "../lib/jzdemo.js"

// Camera: auto-orbits continuously; drag pivots azimuth/elevation, release resumes the
// orbit from wherever you left it; wheel dollies. cursor signals grab affordance.
let az = 0, el = 0.35, dist = 3.7, camActive = false, lastPX = 0, lastPY = 0

const demo = runDemo({
  name: "raymarcher",
  hint: "a raymarched SDF sphere field",
  wasm: "raymarcher.simd",
  // 0.55 → 0.49: the soft shadow + AO probes measured ~1.26× more SIMD-4 ms/frame (jz is
  // still the whole point of this demo — trimming resolution ~11% on a side restores the
  // 60fps headroom that 0.55 had before, at the cost of a slightly less crisp frame edge).
  size: { scale: 0.49 },
  cursor: "grab",
  frame: (e, t) => {
    if (!camActive) az += 0.0035          // gentle auto-orbit when not being dragged
    const eyeX = Math.sin(az) * Math.cos(el) * dist
    const eyeY = Math.sin(el) * dist
    const eyeZ = Math.cos(az) * Math.cos(el) * dist
    e.frame(t, eyeX, eyeY, eyeZ)
  },
})

demo.cv.addEventListener('pointerdown', e => {
  camActive = true
  lastPX = e.clientX; lastPY = e.clientY
  demo.cv.style.cursor = 'grabbing'
  try { demo.cv.setPointerCapture(e.pointerId) } catch {}
})
demo.cv.addEventListener('pointermove', e => {
  if (!camActive) return
  az += (e.clientX - lastPX) * 0.01
  el += (e.clientY - lastPY) * 0.01
  if (el > 1.4) el = 1.4
  if (el < 0.08) el = 0.08      // stay above the ground plane (never dip below the floor)
  lastPX = e.clientX; lastPY = e.clientY
})
const endDrag = () => { camActive = false; demo.cv.style.cursor = 'grab' }
demo.cv.addEventListener('pointerup', e => { endDrag(); try { demo.cv.releasePointerCapture(e.pointerId) } catch {} })
demo.cv.addEventListener('pointerleave', endDrag)
demo.cv.addEventListener('wheel', e => {
  e.preventDefault()
  dist *= Math.exp(e.deltaY * 0.001)
  if (dist < 1.5) dist = 1.5
  if (dist > 12) dist = 12
}, { passive: false })
</script>
</body>
</html>
