<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo } from "../lib/jzdemo.js"

const demo = runDemo({
  name: "dla",
  hint: "diffusion-limited aggregation — click to plant a competing crystal · double-click to reseed",
  size: { budget: 750000 },
  load: (e) => e.seed(),
  frame: (e) => e.frame(0),
})
const sx = () => demo.W / demo.cv.clientWidth, sy = () => demo.H / demo.cv.clientHeight
demo.cv.addEventListener("click", (e) => demo.engine && demo.engine.addSeed(e.offsetX * sx(), e.offsetY * sy()))
demo.cv.addEventListener("dblclick", () => demo.engine.seed())
</script>
</body>
</html>
