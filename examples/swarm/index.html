<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, trackPointer } from "../lib/jzdemo.js"

// The flies chase the cursor (that's the toy). A click releases one fly; holding keeps
// releasing them at a steady rate.
let holding = false, lastSpawn = 0

const demo = runDemo({
  name: "swarm",
  hint: "a swarm of flies chasing the cursor",
  size: { dpr: 2, budget: null },
  load: (e) => e.init(),
  frame: (e, t) => {
    if (holding && t - lastSpawn > 0.09) { e.addFlies(ptr.x, ptr.y, 1); lastSpawn = t }   // ~11/s while held
    e.frame(t)
  },
})

const ptr = trackPointer(demo.cv)
demo.cv.addEventListener("pointermove", () => { if (demo.engine) demo.engine.setTarget(ptr.x, ptr.y) })
demo.cv.addEventListener("pointerdown", () => {
  if (!demo.engine) return
  holding = true
  demo.engine.setTarget(ptr.x, ptr.y)
  demo.engine.addFlies(ptr.x, ptr.y, 1)            // single fly per click
})
demo.cv.addEventListener("pointerup", () => { holding = false })
demo.cv.addEventListener("pointerleave", () => { holding = false })
</script>
</body>
</html>
