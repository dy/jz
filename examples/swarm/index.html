<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<title>Swarm - jz</title>
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; background: #fff; color: #111;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  body { border-top: 2px solid #ddd; }
  #c { position: fixed; inset: 0; width: 100%; height: 100%; display: block; cursor: crosshair; }
  #hint { position: fixed; left: 0; right: 0; bottom: 20px; text-align: center; z-index: 20;
    font-size: 13px; color: #888; opacity: .8; pointer-events: none; transition: opacity .5s; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">a swarm of flies chasing the cursor</div>

<script type="module">
import { loadEngine, hud, trackPointer } from "../lib/jzdemo.js"

const cv = document.getElementById("c"), g = cv.getContext("2d")
let W = 0, H = 0, img, out32, px

const sizeTo = (engine) => {
  const dpr = Math.min(2, window.devicePixelRatio || 1)
  W = Math.round(innerWidth * dpr) >> 1 << 1
  H = Math.round(innerHeight * dpr) >> 1 << 1
  cv.width = W; cv.height = H
  img = g.createImageData(W, H); out32 = new Uint32Array(img.data.buffer)
  px = engine.resize(W, H)
}

let engine = null, gen = 0, t = 0
const setEngine = async (kind) => {
  const my = ++gen
  const e = await loadEngine(kind, { js: "./swarm.js", wasm: "./swarm.wasm" })
  if (my !== gen) return
  engine = e; sizeTo(engine); engine.init()
}
addEventListener("resize", () => engine && sizeTo(engine))

// The flies chase the cursor (that's the toy). A click releases one fly; holding keeps
// releasing them at a steady rate.
const ptr = trackPointer(cv)
const hint = document.getElementById("hint")
let holding = false, lastSpawn = 0
cv.addEventListener("pointermove", () => { if (engine) engine.setTarget(ptr.x, ptr.y) })
cv.addEventListener("pointerdown", () => {
  if (!engine) return
  holding = true
  engine.setTarget(ptr.x, ptr.y)
  engine.addFlies(ptr.x, ptr.y, 1)            // single fly per click
})
cv.addEventListener("pointerup", () => { holding = false })
cv.addEventListener("pointerleave", () => { holding = false })

const loop = () => {
  requestAnimationFrame(loop)
  if (!engine) return
  t += 1 / 60
  if (holding && t - lastSpawn > 0.09) { engine.addFlies(ptr.x, ptr.y, 1); lastSpawn = t }   // ~11/s while held
  const t0 = performance.now()
  engine.frame(t)
  const ms = performance.now() - t0
  ui.paint(px, out32); g.putImageData(img, 0, 0)
  ui.frame(ms)
}

const ui = hud({
  kind: "jz",
  meter: new URLSearchParams(location.search).get("fps") !== "0",
  src: "https://github.com/dy/jz/tree/main/examples/swarm",
  code: "./swarm.js",
  nav: "swarm",
  onSwitch: setEngine,
})
await setEngine(ui.kind)
loop()
</script>
</body>
</html>
