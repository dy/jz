<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo } from "../lib/jzdemo.js"

const sx = (d) => d.W / d.cv.clientWidth, sy = (d) => d.H / d.cv.clientHeight

const demo = runDemo({
  name: "erosion",
  hint: "hydraulic erosion — rain carves a fractal terrain, flux pools into a river network · click for a rain burst",
  size: { budget: 300000 },
  bg: "#888",
  cursor: "pointer",
  frame: (e) => e.frame(0),
})
demo.cv.addEventListener("pointerdown", (e) => demo.engine?.rain(e.offsetX * sx(demo), e.offsetY * sy(demo)))
</script>
</body>
</html>
