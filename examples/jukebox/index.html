<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<title>Floatbeat jukebox - jz</title>
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; background: #07070c; color: #eee;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  body { border-top: 2px solid #ddd; }
  #scope { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
  #hint { position: fixed; left: 0; right: 0; bottom: 22px; text-align: center; z-index: 30;
    font-size: 13px; color: #aaa; opacity: .75; pointer-events: none; transition: opacity .4s; }
</style>
</head>
<body>
<canvas id="scope"></canvas>
<div id="hint">click to play / pause</div>

<script type="module">
import { instantiate } from "../../interop.js"
import { hud } from "../lib/jzdemo.js"

const SR = 44100, CHUNK = Math.round(SR * 0.5)   // stream + draw the tune in ½-second chunks

// ── engines: same jukebox.js as V8 baseline + compiled wasm ──────────────────
// engine(len, seed, off) → { out, ms }: synthesize `len` samples starting at absolute
// sample index `off`, so chunk k+1 butts seamlessly onto chunk k (continuous time).
const makeEngine = async (kind) => {
  if (kind === "js") {
    const mod = await import("./jukebox.js")
    return (len, seed, off) => { const t0 = performance.now(); const out = mod.fill(len, SR, seed, off); return { out, ms: performance.now() - t0 } }
  }
  const { exports, memory } = instantiate(new Uint8Array(await (await fetch("./jukebox.wasm")).arrayBuffer()))
  return (len, seed, off) => {
    const t0 = performance.now(); const view = exports.fill(len, SR, seed, off); const ms = performance.now() - t0
    const out = Float64Array.from(view); memory.reset(); return { out, ms }
  }
}

// ── audio: stream the tune as gapless ½-s chunks scheduled just ahead of the
// playhead — `off` advances every chunk so the melody runs forever, no loop.
// Click toggles play/stop; play restarts the arpeggio from the top. ───────────
let actx, playing = false, off = 0, nextTime = 0, streamStart = 0, queued = []
const audio = () => { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); if (actx.state === "suspended") actx.resume(); return actx }
const stopQueued = () => { for (const s of queued) { try { s.stop() } catch {} } queued = [] }
const schedule = () => {
  while (nextTime < actx.currentTime + 0.3) {                  // keep ~0.3 s queued ahead of the playhead
    const { out } = engine(CHUNK, seed, off)
    const buf = actx.createBuffer(1, CHUNK, SR); buf.getChannelData(0).set(out)
    const s = actx.createBufferSource(); s.buffer = buf; s.connect(actx.destination); s.start(nextTime)
    queued.push(s); if (queued.length > 6) queued.shift()
    nextTime += CHUNK / SR; off += CHUNK
  }
}
const startStream = () => { audio(); stopQueued(); off = 0; streamStart = actx.currentTime + 0.06; nextTime = streamStart; playing = true; schedule() }
const stop = () => { stopQueued(); playing = false }

// ── scope ─────────────────────────────────────────────────────────────────────
const cv = document.getElementById("scope"), g = cv.getContext("2d")
let W = 0, H = 0
const resize = () => { const d = Math.min(2, devicePixelRatio || 1); W = cv.width = innerWidth * d | 0; H = cv.height = innerHeight * d | 0 }
addEventListener("resize", resize); resize()
const draw = (buf) => {
  g.fillStyle = "#07070c"; g.fillRect(0, 0, W, H)
  const mid = H / 2, amp = H * 0.4, n = buf.length, step = n / W
  g.strokeStyle = "#ffffff12"; g.beginPath(); g.moveTo(0, mid); g.lineTo(W, mid); g.stroke()
  g.strokeStyle = "#fff"; g.lineWidth = Math.max(1, devicePixelRatio || 1); g.beginPath()
  for (let x = 0; x < W; x++) {
    let lo = 1, hi = -1, s0 = x * step | 0, s1 = Math.min(n, (x + 1) * step + 1 | 0)
    for (let i = s0; i < s1; i++) { const v = buf[i]; if (v < lo) lo = v; if (v > hi) hi = v }
    g.moveTo(x + .5, mid - hi * amp); g.lineTo(x + .5, mid - lo * amp + .5)
  }
  g.stroke()
}

// ── state + loop ───────────────────────────────────────────────────────────
// Swapping js⇄jz is seamless: both engines emit identical samples at the same
// `off`, so the running stream just picks up the new engine on its next chunk.
let engine = null, gen = 0, seed = 1, previewOff = 0
const setEngine = async (kind) => { const my = ++gen; const e = await makeEngine(kind); if (my === gen) engine = e }
addEventListener("pointerdown", () => {
  document.getElementById("hint").style.opacity = 0
  if (!engine) return
  playing ? stop() : startStream()
})

const loop = () => {
  requestAnimationFrame(loop)
  if (!engine) return
  if (playing) schedule()                                // keep audio queued ahead
  // Scope + meter: synth one ½-s window per frame — at the playhead while playing
  // (scrolls in lockstep with the sound), rolling forward before playback starts.
  const head = playing ? Math.max(0, Math.round((actx.currentTime - streamStart) * SR)) : (previewOff += CHUNK)
  const { out, ms } = engine(CHUNK, seed, head)
  draw(out)
  ui.frame(ms)
}

const ui = hud({
  kind: "jz",
  meter: new URLSearchParams(location.search).get("fps") !== "0",
  src: "https://github.com/dy/jz/tree/main/examples/jukebox",
  code: "./jukebox.js",
  nav: "jukebox",
  onSwitch: setEngine,
})
await setEngine(ui.kind)
loop()
</script>
</body>
</html>
