<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<title>Floatbeat jukebox - jz</title>
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; background: #07070c; color: #eee;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  body { border-top: 2px solid #50ad7b; }
  #scope { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
  #hint { position: fixed; left: 0; right: 0; bottom: 22px; text-align: center; z-index: 30;
    font-size: 13px; color: #cfe8db; opacity: .75; pointer-events: none; transition: opacity .4s; }
</style>
</head>
<body>
<canvas id="scope"></canvas>
<div id="hint">click to play · tap again to shuffle the tune</div>

<script type="module">
import { instantiate } from "../../interop.js"
import { hud } from "../lib/jzdemo.js"

const SR = 44100, LOOP = 2.6, LEN = Math.round(SR * LOOP)

// ── engines: same jukebox.js as V8 baseline + compiled wasm ──────────────────
const makeEngine = async (kind) => {
  if (kind === "js") {
    const mod = await import("./jukebox.js")
    return (seed) => { const t0 = performance.now(); const out = mod.fill(LEN, SR, seed); return { out, ms: performance.now() - t0 } }
  }
  const { exports, memory } = instantiate(new Uint8Array(await (await fetch("./jukebox.wasm")).arrayBuffer()))
  return (seed) => {
    const t0 = performance.now(); const view = exports.fill(LEN, SR, seed); const ms = performance.now() - t0
    const out = Float64Array.from(view); memory.reset(); return { out, ms }
  }
}

// ── audio: loop the current tune; shuffle swaps in a freshly-synthesized one ──
let actx, src = null, playStart = 0
const audio = () => { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); if (actx.state === "suspended") actx.resume(); return actx }
const playLoop = (samples) => {
  const ctx = audio()
  const buf = ctx.createBuffer(1, samples.length, SR)
  buf.getChannelData(0).set(samples)
  src?.stop()
  src = ctx.createBufferSource(); src.buffer = buf; src.loop = true; src.connect(ctx.destination); src.start()
  playStart = ctx.currentTime
}

// ── scope ─────────────────────────────────────────────────────────────────────
const cv = document.getElementById("scope"), g = cv.getContext("2d")
let W = 0, H = 0
const resize = () => { const d = Math.min(2, devicePixelRatio || 1); W = cv.width = innerWidth * d | 0; H = cv.height = innerHeight * d | 0 }
addEventListener("resize", resize); resize()
const draw = (buf) => {
  g.fillStyle = "#07070c"; g.fillRect(0, 0, W, H)
  const mid = H / 2, amp = H * 0.4, n = buf.length, step = n / W
  g.strokeStyle = "#ffffff12"; g.beginPath(); g.moveTo(0, mid); g.lineTo(W, mid); g.stroke()
  g.strokeStyle = "#50ad7b"; g.lineWidth = Math.max(1, devicePixelRatio || 1); g.beginPath()
  for (let x = 0; x < W; x++) {
    let lo = 1, hi = -1, s0 = x * step | 0, s1 = Math.min(n, (x + 1) * step + 1 | 0)
    for (let i = s0; i < s1; i++) { const v = buf[i]; if (v < lo) lo = v; if (v > hi) hi = v }
    g.moveTo(x + .5, mid - hi * amp); g.lineTo(x + .5, mid - lo * amp + .5)
  }
  g.stroke()
  if (actx) {                                            // playhead
    const p = ((actx.currentTime - playStart) % LOOP) / LOOP
    g.strokeStyle = "#ffffffaa"; g.beginPath(); g.moveTo(p * W, 0); g.lineTo(p * W, H); g.stroke()
  }
}

// ── state + loop ───────────────────────────────────────────────────────────
let engine = null, gen = 0, seed = 1, lastShuffle = 0
const setEngine = async (kind) => { const my = ++gen; const e = await makeEngine(kind); if (my === gen) { engine = e; if (actx) playLoop(e(seed).out) } }
const shuffle = () => { seed = (seed * 1103515245 + 12345) >>> 8 & 1023; if (engine) playLoop(engine(seed).out) }
addEventListener("pointerdown", () => {
  document.getElementById("hint").style.opacity = 0
  if (!actx) { audio(); if (engine) playLoop(engine(seed).out) } else shuffle()
})

const loop = () => {
  requestAnimationFrame(loop)
  if (!engine) return
  const { out, ms } = engine(seed)                       // per-frame synth → live throughput meter
  draw(out)
  ui.frame(ms)
  if (actx && actx.currentTime - lastShuffle > 12) { lastShuffle = actx.currentTime; shuffle() }  // drift to a new tune
}

const ui = hud({
  kind: "jz",
  meter: new URLSearchParams(location.search).get("fps") !== "0",
  src: "https://github.com/dy/jz/tree/main/examples/jukebox",
  code: "./jukebox.js",
  nav: "jukebox",
  onSwitch: setEngine,
})
await setEngine(ui.kind)
loop()
</script>
</body>
</html>
