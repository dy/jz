<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<title>Floatbeat jukebox - jz</title>
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; background: #07070c; color: #eee;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  body { border-top: 2px solid #ddd; }
  #scope { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
  #bar { position: fixed; left: 0; right: 0; bottom: 20px; z-index: 30; display: flex;
    align-items: center; justify-content: center; gap: 16px; pointer-events: none; }
  #tune { font-size: 14px; color: #ddd; letter-spacing: .01em; }
  #tune b { font-weight: 700; }
  #tune span { color: #888; }
  #prev, #next { pointer-events: auto; font: 16px 'Helvetica Neue', Helvetica, Arial, sans-serif;
    color: #aaa; background: #0a0a12cc; border: 1px solid #ffffff22; padding: 6px 14px;
    cursor: pointer; backdrop-filter: blur(6px); transition: border-color .2s, color .2s; line-height: 1; }
  #prev:hover, #next:hover { border-color: #fff; color: #fff; }
  #hint { position: fixed; left: 0; right: 0; bottom: 54px; text-align: center; z-index: 30;
    font-size: 12px; color: #888; opacity: .8; pointer-events: none; transition: opacity .4s; }
</style>
</head>
<body>
<canvas id="scope"></canvas>
<div id="hint">click to play / pause</div>
<div id="bar"><button id="prev">◁</button> <span id="tune"></span> <button id="next">▷</button></div>

<script type="module">
import { instantiate } from "../../interop.js"
import { hud } from "../lib/jzdemo.js"
import { FLOATBEATS } from "./floatbeats.js"

let tuneIdx = 0
const tune = () => FLOATBEATS[tuneIdx]
const CHUNK_SEC = 0.5

// ── engines: the SAME floatbeat source two ways — JS (new Function) and jz (pre-compiled
// wasm, loaded on demand). engine(len, off) → Float64Array of `len` samples from sample
// index `off`; the floatbeat is pure in t, so any chunk butts seamlessly onto the last. ──
const clamp = (s) => s < -1 ? -1 : s > 1 ? 1 : s

// Pre-built wasm for each floatbeat (built by build.mjs)
const wasmCache = new Map()
const loadWasm = async (idx) => {
  if (!wasmCache.has(idx)) {
    const bytes = new Uint8Array(await (await fetch(new URL(`./beat-${idx}.wasm`, import.meta.url))).arrayBuffer())
    wasmCache.set(idx, instantiate(bytes))
  }
  return wasmCache.get(idx)
}

const makeEngine = async (kind, tn, idx) => {
  if (kind === "js") {
    const beat = new Function("t", "return (" + tn.body + ")(t)")
    return (len, off) => { const out = new Float64Array(len); for (let i = 0; i < len; i++) out[i] = clamp(beat(off + i)); return out }
  }
  const { exports, memory } = await loadWasm(idx)
  return (len, off) => {
    const out = memory.Float64Array(new Float64Array(len))
    exports.fill(out, len, off)
    const s = memory.read(out); const copy = new Float64Array(s); memory.reset(); return copy
  }
}

// ── audio: gapless ½-s chunks scheduled just ahead of the playhead, at the tune's NATIVE
// sample rate (WebAudio resamples to the device). `off` advances forever — the tune never
// chunk-seams. Click toggles play/stop; the 🎲 button swaps in another floatbeat. ──
let actx, playing = false, off = 0, nextTime = 0, streamStart = 0, queued = []
const audio = () => { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); if (actx.state === "suspended") actx.resume(); return actx }
const stopQueued = () => { for (const s of queued) { try { s.stop() } catch {} } queued = [] }
const schedule = () => {
  const sr = tune().sr, CHUNK = Math.round(sr * CHUNK_SEC)
  while (nextTime < actx.currentTime + 0.3) {
    const out = engine(CHUNK, off)
    const buf = actx.createBuffer(1, CHUNK, sr); buf.getChannelData(0).set(out)
    const s = actx.createBufferSource(); s.buffer = buf; s.connect(actx.destination); s.start(nextTime)
    queued.push(s); if (queued.length > 6) queued.shift()
    nextTime += CHUNK / sr; off += CHUNK
  }
}
const startStream = () => { audio(); stopQueued(); off = 0; streamStart = actx.currentTime + 0.06; nextTime = streamStart; playing = true; schedule() }
const stop = () => { stopQueued(); playing = false }

// ── scope ──
const cv = document.getElementById("scope"), g = cv.getContext("2d")
let W = 0, H = 0
const resize = () => { const d = Math.min(2, devicePixelRatio || 1); W = cv.width = innerWidth * d | 0; H = cv.height = innerHeight * d | 0 }
addEventListener("resize", resize); resize()
const drawWave = (buf) => {
  g.fillStyle = "#07070c"; g.fillRect(0, 0, W, H)
  const mid = H / 2, amp = H * 0.4, n = buf.length, step = n / W
  g.strokeStyle = "#ffffff12"; g.beginPath(); g.moveTo(0, mid); g.lineTo(W, mid); g.stroke()
  g.strokeStyle = "#fff"; g.lineWidth = Math.max(1, devicePixelRatio || 1); g.beginPath()
  for (let x = 0; x < W; x++) {
    let lo = 1, hi = -1, s0 = x * step | 0, s1 = Math.min(n, (x + 1) * step + 1 | 0)
    for (let i = s0; i < s1; i++) { const v = buf[i]; if (v < lo) lo = v; if (v > hi) hi = v }
    g.moveTo(x + .5, mid - hi * amp); g.lineTo(x + .5, mid - lo * amp + .5)
  }
  g.stroke()
}
const drawStill = () => {                        // not playing → a still baseline (no rolling preview)
  g.fillStyle = "#07070c"; g.fillRect(0, 0, W, H)
  const mid = H / 2
  g.strokeStyle = "#ffffff30"; g.lineWidth = Math.max(1, devicePixelRatio || 1)
  g.beginPath(); g.moveTo(0, mid); g.lineTo(W, mid); g.stroke()
}

// ── tune label + engine build ──
const tuneEl = document.getElementById("tune"), hintEl = document.getElementById("hint")
const showTune = () => { const t = tune(); tuneEl.innerHTML = `<b>${t.name}</b> <span>· ${t.by} · ${t.sr / 1000} kHz</span>` }
let engine = null, engineReady = false
const buildEngine = async () => { engineReady = false; engine = await makeEngine(ui.kind, tune(), tuneIdx); engineReady = true; showTune() }

addEventListener("pointerdown", () => { hintEl.style.opacity = 0; if (engineReady) playing ? stop() : startStream() })

const switchTune = (dir) => {
  tuneIdx = (tuneIdx + dir + FLOATBEATS.length) % FLOATBEATS.length
  const wasPlaying = playing; if (playing) stop()
  buildEngine().then(() => { if (wasPlaying) startStream(); else hintEl.style.opacity = .8 })
}
const prevBtn = document.getElementById("prev"), nextBtn = document.getElementById("next")
prevBtn.addEventListener("pointerdown", (e) => e.stopPropagation())
nextBtn.addEventListener("pointerdown", (e) => e.stopPropagation())
prevBtn.addEventListener("click", (e) => { e.stopPropagation(); switchTune(-1) })
nextBtn.addEventListener("click", (e) => { e.stopPropagation(); switchTune(1) })
addEventListener("keydown", (e) => { if (e.key === "ArrowLeft") switchTune(-1); if (e.key === "ArrowRight") switchTune(1) })

const loop = () => {
  requestAnimationFrame(loop)
  if (!engineReady) return
  if (playing) {
    schedule()
    const sr = tune().sr, CHUNK = Math.round(sr * CHUNK_SEC)
    const head = Math.max(0, Math.round((actx.currentTime - streamStart) * sr))
    const t0 = performance.now(); const out = engine(CHUNK, head); const ms = performance.now() - t0
    drawWave(out); ui.frame(ms)
  } else { drawStill(); ui.frame() }
}

const ui = hud({
  kind: "jz",
  meter: new URLSearchParams(location.search).get("fps") !== "0",
  src: "https://github.com/dy/jz/tree/main/examples/jukebox",
  nav: "jukebox",
  onSwitch: () => { buildEngine().then(() => { if (playing) startStream() }) },   // recompile the current tune for the new engine
})
buildEngine()
loop()
</script>
</body>
</html>
