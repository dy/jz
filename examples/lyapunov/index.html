<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo } from "../lib/jzdemo.js"

runDemo({
  name: "lyapunov",
  hint: "Markus–Lyapunov fractal — order vs chaos · auto-drifts",
  size: { budget: 220000 },
  // no ptr/drag needed — gentle autonomous drift
  frame: (e, t) => {
    // slow drift of the [2.5,4.0] window via pan offsets
    const ox = Math.sin(t * 0.04) * 0.3
    const oy = Math.cos(t * 0.03) * 0.3
    e.frame(t, ox, oy)
  },
})
</script>
</body>
</html>
