<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo } from "../lib/jzdemo.js"

// Forcing sequence A=0/B=1, packed LSB-first in `bits`. A fresh random one is rolled on every
// reload (always with ≥1 A and ≥1 B), so each visit opens a different fractal.
let bits = 0b10100, len = 5
const rollSeq = () => {
  len = 3 + (Math.random() * 4 | 0)                // 3..6 cells
  const max = (1 << len) - 1
  do { bits = 1 + (Math.random() * (max - 1) | 0) } while (bits === 0 || bits === max)
}
rollSeq()
const seqStr = () => { let s = ""; for (let i = 0; i < len; i++) s += ((bits >> i) & 1) ? "B" : "A"; return s }

// View over the (a,b) plane: [2.5+ox, 2.5+ox+span]². span 1.5 = the classic full window.
const home = { ox: 0, oy: 0, span: 1.5 }
const view = { ...home }
let lastX = 0, lastY = 0, dragging = false, userSet = false

const demo = runDemo({
  name: "lyapunov",
  hint: "Markus–Lyapunov fractal — drag to pan · scroll to zoom · double-click for a fresh sequence",
  size: { budget: 220000 },
  load: (e) => e.setSeq?.(bits, len),
  frame: (e, t) => {
    if (!userSet) { view.ox = Math.sin(t * 0.04) * 0.3; view.oy = Math.cos(t * 0.03) * 0.3 }   // gentle drift until grabbed
    e.frame(t, view.ox, view.oy, view.span)
  },
  overlay: (g) => {
    g.font = "600 14px Futura, 'Futura PT', 'Helvetica Neue', Arial, sans-serif"
    g.fillStyle = "rgba(255,255,255,.85)"
    g.fillText("sequence  " + seqStr(), 14, 26)
  },
})

const cv = demo.cv
const frac = (e) => { const r = cv.getBoundingClientRect(); return { fx: (e.clientX - r.left) / r.width, fy: (e.clientY - r.top) / r.height } }
cv.addEventListener("pointerdown", e => {
  dragging = true; userSet = true; lastX = e.clientX; lastY = e.clientY
  try { cv.setPointerCapture(e.pointerId) } catch {}
})
cv.addEventListener("pointermove", e => {
  if (!dragging) return
  const r = cv.getBoundingClientRect()
  view.ox -= (e.clientX - lastX) / r.width * view.span    // pan delta scales with the zoomed span
  view.oy -= (e.clientY - lastY) / r.height * view.span
  lastX = e.clientX; lastY = e.clientY
})
cv.addEventListener("pointerup", e => { dragging = false; try { cv.releasePointerCapture(e.pointerId) } catch {} })
cv.addEventListener("pointerleave", () => { dragging = false })
// scroll → zoom toward the cursor, keeping the (a,b) point under it pinned
cv.addEventListener("wheel", e => {
  e.preventDefault(); userSet = true
  const { fx, fy } = frac(e)
  const aBefore = 2.5 + view.ox + fx * view.span, bBefore = 2.5 + view.oy + fy * view.span
  view.span *= Math.exp(e.deltaY * 0.0012)
  if (view.span > 1.5) view.span = 1.5            // don't zoom out past the whole window
  if (view.span < 1e-4) view.span = 1e-4
  view.ox = aBefore - 2.5 - fx * view.span        // pin the point under the cursor
  view.oy = bBefore - 2.5 - fy * view.span
}, { passive: false })
// double-click → reset the view AND roll a fresh random sequence
cv.addEventListener("dblclick", () => {
  view.ox = home.ox; view.oy = home.oy; view.span = home.span; userSet = false
  rollSeq()
  if (demo.engine && demo.engine.setSeq) demo.engine.setSeq(bits, len)
})
</script>
</body>
</html>
