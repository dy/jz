<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, trackPointer } from "../lib/jzdemo.js"

// The kernel exports setTheme, so the harness feeds it the page palette and re-tints on toggle.
let phase = 0.0   // rotation offset so the spin CONTINUES from wherever a drag leaves it
const demo = runDemo({
  name: "lorenz",
  hint: "Lorenz attractor — the butterfly that launched chaos theory · watch its twin drift away · drag to spin it",
  size: { dpr: 2, budget: 1300000 },     // crisp + dense, but light enough to stay at 60fps
  load: (e) => e.init(),
  frame: (e, t) => {
    let theta
    if (ptr.down) {
      theta = (ptr.x * 2.0 - 1.0) * Math.PI
      phase = theta - t * 0.15          // remember the offset so spin resumes seamlessly on release
    } else {
      theta = phase + t * 0.15          // keep rotating — never freezes after you let go
    }
    e.frame(t, theta)
  },
})
const ptr = trackPointer(demo.cv)
</script>
</body>
</html>
