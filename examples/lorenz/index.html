<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, trackPointer } from "../lib/jzdemo.js"

// The kernel exports setTheme, so the harness feeds it the page palette and re-tints on toggle.
let baseTheta = 0.0, userSet = false
const demo = runDemo({
  name: "lorenz",
  hint: "Lorenz attractor — glows in the page theme · drag to spin the butterfly",
  load: (e) => e.init(),
  frame: (e, t) => {
    let theta
    if (ptr.down) {
      baseTheta = (ptr.x * 2.0 - 1.0) * Math.PI
      userSet = true
      theta = baseTheta
    } else {
      theta = userSet ? baseTheta : t * 0.15
    }
    e.frame(t, theta)
  },
})
const ptr = trackPointer(demo.cv)
</script>
</body>
</html>
