<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, trackPointer } from "../lib/jzdemo.js"

let lastDown = false
const demo = runDemo({
  name: "truchet",
  hint: "Truchet tiles — click to re-seed, drag to change tile size",
  load: (e) => { e.init?.() },
  frame: (e, t) => {
    // Click (press and release) re-seeds
    if (!ptr.down && lastDown) e.seed?.()
    lastDown = ptr.down

    // Drag changes tile size: right = bigger tiles
    const tileSize = ptr.down ? (12 + ptr.x * 40) | 0 : 22
    e.frame(t, tileSize)
  },
})

const ptr = trackPointer(demo.cv)
</script>
</body>
</html>
