<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo } from "../lib/jzdemo.js"

const R = 7
let t = 0, nextDrip = 30, painting = false
const demo = runDemo({
  name: "watercolor",
  hint: "ink diffusing through wet paper",
  size: { budget: 150000 },
  bg: "#f6f2e9",
  load: (e) => e.clear(),
  // re-roll: wash the paper and drip a fresh scatter of ink blooms
  randomize: (e, d) => { e.clear(); for (let i = 0; i < 5; i++) { const a = Math.random() * 6.28; e.paint(Math.random() * d.W, Math.random() * d.H, R + 3, Math.cos(a) * 0.6, Math.sin(a) * 0.6) } },
  frame: (e) => {
    t++
    if (!painting && t > nextDrip) {
      const a = Math.random() * 6.28
      e.paint(Math.random() * demo.W, Math.random() * demo.H, R + 2, Math.cos(a) * 0.5, Math.sin(a) * 0.5)
      nextDrip = t + 70 + Math.random() * 90
    }
    e.frame(0)
  },
})

const sx = () => demo.W / demo.cv.clientWidth, sy = () => demo.H / demo.cv.clientHeight
let lastX = 0, lastY = 0
const stamp = (px_, py_, fx, fy) => { if (demo.engine) demo.engine.paint(px_ * sx(), py_ * sy(), R, fx, fy) }
const strokeTo = (x, y) => {
  const dx = x - lastX, dy = y - lastY
  const n = Math.max(1, Math.ceil(Math.hypot(dx, dy) / 3))
  const fx = dx * sx() * 0.12, fy = dy * sy() * 0.12
  for (let i = 1; i <= n; i++) stamp(lastX + dx * i / n, lastY + dy * i / n, fx, fy)
  lastX = x; lastY = y
}
demo.cv.addEventListener("pointerdown", (e) => {
  painting = true; lastX = e.offsetX; lastY = e.offsetY
  try { demo.cv.setPointerCapture(e.pointerId) } catch {}
  stamp(e.offsetX, e.offsetY, 0, 0)
})
demo.cv.addEventListener("pointermove", (e) => { if (painting) strokeTo(e.offsetX, e.offsetY) })
demo.cv.addEventListener("pointerup", (e) => { painting = false; try { demo.cv.releasePointerCapture(e.pointerId) } catch {} })
demo.cv.addEventListener("pointerleave", () => { painting = false })
</script>
</body>
</html>
