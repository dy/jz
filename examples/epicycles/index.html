<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />

<body>
<script type="module">
import { runDemo } from "../lib/jzdemo.js"

const demo = runDemo({
  name: "epicycles",
  hint: "Fourier epicycles tracing a heart — each circle is one frequency component",
  load: (e) => e.init(),
  frame: (e, t) => {
    const phi = (t * 0.4) % (2 * Math.PI)
    e.frame(t, phi)
  },
})
</script>
</body>
