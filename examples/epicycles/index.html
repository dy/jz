<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo } from "../lib/jzdemo.js"

// A fresh figure on every reload: heart, rose, star, figure-eight, spirograph or epicycloid.
// Chosen ONCE in the host (so JS and jz deconstruct the same curve), re-applied in `load`.
const SHAPES = ["a heart", "a rose", "a star", "a figure-eight", "a spirograph", "an epicycloid"]
const shape = Math.floor(Math.random() * SHAPES.length)
const demo = runDemo({
  name: "epicycles",
  hint: `Fourier epicycles tracing ${SHAPES[shape]} — each circle is one frequency component`,
  load: (e) => { e.setShape?.(shape); e.init() },
  frame: (e, t) => {
    const phi = (t * 0.9) % (2 * Math.PI)   // ~7s per full loop — a watchable pen pace
    e.frame(t, phi)
  },
})
</script>
</body>
</html>
