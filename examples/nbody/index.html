<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, trackPointer } from "../lib/jzdemo.js"

let t = 0
const demo = runDemo({
  name: "nbody",
  hint: "an n-body gravitational dance · click-hold to add a planet",
  size: { dpr: 2, budget: null },
  load: (e) => e.init(),
  frame: (e) => { t += 1 / 60; if (holding) e.grow?.(ptr.x, ptr.y); e.frame(t) },
})

const ptr = trackPointer(demo.cv)
let holding = false
demo.cv.addEventListener("pointerdown", (e) => {
  holding = true
  try { demo.cv.setPointerCapture(e.pointerId) } catch {}
  demo.engine?.spawn?.(ptr.x, ptr.y)
})
demo.cv.addEventListener("pointerup", (e) => { holding = false; demo.engine?.release?.(); try { demo.cv.releasePointerCapture(e.pointerId) } catch {} })
demo.cv.addEventListener("pointerleave", () => { if (holding) { holding = false; demo.engine?.release?.() } })
demo.cv.addEventListener("dblclick", () => demo.engine?.init?.())
</script>
</body>
</html>
