<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<title>N-body gravity - jz</title>
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; background: #000; color: #eee;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  body { border-top: 2px solid #ddd; }
  #c { position: fixed; inset: 0; width: 100%; height: 100%; display: block; image-rendering: pixelated; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script type="module">
import { loadEngine, hud, trackPointer } from "../lib/jzdemo.js"

const cv = document.getElementById("c"), g = cv.getContext("2d")
let W = 0, H = 0, img, out32, px

const sizeTo = (engine) => {
  const dpr = Math.min(2, window.devicePixelRatio || 1)
  W = Math.round(innerWidth * dpr) >> 1 << 1
  H = Math.round(innerHeight * dpr) >> 1 << 1
  cv.width = W; cv.height = H
  img = g.createImageData(W, H); out32 = new Uint32Array(img.data.buffer)
  px = engine.resize(W, H)
}

let engine = null, gen = 0, t = 0
const setEngine = async (kind) => {
  const my = ++gen
  const e = await loadEngine(kind, { js: "./nbody.js", wasm: "./nbody.wasm" })
  if (my !== gen) return
  engine = e; sizeTo(engine); engine.init()
}
addEventListener("resize", () => engine && sizeTo(engine))

// Click and hold to grow a new planet under the cursor; double-click resets to 3 bodies.
const ptr = trackPointer(cv)
let holding = false
cv.addEventListener('pointerdown', (e) => {
  holding = true
  try { cv.setPointerCapture(e.pointerId) } catch {}
  engine?.spawn?.(ptr.x, ptr.y)
})
cv.addEventListener('pointerup', (e) => { holding = false; engine?.release?.(); try { cv.releasePointerCapture(e.pointerId) } catch {} })
cv.addEventListener('pointerleave', () => { if (holding) { holding = false; engine?.release?.() } })
cv.addEventListener('dblclick', () => engine?.init?.())

const loop = () => {
  requestAnimationFrame(loop)
  if (!engine) return
  t += 1 / 60
  if (holding && engine.grow) engine.grow(ptr.x, ptr.y)
  const t0 = performance.now()
  engine.frame(t)
  const ms = performance.now() - t0
  out32.set(px); g.putImageData(img, 0, 0)
  ui.frame(ms)
}

const ui = hud({
  kind: "jz", hint: "an n-body gravitational dance · click-hold to add a planet",
  code: "./nbody.js",
  nav: "nbody",
  onSwitch: setEngine,
})
await setEngine(ui.kind)
loop()
</script>
</body>
</html>
