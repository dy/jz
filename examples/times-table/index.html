<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, trackPointer } from "../lib/jzdemo.js"

// k auto-drifts upward (cardioid → nephroid → …); drag scrubs k directly, vertical sets N.
let k = 2.0, n = 280, userSet = false
const demo = runDemo({
  name: "times-table",
  hint: "multiplication tables mod N — drag ↔ to scrub the multiplier, ↕ for the point count",
  size: { budget: 700000 },
  frame: (e, t) => {
    if (ptr.down) {
      k = 1.0 + ptr.x * 48.0
      n = Math.round(60 + (1 - ptr.y) * 360)
      userSet = true
    } else if (!userSet) {
      k = 2.0 + t * 0.05
    }
    e.frame(t, k, n)
  },
})
const ptr = trackPointer(demo.cv)
</script>
</body>
</html>
