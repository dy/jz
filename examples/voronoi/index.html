<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo } from "../lib/jzdemo.js"

const demo = runDemo({
  name: "voronoi",
  hint: "a Voronoi diagram of drifting sites · click to add one",
  size: { budget: 360000 },
  load: (e) => { e.init() },
  frame: (e, t) => { e.frame(t) },
})

demo.cv.addEventListener("pointerdown", (e) => {
  if (demo.engine) demo.engine.addSite(e.offsetX * demo.W / demo.cv.clientWidth, e.offsetY * demo.H / demo.cv.clientHeight)
})
</script>
</body>
</html>
