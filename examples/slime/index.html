<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo } from "../lib/jzdemo.js"

const demo = runDemo({
  name: "slime",
  hint: "two Physarum colonies contest territory · drag to drop a shared lure · double-click to re-scatter",
  size: { budget: 750000 },
  load: (e) => e.seed(),
  frame: (e) => e.frame(0),
})

let painting = false, lastX = 0, lastY = 0
const poke = (x, y) => demo.engine.poke(x * demo.W / demo.cv.clientWidth, y * demo.H / demo.cv.clientHeight, 8)
const strokeTo = (x, y) => {
  const dx = x - lastX, dy = y - lastY, n = Math.max(1, Math.ceil(Math.hypot(dx, dy) / 4))
  for (let i = 1; i <= n; i++) poke(lastX + dx * i / n, lastY + dy * i / n)
  lastX = x; lastY = y
}
demo.cv.addEventListener("pointerdown", (e) => { painting = true; lastX = e.offsetX; lastY = e.offsetY; try { demo.cv.setPointerCapture(e.pointerId) } catch {}; poke(e.offsetX, e.offsetY) })
demo.cv.addEventListener("pointermove", (e) => { if (painting) strokeTo(e.offsetX, e.offsetY) })
demo.cv.addEventListener("pointerup", (e) => { painting = false; try { demo.cv.releasePointerCapture(e.pointerId) } catch {} })
demo.cv.addEventListener("pointerleave", () => { painting = false })
demo.cv.addEventListener("dblclick", () => demo.engine.seed())
</script>
</body>
</html>
