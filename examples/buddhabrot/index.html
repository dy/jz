<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, panZoom } from "../lib/jzdemo.js"

// The nebula is a DECAYING accumulator (see buddhabrot.js), so pan/zoom needs NO wipe: the old
// view fades out over ~½s while the new one sharpens in place — quality is retained, never a
// flash to black. Default frames the whole set (centre −0.5, half-height 1.5). Drag to pan,
// scroll to zoom, double-click to reset the view.
const home = { cx: -0.5, cy: 0, scale: 1.5 }
const view = { ...home }
const demo = runDemo({
  name: "buddhabrot",
  hint: "Buddhabrot nebula — drag to pan · scroll to zoom",
  load: (e) => { if (e.init) e.init() },
  frame: (e, t) => { e.frame(t, view.cx, view.cy, view.scale) },
})
panZoom(demo.cv, view, home, () => {})   // view moves freely; the decay handles the transition
</script>
</body>
</html>
