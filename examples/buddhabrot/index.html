<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo } from "../lib/jzdemo.js"

const demo = runDemo({
  name: "buddhabrot",
  hint: "Buddhabrot nebula — escape trajectories accumulate · click to clear",
  load: (e) => { if (e.init) e.init() },
  frame: (e, t) => { e.frame(t) },
})
// click to clear
demo.cv.addEventListener("pointerdown", () => {
  if (demo.engine && demo.engine.clear) demo.engine.clear()
})
</script>
</body>
</html>
