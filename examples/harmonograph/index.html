<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, trackPointer } from "../lib/jzdemo.js"

// A fresh figure on every reload: pick one curated frequency quadruple (small-integer
// ratios that always read as a clean rosette) and random phase offsets. Chosen ONCE so
// JS and jz draw the identical shape; re-applied in `load` after resize / engine swap.
//
// Interaction (chrome-free, pointer-only):
//   Drag left←→right : detune  (0.0 at center = locked figure, ±0.06 = slow precession)
//   Drag up←→down    : damp    (0.5 top = slow envelope / lush, 2.0 bottom = tight spiral)
//   Idle             : slow LFO cycles detune + damp — traverses the full dynamic range
//
// Color reads physics: amber/orange outer loops (full amplitude) → teal/cyan center knot.

const FIGURES = [
  [2, 3, 3, 2], [3, 2, 2, 3], [2, 5, 3, 4], [4, 3, 3, 2],
  [3, 4, 2, 5], [2, 3, 4, 3], [5, 4, 2, 3], [3, 5, 5, 3],
  [4, 5, 3, 2], [5, 3, 4, 2], [3, 4, 5, 3], [2, 5, 5, 4],
]
const fig = FIGURES[Math.floor(Math.random() * FIGURES.length)]
const phs = Array.from({ length: 4 }, () => Math.random() * Math.PI * 2)

// LFO state — kept in an array so it survives between frame calls as a genuine f64
let lfoState = new Float64Array(2)  // [detune, damp]
lfoState[0] = 0.038
lfoState[1] = 1.0

let userDetune = -999, userDamp = -999, lastPtrDown = -10

const demo = runDemo({
  name: "harmonograph",
  hint: "Damped harmonograph — drag left↔right for detune · up↔down for damping",
  size: { dpr: 2, budget: null },
  load: (e) => e.setParams?.(fig[0], fig[1], fig[2], fig[3], phs[0], phs[1], phs[2], phs[3]),
  frame: (e, t) => {
    let detune, damp
    const holdWindow = 5   // seconds to hold user setting after pointer release

    if (ptr.down) {
      // Map pointer position to parameter ranges
      // x ∈ [0,1] → detune ∈ [-0.06, 0.06]  (center = locked, edges = max precession)
      // y ∈ [0,1] → damp  ∈ [0.45, 2.2]     (top = lush slow, bottom = tight fast spiral)
      detune = (ptr.x - 0.5) * 0.12
      damp   = 0.45 + ptr.y * 1.75
      userDetune  = detune
      userDamp    = damp
      lastPtrDown = t
    } else if (t - lastPtrDown < holdWindow) {
      // Hold user setting briefly after release so the figure stabilises before LFO resumes
      detune = userDetune
      damp   = userDamp
    } else {
      // Idle auto-animation: two LFOs at different periods traverse the full parameter space.
      // Detune: 0.042-cycle/s, range -0.055..0.055 — passes through locked figure (detune≈0)
      // twice per cycle so the viewer sees both the closed static figure and the precessional
      // rosette, the two canonical regimes, without any interaction.
      // Damp: 0.017-cycle/s — slower, so the spiral-vs-lush transition reads clearly.
      let detuneTarget = Math.sin(t * 0.042 * 6.2831853) * 0.055
      let dampTarget   = 0.7 + 0.65 * Math.sin(t * 0.017 * 6.2831853 + 1.3)
      // Light smoothing so jumps from user→LFO are graceful
      lfoState[0] = lfoState[0] + (detuneTarget - lfoState[0]) * 0.04
      lfoState[1] = lfoState[1] + (dampTarget   - lfoState[1]) * 0.04
      detune = lfoState[0]
      damp   = lfoState[1]
    }

    e.frame(t, detune, damp)
  },
})

const ptr = trackPointer(demo.cv)
</script>
</body>
</html>
