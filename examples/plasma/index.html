<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, trackPointer } from "../lib/jzdemo.js"

// Drag to smear watercolor blooms into the field (interpolated so the trail is solid).
let painting = false, lpx = 0, lpy = 0, phase = Math.random() * 600   // random initial bloom
const demo = runDemo({
  name: "plasma",
  hint: "fbm domain-warp plasma",
  size: { scale: 0.6 },
  bg: "#07070c",
  frame: (e, t) => {
    e.frame(t + phase)
  },
  // re-roll: jump the fbm time far away → a wholly different bloom of the field
  randomize: () => { phase += 120 + Math.random() * 800 },
})

const ptr = trackPointer(demo.cv)
const inkTo = (x, y) => {
  const dx = x - lpx, dy = y - lpy
  const n = Math.max(1, Math.ceil(Math.hypot(dx, dy) / 0.02))
  for (let i = 1; i <= n; i++) demo.engine?.poke?.(lpx + dx * i / n, lpy + dy * i / n)
  lpx = x; lpy = y
}
demo.cv.addEventListener("pointerdown", () => {
  painting = true; lpx = ptr.x; lpy = ptr.y
  demo.engine?.poke?.(ptr.x, ptr.y)
})
demo.cv.addEventListener("pointermove", () => { if (painting) inkTo(ptr.x, ptr.y) })
demo.cv.addEventListener("pointerup", () => { painting = false })
demo.cv.addEventListener("pointerleave", () => { painting = false })
</script>
</body>
</html>
