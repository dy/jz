<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<title>Plasma - jz</title>
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; background: #07070c; color: #eee;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  body { border-top: 2px solid #ddd; }
  #c { position: fixed; inset: 0; width: 100%; height: 100%; display: block; image-rendering: pixelated; cursor: crosshair; }
  /* palette: a bare square color-wheel icon, no button chrome — it rotates on hover/click */
  #pal { position: fixed; right: 18px; bottom: 18px; z-index: 40;
    width: 30px; height: 30px; padding: 0; margin: 0; border: 0; background: none;
    cursor: pointer; -webkit-appearance: none; appearance: none;
    filter: drop-shadow(0 1px 5px rgba(0,0,0,.55)); }
  #pal .sw { display: block; width: 100%; height: 100%;
    background: conic-gradient(from 0deg, #ff5151, #ffc400, #36e07a, #36a8ff, #a36bff, #ff5151);
    box-shadow: 0 0 0 1.5px rgba(255,255,255,.35) inset;
    transition: transform .4s cubic-bezier(.2,.75,.2,1); }
  #pal:hover .sw { transform: rotate(120deg); }
  #pal.flip .sw { transform: rotate(360deg); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<button id="pal" title="randomize palette" aria-label="randomize palette"><span class="sw"></span></button>

<script type="module">
import { loadEngine, hud, trackPointer } from "../lib/jzdemo.js"

const cv = document.getElementById("c"), g = cv.getContext("2d")
let W = 0, H = 0, img, out32, px

// ── palette: three RGB stops the plasma value sweeps through (lo → mid → hi) ──
// HSL→RGB, then a hue-rotating triad (poline-ish): a dark base, a light off-hue
// mid, and a vivid double-offset high — varied but always harmonious.
const hsl = (h, s, l) => {
  h = (((h % 360) + 360) % 360) / 360
  const a = s * Math.min(l, 1 - l)
  const f = n => { const k = (n + h * 12) % 12; return Math.round(255 * (l - a * Math.max(-1, Math.min(k - 3, 9 - k, 1)))) }
  return [f(0), f(8), f(4)]
}
// Each colormap is a perceptual path from black → … → white (4 stops, 12 ints): luminance
// rises monotonically so the plasma reads as a value field, with a meaningful hue journey
// between. Half the time a hand-tuned classic, half a procedural two-hue sweep.
const CMAPS = [
  [0,0,0,   60,16,110,  245,135,75,  255,255,235],   // magma
  [0,0,4,   50,12,95,   235,120,30,  255,255,170],   // inferno
  [0,0,12,  30,110,170, 120,210,210, 255,255,255],   // ice
  [0,0,0,   150,25,10,  250,180,40,  255,255,255],   // fire
  [4,2,24,  95,40,135,  225,120,95,  255,255,255],   // dusk
  [0,8,8,   20,120,90,  150,205,80,  255,255,235],   // moss
]
const randomPalette = () => {
  if (Math.random() < 0.5) return CMAPS[Math.floor(Math.random() * CMAPS.length)].slice()
  const h = Math.random() * 360, off = (40 + Math.random() * 120) * (Math.random() < 0.5 ? -1 : 1)
  return [0, 0, 0, ...hsl(h, 0.9, 0.34), ...hsl(h + off, 0.85, 0.66), 255, 255, 255]
}
let palette = null
const applyPalette = (p) => { palette = p; if (engine?.setPalette) engine.setPalette(...p) }
const palBtn = document.getElementById("pal")
palBtn.onclick = () => {                       // flip the wheel a full turn on each press
  applyPalette(randomPalette())
  palBtn.classList.toggle("flip")
}

const sizeTo = (engine) => {
  // 5-octave fBm per pixel is the fps ceiling — render at 0.8× the screen (CSS upscales)
  // so it fills the display sharper than the old 900-px cap while staying smooth.
  const k = 0.6
  W = Math.round(innerWidth * k) >> 1 << 1
  H = Math.round(innerHeight * k) >> 1 << 1
  cv.width = W; cv.height = H
  img = g.createImageData(W, H); out32 = new Uint32Array(img.data.buffer)
  px = engine.resize(W, H)
}

let engine = null, gen = 0, t = 0
const setEngine = async (kind) => {
  const my = ++gen
  const e = await loadEngine(kind, { js: "./plasma.js", wasm: "./plasma.wasm" })
  if (my !== gen) return
  engine = e; sizeTo(engine)
  if (palette) engine.setPalette(...palette)   // keep the chosen palette across js⇄jz
}
addEventListener("resize", () => engine && sizeTo(engine))

// Drag to smear watercolor blooms into the field (interpolated so the trail is solid).
const ptr = trackPointer(cv)
let painting = false, lpx = 0, lpy = 0
const inkTo = (x, y) => {
  const dx = x - lpx, dy = y - lpy
  const n = Math.max(1, Math.ceil(Math.hypot(dx, dy) / 0.02))
  for (let i = 1; i <= n; i++) engine?.poke?.(lpx + dx * i / n, lpy + dy * i / n)
  lpx = x; lpy = y
}
cv.addEventListener("pointerdown", (e) => {
  painting = true; lpx = ptr.x; lpy = ptr.y
  try { cv.setPointerCapture(e.pointerId) } catch {}
  engine?.poke?.(ptr.x, ptr.y)
})
cv.addEventListener("pointermove", () => { if (painting) inkTo(ptr.x, ptr.y) })
cv.addEventListener("pointerup", (e) => { painting = false; try { cv.releasePointerCapture(e.pointerId) } catch {} })
cv.addEventListener("pointerleave", () => { painting = false })

const loop = () => {
  requestAnimationFrame(loop)
  if (!engine) return
  t += 1 / 60
  const t0 = performance.now()
  engine.frame(t)
  const ms = performance.now() - t0
  out32.set(px); g.putImageData(img, 0, 0)
  ui.frame(ms)
}

const ui = hud({
  kind: "jz", hint: "fbm domain-warp plasma",
  meter: new URLSearchParams(location.search).get("fps") !== "0",
  src: "https://github.com/dy/jz/tree/main/examples/plasma",
  code: "./plasma.js",
  nav: "plasma",
  onSwitch: setEngine,
})
await setEngine(ui.kind)
// starts black & white (kernel default grayscale ramp); the palette button adds color
loop()
</script>
</body>
</html>
