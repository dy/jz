<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<title>Plasma - jz</title>
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; background: #07070c; color: #eee;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  body { border-top: 2px solid #ddd; }
  #c { position: fixed; inset: 0; width: 100%; height: 100%; display: block; image-rendering: pixelated; }
  #pal { position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%); z-index: 40;
    font: 13px ui-monospace, Menlo, monospace; color: #aaa; background: #0a0a12cc;
    border: 1px solid #ddd88; border-radius: 999px; padding: 7px 16px; cursor: pointer;
    backdrop-filter: blur(6px); transition: border-color .2s, color .2s; }
  #pal:hover { border-color: #ddd; color: #fff; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<button id="pal" title="randomize palette">🎨 palette</button>

<script type="module">
import { loadEngine, hud } from "../lib/jzdemo.js"

const cv = document.getElementById("c"), g = cv.getContext("2d")
let W = 0, H = 0, img, out32, px

// ── palette: three RGB stops the plasma value sweeps through (lo → mid → hi) ──
// HSL→RGB, then a hue-rotating triad (poline-ish): a dark base, a light off-hue
// mid, and a vivid double-offset high — varied but always harmonious.
const hsl = (h, s, l) => {
  h = (((h % 360) + 360) % 360) / 360
  const a = s * Math.min(l, 1 - l)
  const f = n => { const k = (n + h * 12) % 12; return Math.round(255 * (l - a * Math.max(-1, Math.min(k - 3, 9 - k, 1)))) }
  return [f(0), f(8), f(4)]
}
const randomPalette = () => {
  const h0 = Math.random() * 360, off = (20 + Math.random() * 130) * (Math.random() < 0.5 ? -1 : 1)
  return [...hsl(h0, 0.72, 0.24), ...hsl(h0 + off, 0.62, 0.74), ...hsl(h0 + 2 * off, 0.80, 0.52)]
}
let palette = null
const applyPalette = (p) => { palette = p; if (engine?.setPalette) engine.setPalette(...p) }
document.getElementById("pal").onclick = () => applyPalette(randomPalette())

const sizeTo = (engine) => {
  // 5-octave fBm per pixel is the fps ceiling — render at 0.8× the screen (CSS upscales)
  // so it fills the display sharper than the old 900-px cap while staying smooth.
  const k = 0.6
  W = Math.round(innerWidth * k) >> 1 << 1
  H = Math.round(innerHeight * k) >> 1 << 1
  cv.width = W; cv.height = H
  img = g.createImageData(W, H); out32 = new Uint32Array(img.data.buffer)
  px = engine.resize(W, H)
}

let engine = null, gen = 0, t = 0
const setEngine = async (kind) => {
  const my = ++gen
  const e = await loadEngine(kind, { js: "./plasma.js", wasm: "./plasma.wasm" })
  if (my !== gen) return
  engine = e; sizeTo(engine)
  if (palette) engine.setPalette(...palette)   // keep the chosen palette across JS⇄jz
}
addEventListener("resize", () => engine && sizeTo(engine))

const loop = () => {
  requestAnimationFrame(loop)
  if (!engine) return
  t += 1 / 60
  const t0 = performance.now()
  engine.frame(t)
  const ms = performance.now() - t0
  out32.set(px); g.putImageData(img, 0, 0)
  ui.frame(ms)
}

const ui = hud({
  kind: "jz",
  meter: new URLSearchParams(location.search).get("fps") !== "0",
  src: "https://github.com/dy/jz/tree/main/examples/plasma",
  code: "./plasma.js",
  nav: "plasma",
  onSwitch: setEngine,
})
await setEngine(ui.kind)
applyPalette(randomPalette())     // start on a fresh random palette
loop()
</script>
</body>
</html>
