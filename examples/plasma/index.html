<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<title>Plasma - jz</title>
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; background: #07070c; color: #eee;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  body { border-top: 2px solid #ddd; }
  #c { position: fixed; inset: 0; width: 100%; height: 100%; display: block; image-rendering: pixelated; cursor: crosshair; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script type="module">
import { loadEngine, hud, trackPointer } from "../lib/jzdemo.js"

const cv = document.getElementById("c"), g = cv.getContext("2d")
let W = 0, H = 0, img, out32, px

const sizeTo = (engine) => {
  // 5-octave fBm per pixel is the fps ceiling — render at 0.8× the screen (CSS upscales)
  // so it fills the display sharper than the old 900-px cap while staying smooth.
  const k = 0.6
  W = Math.round(innerWidth * k) >> 1 << 1
  H = Math.round(innerHeight * k) >> 1 << 1
  cv.width = W; cv.height = H
  img = g.createImageData(W, H); out32 = new Uint32Array(img.data.buffer)
  px = engine.resize(W, H)
}

let engine = null, gen = 0, t = 0
const setEngine = async (kind) => {
  const my = ++gen
  const e = await loadEngine(kind, { js: "./plasma.js", wasm: "./plasma.wasm" })
  if (my !== gen) return
  engine = e; sizeTo(engine)
}
addEventListener("resize", () => engine && sizeTo(engine))

// Drag to smear watercolor blooms into the field (interpolated so the trail is solid).
const ptr = trackPointer(cv)
let painting = false, lpx = 0, lpy = 0
const inkTo = (x, y) => {
  const dx = x - lpx, dy = y - lpy
  const n = Math.max(1, Math.ceil(Math.hypot(dx, dy) / 0.02))
  for (let i = 1; i <= n; i++) engine?.poke?.(lpx + dx * i / n, lpy + dy * i / n)
  lpx = x; lpy = y
}
cv.addEventListener("pointerdown", (e) => {
  painting = true; lpx = ptr.x; lpy = ptr.y
  try { cv.setPointerCapture(e.pointerId) } catch {}
  engine?.poke?.(ptr.x, ptr.y)
})
cv.addEventListener("pointermove", () => { if (painting) inkTo(ptr.x, ptr.y) })
cv.addEventListener("pointerup", (e) => { painting = false; try { cv.releasePointerCapture(e.pointerId) } catch {} })
cv.addEventListener("pointerleave", () => { painting = false })

const loop = () => {
  requestAnimationFrame(loop)
  if (!engine) return
  t += 1 / 60
  const t0 = performance.now()
  engine.frame(t)
  const ms = performance.now() - t0
  ui.paint(px, out32); g.putImageData(img, 0, 0)
  ui.frame(ms)
}

const ui = hud({
  kind: "jz", hint: "fbm domain-warp plasma",
  meter: new URLSearchParams(location.search).get("fps") !== "0",
  src: "https://github.com/dy/jz/tree/main/examples/plasma",
  code: "./plasma.js",
  nav: "plasma",
  onSwitch: setEngine,
})
await setEngine(ui.kind)
// starts black & white (kernel default grayscale ramp); the shared palette icon adds color
loop()
</script>
</body>
</html>
