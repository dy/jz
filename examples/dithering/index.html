<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<!-- algorithm readout: bottom of the plot, black text with a soft white halo so it reads on the dither -->
<div id="algo" style="position:fixed;left:50%;bottom:90px;transform:translateX(-50%);z-index:40;font:600 16px 'Helvetica Neue',Helvetica,Arial,sans-serif;letter-spacing:.03em;color:#000;text-shadow:0 0 8px #fff,0 0 4px #fff,0 0 2px #fff;pointer-events:none"></div>

<script type="module">
import { runDemo, trackPointer } from "../lib/jzdemo.js"

// Eight 1-bit dithers of one BAS-RELIEF plate viewed from above under an orbiting light — a
// pyramid standing on the surface, an embossed relief of Michelangelo's David (heightmap from a
// 19th-century Brogi print), a cube sunk corner-down, a torus and a full sphere sunk to their
// equators — cycling automatically (algorithm every ~6s, subject once per full algorithm lap),
// or drag left↔right to pick the algorithm / hit the dice for a new subject. The pixelated
// backing keeps the dot pattern crisp at any window size. Threshold (pure 50% B&W) is excluded
// from the algorithm cycle — it carries no dither texture. Host mode m → kernel mode m+1.
const NAMES = ["Random", "Ordered · Bayer 4×4", "Ordered · Bayer 8×8", "Clustered-dot halftone", "Floyd–Steinberg", "Jarvis–Judice–Ninke", "Atkinson"]
const N = NAMES.length
const SHAPES = ["Pyramid", "David", "Cube", "Torus", "Sphere"]
const NSHAPES = SHAPES.length
const LAP = N * 6   // one full algorithm cycle, in seconds — the subject advances once per lap

let mode = 0, manual = false, manualAt = -10
let shapePhase = Math.random() * LAP * NSHAPES, shape = Math.floor(shapePhase / LAP) % NSHAPES
let shapeManual = false, shapeManualAt = -999
let nowT = 0, lightPhase = Math.random() * 6.28
const algoEl = document.getElementById("algo")
const setLabel = () => { algoEl.innerHTML = `<b style="font-weight:700">${SHAPES[shape]} · ${NAMES[mode]}</b> &nbsp; <span style="font-weight:500;opacity:.5">${mode + 1}/${N}</span>` }
const setMode = (m) => { m = m < 0 ? 0 : m > N - 1 ? N - 1 : m; if (m !== mode) { mode = m; setLabel() } }
const setShape = (s) => { s = ((s % NSHAPES) + NSHAPES) % NSHAPES; if (s !== shape) { shape = s; setLabel() } }
setLabel()

const demo = runDemo({
  name: "dithering",
  hint: "Dithering — 1-bit renderings of a smooth image · drag ↔ to pick the algorithm · dice for a new subject",
  size: { budget: 420000 },          // a touch coarse so the dither dots read clearly
  frame: (e, t) => {
    nowT = t
    if (manual && t - manualAt > 8) manual = false                     // hand mode control back after 8s idle
    if (!manual) setMode(Math.floor(t / 6) % N)                       // auto-cycle: hold each algorithm ~6s
    if (shapeManual && t - shapeManualAt > LAP) shapeManual = false    // hand subject control back after one lap
    if (!shapeManual) setShape(Math.floor((t + shapePhase) / LAP) % NSHAPES)   // auto-cycle: a new subject each lap
    e.frame(t + lightPhase, mode + 1, shape)                           // +1 skips the kernel's excluded Threshold(0)
  },
  // re-roll: jump straight to a different subject (the algorithm keeps cycling on its own)
  randomize: () => {
    shapeManual = true; shapeManualAt = nowT
    setShape(shape + 1 + Math.floor(Math.random() * (NSHAPES - 1)))
    lightPhase = Math.random() * 6.28
  },
})

const ptr = trackPointer(demo.cv)
const pick = () => { manual = true; manualAt = nowT; setMode(Math.min(N - 1, (ptr.x * N) | 0)) }
demo.cv.addEventListener("pointerdown", pick)
demo.cv.addEventListener("pointermove", () => { if (ptr.down) pick() })
</script>
</body>
</html>
