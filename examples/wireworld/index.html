<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<title>Wireworld - jz</title>
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; background: #000; color: #eee;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  body { border-top: 2px solid #ddd; }
  #c { position: fixed; inset: 0; width: 100%; height: 100%; display: block; image-rendering: pixelated; cursor: crosshair; }
  #hint { position: fixed; left: 0; right: 0; bottom: 20px; text-align: center; z-index: 20;
    font-size: 13px; color: #888; opacity: .85; pointer-events: none; transition: opacity .5s; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">drag to lay wire · right-click to spark an electron · double-click to reset</div>

<script type="module">
import { loadEngine, hud } from "../lib/jzdemo.js"

const cv = document.getElementById("c"), g = cv.getContext("2d")
let W = 0, H = 0, img, out32, px

const sizeTo = (engine) => {
  const budget = 300000
  let scale = Math.min(1, window.devicePixelRatio || 1)
  const want = innerWidth * innerHeight * scale * scale
  if (want > budget) scale *= Math.sqrt(budget / want)
  W = Math.round(innerWidth * scale) >> 1 << 1
  H = Math.round(innerHeight * scale) >> 1 << 1
  cv.width = W; cv.height = H
  img = g.createImageData(W, H); out32 = new Uint32Array(img.data.buffer)
  px = engine.resize(W, H)
}

// run the CA a few times a second (electrons race too fast at 60fps to follow)
let engine = null, gen = 0, acc = 0, STEP = 1 / 12
const setEngine = async (kind) => {
  const my = ++gen
  const e = await loadEngine(kind, { js: "./wireworld.js", wasm: "./wireworld.wasm" })
  if (my !== gen) return
  engine = e; sizeTo(engine); engine.seed(); engine.frame(0)
}
addEventListener("resize", () => engine && sizeTo(engine))

const hint = document.getElementById("hint")
const sx = () => W / cv.clientWidth, sy = () => H / cv.clientHeight
// drag a rubber-band rectangle → a conductor loop (like the others); right-click sparks one.
let dragging = false, ax = 0, ay = 0, bx = 0, by = 0
cv.addEventListener("contextmenu", (e) => e.preventDefault())
cv.addEventListener("pointerdown", (e) => {
  if (e.button === 2) { engine?.paint(e.offsetX * sx(), e.offsetY * sy(), 1, 1); return }   // spark
  dragging = true; ax = bx = e.offsetX; ay = by = e.offsetY
  try { cv.setPointerCapture(e.pointerId) } catch {}
})
cv.addEventListener("pointermove", (e) => { if (dragging) { bx = e.offsetX; by = e.offsetY } })
cv.addEventListener("pointerup", (e) => {
  if (dragging && engine) engine.drawRect(ax * sx(), ay * sy(), bx * sx(), by * sy())
  dragging = false; try { cv.releasePointerCapture(e.pointerId) } catch {}
})
cv.addEventListener("pointerleave", () => { dragging = false })
cv.addEventListener("dblclick", () => engine && engine.seed())

let last = performance.now()
const loop = () => {
  requestAnimationFrame(loop)
  if (!engine) return
  const now = performance.now(); acc += (now - last) / 1000; last = now
  let work = 0
  if (acc >= STEP) {
    acc = 0
    const t0 = performance.now(); engine.frame(0); work = performance.now() - t0
    out32.set(px); g.putImageData(img, 0, 0)
  } else { out32.set(px); g.putImageData(img, 0, 0) }
  if (dragging) {                              // rubber-band preview
    g.strokeStyle = "rgba(120,200,255,.9)"; g.lineWidth = 1
    g.strokeRect(ax * sx() + .5, ay * sy() + .5, (bx - ax) * sx(), (by - ay) * sy())
  }
  ui.frame(work || undefined)
}

const ui = hud({
  kind: "jz",
  meter: new URLSearchParams(location.search).get("fps") !== "0",
  src: "https://github.com/dy/jz/tree/main/examples/wireworld",
  code: "./wireworld.js",
  nav: "wireworld",
  onSwitch: setEngine,
})
await setEngine(ui.kind)
loop()
</script>
</body>
</html>
