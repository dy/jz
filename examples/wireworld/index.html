<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo } from "../lib/jzdemo.js"

// The CA steps a few times a second (electrons race too fast at 60fps to follow); the frame
// is painted every tick regardless. Drag a rubber-band rectangle → a conductor loop;
// right-click sparks a cell; double-click reseeds.
let lastStep = -1
let dragging = false, ax = 0, ay = 0, bx = 0, by = 0
const sx = (d) => d.W / d.cv.clientWidth, sy = (d) => d.H / d.cv.clientHeight

const demo = runDemo({
  name: "wireworld",
  hint: "Wireworld — diodes pass electrons one way (→ through, ← blocked); loops below are clocks · drag to add a loop",
  size: { budget: 30000 },
  load: (e) => { e.seed(); e.frame(0) },
  frame: (e, t) => { if (t - lastStep >= 1 / 14) { lastStep = t; e.frame(0) } },
  overlay: (g, d) => {
    if (!dragging) return
    g.strokeStyle = "rgba(170,170,170,.85)"; g.lineWidth = 1
    g.strokeRect(ax * sx(d) + .5, ay * sy(d) + .5, (bx - ax) * sx(d), (by - ay) * sy(d))
  },
})

const cv = demo.cv
cv.addEventListener("contextmenu", (e) => e.preventDefault())
cv.addEventListener("pointerdown", (e) => {
  if (e.button === 2) { demo.engine?.paint(e.offsetX * sx(demo), e.offsetY * sy(demo), 1, 1); return }
  dragging = true; ax = bx = e.offsetX; ay = by = e.offsetY
  try { cv.setPointerCapture(e.pointerId) } catch {}
})
cv.addEventListener("pointermove", (e) => { if (dragging) { bx = e.offsetX; by = e.offsetY } })
cv.addEventListener("pointerup", (e) => {
  if (dragging && demo.engine) demo.engine.drawRect(ax * sx(demo), ay * sy(demo), bx * sx(demo), by * sy(demo))
  dragging = false; try { cv.releasePointerCapture(e.pointerId) } catch {}
})
cv.addEventListener("pointerleave", () => { dragging = false })
cv.addEventListener("dblclick", () => demo.engine && demo.engine.seed())
</script>
</body>
</html>
