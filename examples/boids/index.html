<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, trackPointer } from "../lib/jzdemo.js"

// The cursor is a hawk while pressed — the flock scatters, then re-forms. A click also
// drops a few new boids into the flock.
const demo = runDemo({
  name: "boids",
  hint: "Reynolds flocking — cohesion, alignment, separation. Press: the cursor becomes a hawk and the flock scatters",
  size: { dpr: 2, budget: null },
  load: (e) => e.init(),
  frame: (e, t) => {
    const mx = ptr.down ? ptr.x * demo.W : -1
    const my = ptr.down ? ptr.y * demo.H : -1
    e.frame(t, mx, my, ptr.down ? 1 : 0)
  },
})

const ptr = trackPointer(demo.cv)
demo.cv.addEventListener("pointerdown", () => { if (demo.engine) demo.engine.addBoids(ptr.x, ptr.y, 8) })
</script>
</body>
</html>
