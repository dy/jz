<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, panZoom } from "../lib/jzdemo.js"

// c morphs ON ITS OWN, tracing the classic radius-0.7885 circle through the c-plane — the set
// flows through dendrites, spirals and disconnected dust without any input. That frees DRAG for
// panning (and scroll for zoom), like every other brot: panning takes priority, the animation
// supplies the morph. A tiny radius wobble keeps successive loops from repeating exactly.
const home = { cx: 0, cy: 0, scale: 1.5 }
const view = { ...home }
const demo = runDemo({
  name: "julia",
  hint: "the Julia set — c morphs on its own · drag to pan · scroll to zoom",
  frame: (e, t) => {
    const th = t * 0.075
    const r = 0.7885 + 0.02 * Math.sin(t * 0.31)
    const cre = r * Math.cos(th)
    const cim = r * Math.sin(th)
    e.frame(t, cre, cim, view.cx, view.cy, view.scale)
  },
})
panZoom(demo.cv, view, home, () => {})   // drag → pan, scroll → zoom, double-click → reset
</script>
</body>
</html>
