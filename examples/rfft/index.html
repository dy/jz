<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<title>Live spectrogram (RFFT) - jz</title>
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; color: #eee; background: #07070c; font-family: sans-serif; }
  body { border-top: 2px solid #ddd; }
  a { color: #eee; text-decoration: none; }
  a:hover { color: #ddd; text-decoration: underline; }
  #stage { position: absolute; inset: 0; display: flex; flex-direction: column; gap: 2px; }
  #sgwrap { position: relative; flex: 3 1 0; }
  #sg { position: absolute; inset: 0; width: 100%; height: 100%; display: block;
    background: #000; image-rendering: pixelated; }
  /* vertical Hz axis over the spectrogram — non-scrolling, so it stays put as the trace scrolls */
  #axis { position: absolute; inset: 0; z-index: 12; pointer-events: none; overflow: hidden; }
  #axis .tick { position: absolute; left: 0; right: 0; border-top: 1px solid rgba(255, 255, 255,.12); }
  #axis .tick b { position: absolute; left: 5px; top: -7px; font: 600 10px/1 ui-monospace, Menlo, monospace;
    color: #ddd; opacity: .85; text-shadow: 0 0 3px #000, 0 1px 2px #000; }
  /* scale selector: pitch-faithful log (equal octaves) vs perceptual mel — switch live */
  #scale { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); z-index: 14;
    display: flex; border: 1px solid #ffffff22; border-radius: 7px; overflow: hidden;
    background: #000a; user-select: none; }
  #scale button { border: 0; background: transparent; color: #aaa; cursor: pointer;
    font: 600 10px/1 ui-monospace, Menlo, monospace; padding: 5px 11px; }
  #scale button + button { border-left: 1px solid #ffffff14; }
  #scale button.on { background: #ddd; color: #0a0a0a; }
  /* waveform: its own panel under the spectrogram, scrolling in lockstep with it */
  #wavewrap { position: relative; flex: 1.4 1 0; }
  #wave { position: absolute; inset: 0; width: 100%; height: 100%; display: block; background: #000000; }
  #play { position: absolute; inset: 0; z-index: 50; display: flex; align-items: center; justify-content: center;
    background: rgba(7,7,12,.6); cursor: pointer; }
  #play div { width: 0; height: 0; border-style: solid; border-width: 22px 0 22px 36px;
    border-color: transparent transparent transparent rgba(238,238,238,.92);
    filter: drop-shadow(0 0 12px rgba(200, 200, 200,.35)); }
  #play:hover div { border-left-color: #ddd; }
</style>
</head>
<body>
<div id="stage">
  <div id="sgwrap">
    <canvas id="sg"></canvas>
    <div id="axis"></div>
    <div id="scale"><button data-s="log" class="on">log</button><button data-s="mel">mel</button></div>
    <div id="play" aria-label="Play"><div></div></div>
  </div>
  <div id="wavewrap">
    <canvas id="wave"></canvas>
  </div>
</div>

<script type="module">
import { loadEngine, hud } from "../lib/jzdemo.js";
import { instantiate } from "../../interop.js";
import { songs, songBeatSrc, songSlug } from "./songs.js";

const N = 16384;                     // FFT size → N/2 = 8192 bins; bin width SR/N ≈ 2.7 Hz — a heavier
                                     // transform with finer bass detail, so jz vs JS is clearly measurable
const HOP = 512;                     // samples between successive spectrogram columns
const urls = { js: "./rfft.js", wasm: "./rfft.wasm" };
const TAU = 6.283185307179586;

// ── floatbeat synthesis (JS ⇄ jz — single seeded tune) ───────────────────────
let beatCache = { kind: "", fill: null };
const beatUrl = () => new URL(`./beats/${songSlug(songs[0])}.wasm`, document.baseURI).href;
const makeBeatFill = async (kind) => {
  const song = songs[0];
  if (kind === "js") {
    const beat = new Function("t", "sd", `return (${songBeatSrc(song)})(t, sd)`);
    return (ch, len, sr, off, sd) => { for (let i = 0; i < len; i++) ch[i] = beat(off + i / sr, sd); };
  }
  const { exports, memory } = instantiate(
    new Uint8Array(await (await fetch(beatUrl())).arrayBuffer())
  );
  return (ch, len, sr, off, sd) => {
    const out = memory.Float64Array(new Float64Array(len));
    exports.fill(out, len, sr, off, sd);
    const samples = memory.read(out);
    for (let i = 0; i < len; i++) ch[i] = samples[i];
    memory.reset();   // rewind the bump allocator — the stream calls this every chunk
  };
};
// One seeded tune. Its loop buffer is synthesized via this cached fill — sliced
// across frames (synthBuffer) so the first build never blocks the main thread.
const warmBeat = async (kind) => {
  if (beatCache.kind !== kind) beatCache = { kind, fill: await makeBeatFill(kind) };
};

// Hann window — tapers each FFT frame to suppress spectral leakage.
const hann = new Float64Array(N);
for (let i = 0; i < N; i++) hann[i] = 0.5 - 0.5 * Math.cos(TAU * i / (N - 1));

// 256-entry grayscale LUT (ABGR for direct Uint32 writes). Not a flat linear ramp:
// a smoothstep contrast curve keeps the background clean-black and the mid lifted toward
// white, then a final gamma brightens the highlights so strong partials read as bright
// white on black — perceptual lightness, punchier than value-linear gray.
const tone = (t) => Math.pow(t * t * (3 - 2 * t), 0.72);
const pal = new Uint32Array(256);
for (let k = 0; k < 256; k++) {
  const v = Math.max(0, Math.min(255, tone(k / 255) * 255 | 0));
  pal[k] = (255 << 24) | (v << 16) | (v << 8) | v;
}

// full audible range — drives the spectrogram rows and the waveform's spectral tint.
const F_LO = 20, F_HI = 20000;

// ── frequency scale + A-weighting ──────────────────────────────────────────────
// Two ways to lay out 20 Hz..20 kHz, switchable live:
//   log — equal octaves (constant-Q): the pitch-faithful view a musician reads.
//   mel — perceptual: spreads treble, packs bass. Standard for speech/MFCC.
const hzToMel = (f) => 1127 * Math.log(1 + f / 700);
const melToHz = (m) => 700 * (Math.exp(m / 1127) - 1);
const MEL_LO = hzToMel(F_LO), MEL_HI = hzToMel(F_HI), LN_R = Math.log(F_HI / F_LO);
const SCALES = {                                     // fwd: Hz → 0 (20 Hz)…1 (20 kHz); inv: back
  log: { fwd: (f) => Math.log(f / F_LO) / LN_R,                inv: (p) => F_LO * Math.exp(p * LN_R) },
  mel: { fwd: (f) => (hzToMel(f) - MEL_LO) / (MEL_HI - MEL_LO), inv: (p) => melToHz(MEL_LO + p * (MEL_HI - MEL_LO)) },
};
let scale = SCALES.log;                              // current axis — equal octaves by default; selector swaps it
const frac = (f) => scale.fwd(f);                    // Hz → vertical/horizontal fraction
const binAt = (p) => Math.min(N / 2 - 1, Math.max(1, Math.round(scale.inv(p) * N / SR)));  // fraction → FFT bin

// A-weighting (IEC 61672): the standard loudness curve of the ear — peaks ~2.5 kHz,
// rolls off bass hard and treble gently, so the picture shows what you actually hear.
const aWeight = (f) => {
  const f2 = f * f, c2 = 12194 * 12194;
  const ra = (c2 * f2 * f2) /
    ((f2 + 20.6 * 20.6) * Math.sqrt((f2 + 107.7 * 107.7) * (f2 + 737.9 * 737.9)) * (f2 + c2));
  return 20 * Math.log10(ra) + 2.0;                  // dB, normalised to 0 at 1 kHz
};
const DB_FLOOR = -84, DB_CEIL = -34;                 // A-weighted level → brightness window

// ── canvases ─────────────────────────────────────────────────────────────────
const sg = document.getElementById("sg"), sgctx = sg.getContext("2d");
const wave = document.getElementById("wave"), wctx = wave.getContext("2d");
const axisEl = document.getElementById("axis");
let rowLo, rowHi, rowAw, colImg, colPix;   // per-row band bin range + A-weight + reusable column

// vertical frequency axis (20 Hz..20 kHz), matching the spectrum below. Labels sit at their
// scale fraction, so they track any panel size or scale change without touching the canvas.
let SR = 44100;
const AXIS_HZ = [20, 50, 100, 200, 500, 1000, 2000, 5000, 10000, 20000];   // matches the spectrum ruler
const fmtHz = (f) => (f >= 1000 ? f / 1000 + "k" : f) + " Hz";
// thin colliding labels: keep both endpoints, drop any mid-label closer than `gap`
// (axis fraction) to the previous kept one — so one ruler stays clean on mel *and* log,
// where mel packs the low decades into a sliver. Returns a keep[] mask over AXIS_HZ.
const keepLabels = (fracs, gap) => {
  const keep = fracs.map(() => true);
  for (let i = 1, last = 0; i < fracs.length - 1; i++)
    if (Math.abs(fracs[i] - fracs[last]) < gap) keep[i] = false; else last = i;
  return keep;
};
const drawAxis = () => {
  const fr = AXIS_HZ.map(f => 1 - frac(f));            // 0 = top (20 kHz) … 1 = bottom (20 Hz)
  const keep = keepLabels(fr, 0.025);
  axisEl.innerHTML = AXIS_HZ.map((f, i) => {
    if (!keep[i]) return "";
    const p = fr[i], nudge = p < 0.02 ? "top:2px" : p > 0.98 ? "top:-12px" : "";   // keep edge labels in frame
    return `<div class="tick" style="top:${(p * 100).toFixed(2)}%"><b style="${nudge}">${fmtHz(f)}</b></div>`;
  }).join("");
};

// Each pixel row is a frequency band [rowLo..rowHi] of FFT bins; the trace shows the peak
// magnitude in the band, A-weighted. Top = 20 kHz (fraction 1), bottom = 20 Hz (fraction 0).
const buildRows = () => {
  const h = sg.height, step = 1 / (h - 1);
  rowLo = new Int32Array(h); rowHi = new Int32Array(h); rowAw = new Float64Array(h);
  for (let y = 0; y < h; y++) {
    const p = 1 - y * step;                            // top row = 1, bottom row = 0
    const a = binAt(p + 0.5 * step), b = binAt(p - 0.5 * step);   // band edges, half a row each way
    rowLo[y] = Math.min(a, b); rowHi[y] = Math.max(a, b);
    rowAw[y] = aWeight(scale.inv(p));
  }
};
const fit = () => {
  const wrap = document.getElementById("sgwrap");
  const dpr = Math.min(2, window.devicePixelRatio || 1);   // retina-crisp spectrogram + waveform
  sg.width = Math.round(wrap.clientWidth * dpr); sg.height = Math.round(wrap.clientHeight * dpr);
  wave.width = Math.round(wave.clientWidth * dpr); wave.height = Math.round(wave.clientHeight * dpr);
  sgctx.fillStyle = "#000"; sgctx.fillRect(0, 0, sg.width, sg.height);
  wctx.fillStyle = "#000000"; wctx.fillRect(0, 0, wave.width, wave.height);
  buildRows();
  colImg = sgctx.createImageData(1, sg.height);
  colPix = new Uint32Array(colImg.data.buffer);
};
fit();
drawAxis();
window.addEventListener("resize", () => { fit(); });

// ── audio + render loop ──────────────────────────────────────────────────────
// One continuous loop buffer, looped engine-side and sample-accurate, so it is
// inherently gapless (no chunk-seam clicks). It is synthesized ASYNCHRONOUSLY in
// slices so the first build never blocks the main thread.
let audio = null, running = false, paused = false;
let seed = 0;                         // fixed chord seed — the single tune
let startT = 0;                       // ctx time the timeline is anchored to
let cur = null;                       // { src, gain, ch } currently playing
const LOOP_SEC = 32;                  // one full 8-bar cycle (8 × 4 s)

// FPS / ms panel on by default; append ?fps=0 to hide it for clean screenshots.
const ui = hud({
  kind: "jz",
  meter: new URLSearchParams(location.search).get("fps") !== "0",
  src: "https://github.com/dy/jz/tree/main/examples/rfft",
  code: "./rfft.js",
  nav: "rfft",
  onSwitch: (kind) => start(kind),    // reload the FFT engine; the playing buffer is untouched (jz==JS samples)
});

// Synthesize a full loop buffer for seed `sd`, ~1 s at a time, yielding to the event
// loop between slices so the page never freezes. The beat is pure in t, so slices
// joined at sample s..s+L are seamless.
async function synthBuffer(sd) {
  const sr = audio.sampleRate, len = Math.round(sr * LOOP_SEC);
  const ch = new Float64Array(len), STEP = Math.round(sr), tmp = new Float64Array(STEP);
  for (let s = 0; s < len; s += STEP) {
    const L = Math.min(STEP, len - s);
    beatCache.fill(tmp, L, sr, s / sr, sd);             // fill's `off` is a TIME offset in seconds (beat(off + i/sr))
    ch.set(L < STEP ? tmp.subarray(0, L) : tmp, s);
    await new Promise(r => requestAnimationFrame(r));   // yield — keep the UI responsive (no 330 ms block)
  }
  const fade = Math.round(sr * 0.006);                  // 6 ms raised-cosine taper hides the loop seam
  for (let i = 0; i < fade; i++) { const g = 0.5 - 0.5 * Math.cos(Math.PI * i / fade); ch[i] *= g; ch[len - 1 - i] *= g; }
  return ch;
}

// Play `ch` looping, entering at the current loop phase so the timeline (and the
// spectrogram) stays continuous. fadeSec>0 crossfades in from the current voice.
function playBuffer(ch, fadeSec) {
  const { ctx } = audio, sr = ctx.sampleRate, dur = ch.length / sr, now = ctx.currentTime;
  const buf = ctx.createBuffer(1, ch.length, sr); buf.getChannelData(0).set(ch);
  const gain = ctx.createGain(), src = ctx.createBufferSource();
  src.buffer = buf; src.loop = true; src.connect(gain); gain.connect(ctx.destination);
  if (!cur) startT = now;                               // first play anchors the timeline
  const phase = cur ? (((now - startT) % dur) + dur) % dur : 0;
  if (cur && fadeSec > 0) {
    gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(1, now + fadeSec);   // new swells in
    const { src: oldSrc, gain: oldGain } = cur;
    oldGain.gain.cancelScheduledValues(now); oldGain.gain.setValueAtTime(oldGain.gain.value, now);
    oldGain.gain.linearRampToValueAtTime(0, now + fadeSec);                                  // old bows out
    oldSrc.stop(now + fadeSec + 0.05); oldSrc.onended = () => oldGain.disconnect();
  } else {
    gain.gain.setValueAtTime(1, now);
    if (cur) { cur.src.stop(); cur.gain.disconnect(); }
  }
  src.start(now, phase);
  cur = { src, gain, ch }; audio.ch = ch;               // spectrogram reads audio.ch
}

let gen = 0;
async function start(kind) {
  const my = ++gen;
  await warmBeat(kind);                // beat synth used by the audio callback
  const engine = await loadEngine(kind, urls);   // rfft engine — the measured workload
  if (my !== gen) return;
  const inp = engine.init(N);          // Float64Array: JS buffer or wasm view
  const spec = engine.spectrum();      // magnitude (after rfft)
  const sr = audio.ctx.sampleRate;
  const samp = (i) => { const c = audio.ch, L = c.length; return c[((i % L) + L) % L]; };  // live read — follows a crossfade swap
  let cursor = Math.floor((audio.ctx.currentTime - startT) * sr);   // playhead, in buffer-sample coords
  const dbSpan = DB_CEIL - DB_FLOOR;

  (function frame() {
    if (my !== gen) return;
    requestAnimationFrame(frame);
    if (!audio.ch) { ui.frame(null); return; }     // buffer not ready yet

    const target = Math.floor((audio.ctx.currentTime - startT) * sr);   // playhead — what's actually heard now
    const w = sg.width, h = sg.height;
    let cols = Math.floor((target - cursor) / HOP);
    if (cols <= 0) { ui.frame(null); return; }            // paused or no new audio yet
    if (cols > w) { cursor = target - w * HOP; cols = w; }   // fell behind (tab hidden) — jump to live

    sgctx.drawImage(sg, -cols, 0);                 // scroll spectrogram left
    wctx.globalCompositeOperation = "copy";        // scroll waveform overlay in lockstep
    wctx.drawImage(wave, -cols, 0);                // ('copy' clears the freshly exposed edge)
    wctx.globalCompositeOperation = "source-over";

    let work = 0;
    for (let c = 0; c < cols; c++) {
      cursor += HOP;
      const base = cursor - N;
      for (let i = 0; i < N; i++) inp[i] = samp(base + i) * hann[i];   // windowed frame from the playing buffer
      const t0 = performance.now();
      engine.rfft();                                                    // ← the measured workload: jz vs JS on the FFT
      work += performance.now() - t0;
      // each row = peak magnitude across its band, A-weighted, mapped through a fixed dB
      // window so loudness is absolute: quiet stays dim, partials pop bright.
      for (let y = 0; y < h; y++) {
        let mag = 0;
        for (let b = rowLo[y]; b <= rowHi[y]; b++) if (spec[b] > mag) mag = spec[b];
        const db = 20 * Math.log10(mag + 1e-7) + rowAw[y];
        const v = (db - DB_FLOOR) / dbSpan;
        colPix[y] = pal[(v > 0 ? (v < 1 ? v : 1) : 0) * 255 | 0];
      }
      const x = w - cols + c;
      sgctx.putImageData(colImg, x, 0);
      waveCol(samp, cursor, x, wave.height, spec);  // one waveform column, time-aligned to this frame
    }
    ui.frame(work);
  })();
}

// The waveform's colour is mixed from NBARS A-weighted frequency bands (no bars are drawn).
const NBARS = 110;
const barLo = new Int32Array(NBARS), barHi = new Int32Array(NBARS), barAw = new Float64Array(NBARS);
const barPos = new Float64Array(NBARS);        // each bar's centre as a fixed log-Hz fraction (0=20Hz…1=20kHz)
const fitBars = () => {                        // band i = frequency range [barLo..barHi] of FFT bins, A-weighted
  const step = 1 / (NBARS - 1);
  for (let i = 0; i < NBARS; i++) {
    const p = i * step;
    const a = binAt(p - 0.5 * step), b = binAt(p + 0.5 * step);   // band edges, half a bar each way
    barLo[i] = Math.min(a, b); barHi[i] = Math.max(a, b);
    barAw[i] = aWeight(scale.inv(p));
    // centroid weight is the bar's true log-Hz position, NOT its index — so the tint is
    // scale-independent (mel packs bass into more indices, which would skew it dark).
    barPos[i] = Math.log(scale.inv(p) / F_LO) / LN_R;
  }
};
fitBars();

// scale selector — swap the frequency layout live and rebuild every mapping that depends on it.
const scaleEl = document.getElementById("scale");
const setScale = (name) => {
  if (!SCALES[name] || scale === SCALES[name]) return;
  scale = SCALES[name];
  buildRows(); fitBars(); drawAxis();
  sgctx.fillStyle = "#000"; sgctx.fillRect(0, 0, sg.width, sg.height);   // drop the mixed-scale history
  [...scaleEl.children].forEach(b => b.classList.toggle("on", b.dataset.s === name));
};
scaleEl.addEventListener("click", (e) => {
  e.stopPropagation();                         // don't let the click reach the play/pause toggle
  const b = e.target.closest("button"); if (b) setScale(b.dataset.s);
});

// Scrolling waveform: one column per spectrogram column, time-aligned to it. Each
// column is the min/max envelope of that hop's HOP samples, so the time-domain
// signal scrolls left in lockstep with the spectral picture above it. Tint is lch():
// log-Hz → hue (20 Hz red … 20 kHz UV), A-weighted level → lightness only.
const WAMP = 0.42;
// Waveform tint shares the spectrogram's exact palette: the spectral centroid (bass↔treble)
// indexes the same dark→teal→amber→white LUT, stretched so timbre shifts read as strong colour.
function waveColor(spec) {
  let num = 0, den = 0;
  for (let i = 0; i < NBARS; i++) {
    let mag = 0;
    for (let j = barLo[i]; j <= barHi[i]; j++) if (spec[j] > mag) mag = spec[j];
    const db = 20 * Math.log10(mag + 1e-7) + barAw[i];
    const v = Math.max(0, Math.min(1, (db - DB_FLOOR) / (DB_CEIL - DB_FLOOR)));
    const wt = v * v;                                          // loud bands dominate the centroid
    num += barPos[i] * wt; den += wt;                          // weight by log-Hz position, not bar index
  }
  const cen = den > 1e-6 ? num / den : 0;                      // spectral centroid, 0 (bass) … 1 (treble)
  const c = Math.max(0, Math.min(1, (cen - 0.1) / 0.55));      // stretch the mid-heavy range over the full LUT
  const L = 150 + (105 * c | 0);                               // timbre → lightness: bass dim-gray, treble bright white (always high-contrast on black)
  return `rgb(${L},${L},${L})`;
}
function waveCol(samp, cursor, x, h, spec) {
  let lo = 1, hi = -1;
  for (let i = cursor - HOP; i < cursor; i++) { const s = samp(i); if (s < lo) lo = s; if (s > hi) hi = s; }
  const mid = h * 0.5, amp = h * WAMP, y0 = mid - hi * amp, y1 = mid - lo * amp;
  wctx.fillStyle = waveColor(spec);
  wctx.fillRect(x, y0, 1, Math.max(1, y1 - y0));
}

// ── play / pause ──────────────────────────────────────────────────────────────
// First gesture creates the AudioContext (autoplay policy). After that, clicking the
// spectrogram or pressing space toggles pause; suspending the context freezes its
// clock, so the scroll halts and resumes seamlessly.
const playEl = document.getElementById("play");
const overlay = (show) => { playEl.style.display = show ? "flex" : "none"; };

function togglePlay() {
  if (!running) return;
  paused = !paused;
  if (paused) { audio.ctx.suspend(); overlay(true); }   // freezes the callback + clock; resume() unfreezes both
  else { audio.ctx.resume(); overlay(false); }
}

// First gesture: create the context, warm the beat engine, synth + play the first buffer.
async function begin() {
  running = true;
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  audio = { ctx, sampleRate: ctx.sampleRate };
  SR = ctx.sampleRate; buildRows(); drawAxis(); fitBars();   // real device rate → exact Hz everywhere
  await warmBeat(ui.kind);
  playBuffer(await synthBuffer(seed), 0);                    // first buffer (sliced, non-blocking), anchors startT
  overlay(false);
  start(ui.kind);
}

playEl.addEventListener("click", (e) => {
  e.stopPropagation();
  running ? togglePlay() : begin();
});
document.getElementById("sgwrap").addEventListener("click", (e) => {
  if (!running || playEl.contains(e.target)) return;   // overlay handles its own clicks
  togglePlay();
});
window.addEventListener("keydown", (e) => {
  if (e.code !== "Space") return;
  e.preventDefault();
  running ? togglePlay() : playEl.click();
});
</script>
</body>
</html>
