<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<title>Ray-traced spheres - jz</title>
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; background: #000; color: #eee;
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  body { border-top: 2px solid #ddd; }
  #c { position: fixed; inset: 0; width: 100%; height: 100%; display: block; cursor: grab; }
</style>
</head>
<body>
<canvas id="c"></canvas>

<script type="module">
import { loadEngine, hud } from "../lib/jzdemo.js"

const cv = document.getElementById("c"), g = cv.getContext("2d")
let W = 0, H = 0, img, out32, px

const sizeTo = (engine) => {
  // CPU path tracing with shadows + reflections is heavy — cap the internal buffer
  // to ~0.9 MP and let CSS upscale, so it stays smooth on hi-DPI screens.
  const budget = 900000
  let scale = Math.min(1, window.devicePixelRatio || 1)
  const want = innerWidth * innerHeight * scale * scale
  if (want > budget) scale *= Math.sqrt(budget / want)
  W = Math.round(innerWidth * scale) >> 1 << 1
  H = Math.round(innerHeight * scale) >> 1 << 1
  cv.width = W; cv.height = H
  img = g.createImageData(W, H); out32 = new Uint32Array(img.data.buffer)
  px = engine.resize(W, H)
}

let engine = null, gen = 0
const setEngine = async (kind) => {
  const my = ++gen
  const e = await loadEngine(kind, { js: "./raytrace.js", wasm: "./raytrace.wasm" })
  if (my !== gen) return
  engine = e; sizeTo(engine); engine.init()
}
addEventListener("resize", () => engine && sizeTo(engine))

// Camera: auto-pivots around the spheres; drag rotates azimuth/elevation, release
// resumes the orbit, wheel dollies. Eye rides a sphere looking at the origin.
let az = 0, el = 0.3, dist = 2.9, camActive = false, lastPX = 0, lastPY = 0
cv.style.cursor = 'grab'
cv.addEventListener('pointerdown', e => {
  camActive = true; lastPX = e.clientX; lastPY = e.clientY
  cv.style.cursor = 'grabbing'
  try { cv.setPointerCapture(e.pointerId) } catch {}
})
cv.addEventListener('pointermove', e => {
  if (!camActive) return
  az += (e.clientX - lastPX) * 0.01
  el += (e.clientY - lastPY) * 0.01
  if (el > 1.2) el = 1.2
  if (el < 0.05) el = 0.05        // stay above the floor
  lastPX = e.clientX; lastPY = e.clientY
})
const endDrag = () => { camActive = false; cv.style.cursor = 'grab' }
cv.addEventListener('pointerup', e => { endDrag(); try { cv.releasePointerCapture(e.pointerId) } catch {} })
cv.addEventListener('pointerleave', endDrag)
cv.addEventListener('wheel', e => {
  e.preventDefault()
  dist *= Math.exp(e.deltaY * 0.001)
  if (dist < 1.8) dist = 1.8
  if (dist > 6.0) dist = 6.0
}, { passive: false })

const loop = () => {
  requestAnimationFrame(loop)
  if (!engine) return
  if (!camActive) az += 0.004            // gentle auto-orbit when not dragging
  const eyeX = Math.sin(az) * Math.cos(el) * dist
  const eyeY = Math.sin(el) * dist
  const eyeZ = Math.cos(az) * Math.cos(el) * dist
  const t0 = performance.now()
  engine.frame(eyeX, eyeY, eyeZ)
  const ms = performance.now() - t0
  ui.paint(px, out32); g.putImageData(img, 0, 0)
  ui.frame(ms)
}

const ui = hud({
  kind: "jz", hint: "ray-traced spheres on a checkerboard",
  code: "./raytrace.js",
  nav: "raytrace",
  onSwitch: setEngine,
})
await setEngine(ui.kind)
loop()
</script>
</body>
</html>
