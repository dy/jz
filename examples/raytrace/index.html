<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo } from "../lib/jzdemo.js"

let az = 0, el = 0.3, dist = 2.9, camActive = false, lastPX = 0, lastPY = 0
const demo = runDemo({
  name: "raytrace",
  hint: "ray-traced spheres on a checkerboard",
  size: { budget: 900000 },
  cursor: "grab",
  load: (e) => e.init(),
  frame: (e) => {
    if (!camActive) az += 0.004
    const eyeX = Math.sin(az) * Math.cos(el) * dist
    const eyeY = Math.sin(el) * dist
    const eyeZ = Math.cos(az) * Math.cos(el) * dist
    e.frame(eyeX, eyeY, eyeZ)
  },
})

demo.cv.addEventListener("pointerdown", (e) => {
  camActive = true; lastPX = e.clientX; lastPY = e.clientY
  demo.cv.style.cursor = "grabbing"
  try { demo.cv.setPointerCapture(e.pointerId) } catch {}
})
demo.cv.addEventListener("pointermove", (e) => {
  if (!camActive) return
  az += (e.clientX - lastPX) * 0.01
  el += (e.clientY - lastPY) * 0.01
  if (el > 1.2) el = 1.2
  if (el < 0.05) el = 0.05
  lastPX = e.clientX; lastPY = e.clientY
})
const endDrag = () => { camActive = false; demo.cv.style.cursor = "grab" }
demo.cv.addEventListener("pointerup", (e) => { endDrag(); try { demo.cv.releasePointerCapture(e.pointerId) } catch {} })
demo.cv.addEventListener("pointerleave", endDrag)
demo.cv.addEventListener("wheel", (e) => {
  e.preventDefault()
  dist *= Math.exp(e.deltaY * 0.001)
  if (dist < 1.8) dist = 1.8
  if (dist > 6.0) dist = 6.0
}, { passive: false })
</script>
</body>
</html>
