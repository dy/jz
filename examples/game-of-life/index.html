<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<title>Conway's Game of Life - jz</title>
<link rel="icon" href="https://github.com/evanw/jz/favicon.ico" type="image/x-icon" />
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; color: #111; background: #fff; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
  body { border-top: 2px solid #ddd; }
  canvas { position: fixed; inset: 0; width: 100%; height: 100%; background: #100707; cursor: cell; user-select: none; }
</style>
</head>
<body>
<canvas></canvas>
<script type="module">
import { loadEngine, hud } from "../lib/jzdemo.js";

const urls = { js: "./game-of-life.js", wasm: "./game-of-life.wasm" };

// Configuration
const RGB_ALIVE = 0xffffff;
const RGB_DEAD  = 0x000000;
const BIT_ROT   = 10;

// see assembly/index.ts on why this swap is useful
const rgb2bgr = (rgb) => ((rgb >>> 16) & 0xff) | (rgb & 0xff00) | (rgb & 0xff) << 16;

// Set up the canvas with a 2D rendering context
const canvas = document.getElementsByTagName("canvas")[0];
const ctx = canvas.getContext("2d");
const bcr = canvas.getBoundingClientRect();

// Universe size — one cell per CSS pixel (crisp, fills the screen; was 2px/cell)
const dpr = Math.min(1, window.devicePixelRatio || 1);
const width  = bcr.width  * dpr | 0;
const height = bcr.height * dpr | 0;
const size   = width * height;

canvas.width  = width;
canvas.height = height;
canvas.style = `image-rendering: pixelated; image-rendering: crisp-edges;`;
ctx.imageSmoothingEnabled = false;

const imageData = ctx.createImageData(width, height);
const argb = new Uint32Array(imageData.data.buffer);

const h = hud({ kind: "jz", code: "./game-of-life.js", nav: "game-of-life", onSwitch: start });

let engine; // current engine
let mem;    // shared buffer (input + output halves)
const aliveVal = ((rgb2bgr(RGB_ALIVE) | 1) | 0xff000000) >>> 0;
let gen = 0;
async function start(kind) {
  const my = ++gen;
  engine = await loadEngine(kind, urls);
  mem = engine.init(width, height, rgb2bgr(RGB_ALIVE) | 1, rgb2bgr(RGB_DEAD) & ~1, BIT_ROT);

  (function loop() {
    if (my !== gen) return;
    requestAnimationFrame(loop);
    mem.copyWithin(0, size, 2 * size);       // output → input
    const t0 = performance.now();
    engine.step();                           // next generation
    const work = performance.now() - t0;
    argb.set(mem.subarray(size, 2 * size));  // output → image
    ctx.putImageData(imageData, 0, 0);
    h.frame(work);
  })();
}
start(h.kind);

// Pen drawing: click or drag to paint live cells into the output half.
const setCell = (x, y) => {
  if (x < 0 || x >= width || y < 0 || y >= height) return
  mem[size + y * width + x] = aliveVal
}
const pen = (cx, cy, r = 2) => {
  const x0 = Math.max(0, cx - r), x1 = Math.min(width - 1, cx + r)
  const y0 = Math.max(0, cy - r), y1 = Math.min(height - 1, cy + r)
  for (let y = y0; y <= y1; y++) for (let x = x0; x <= x1; x++) setCell(x, y)
}
const posFromEvent = (e) => {
  const rect = canvas.getBoundingClientRect()
  return {
    x: ((e.clientX - rect.left) * width / rect.width) | 0,
    y: ((e.clientY - rect.top) * height / rect.height) | 0,
  }
}
let drawing = false
canvas.addEventListener('pointerdown', e => {
  drawing = true
  try { canvas.setPointerCapture(e.pointerId) } catch {}
  const p = posFromEvent(e); pen(p.x, p.y)
})
canvas.addEventListener('pointermove', e => { if (drawing) { const p = posFromEvent(e); pen(p.x, p.y) } })
canvas.addEventListener('pointerup', e => { drawing = false; try { canvas.releasePointerCapture(e.pointerId) } catch {} })
canvas.addEventListener('pointerleave', () => { drawing = false })
</script>
</body>
</html>
