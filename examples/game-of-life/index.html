<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { loadEngine, hud } from "../lib/jzdemo.js"

const RGB_ALIVE = 0xffffff
const RGB_DEAD  = 0x000000
const BIT_ROT   = 10
const rgb2bgr = (rgb) => ((rgb >>> 16) & 0xff) | (rgb & 0xff00) | (rgb & 0xff) << 16
const aliveVal = ((rgb2bgr(RGB_ALIVE) | 1) | 0xff000000) >>> 0
const deadVal  = ((rgb2bgr(RGB_DEAD) & ~1) | 0xff000000) >>> 0

// Create canvas manually (game-of-life uses init() not resize(), so runDemo can't be used)
const s = document.createElement('style')
s.textContent = `html,body{height:100%;margin:0;overflow:hidden;background:#100707;color:#eee;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif}`
  + `body>canvas{position:fixed;inset:0;width:100%;height:100%;display:block;image-rendering:pixelated;cursor:cell}`
document.head.appendChild(s)
const cv = document.createElement('canvas')
document.body.insertBefore(cv, document.body.firstChild)
const ctx = cv.getContext('2d')

const dpr = Math.min(1, window.devicePixelRatio || 1)
let W = Math.round(innerWidth * dpr) >> 1 << 1
let H = Math.round(innerHeight * dpr) >> 1 << 1
cv.width = W; cv.height = H
let imageData = ctx.createImageData(W, H)
let argb = new Uint32Array(imageData.data.buffer)

let engine, mem, gen = 0
const size = () => W * H

async function start(kind) {
  const my = ++gen
  engine = await loadEngine(kind, { js: './game-of-life.js', wasm: './game-of-life.wasm' })
  if (my !== gen) return
  W = Math.round(innerWidth * dpr) >> 1 << 1
  H = Math.round(innerHeight * dpr) >> 1 << 1
  cv.width = W; cv.height = H
  imageData = ctx.createImageData(W, H); argb = new Uint32Array(imageData.data.buffer)
  mem = engine.init(W, H, rgb2bgr(RGB_ALIVE) | 1, rgb2bgr(RGB_DEAD) & ~1, BIT_ROT)
  loop()
}

const loop = () => {
  requestAnimationFrame(() => { if (engine) loop() })
  const sz = size()
  mem.copyWithin(0, sz, 2 * sz)
  if (drawing) spray(curX, curY, erasing)
  engine.step()
  ui.paint(mem.subarray(sz, 2 * sz), argb)
  ctx.putImageData(imageData, 0, 0)
  ui.frame()
}

const ui = hud({
  kind: 'jz',
  hint: "Conway's Game of Life — right-drag to erase",
  meter: new URLSearchParams(location.search).get('fps') !== '0',
  src: 'https://github.com/dy/jz/tree/main/examples/game-of-life',
  code: './game-of-life.js',
  nav: 'game-of-life',
  onSwitch: start,
})
start(ui.kind)

let brushR = 9, drawing = false, erasing = false, curX = 0, curY = 0

const setCell = (x, y, v) => {
  if (!mem) return
  const sz = size()
  if (x < 0 || x >= W || y < 0 || y >= H) return
  mem[sz + y * W + x] = v
}
const spray = (cx, cy, erase) => {
  const r = brushR
  if (erase) {
    for (let y = -r; y <= r; y++) for (let x = -r; x <= r; x++)
      if (x * x + y * y <= r * r) setCell(cx + x, cy + y, deadVal)
    return
  }
  const shots = Math.max(4, (r * r * 0.5) | 0)
  for (let i = 0; i < shots; i++) {
    const a = Math.random() * 6.2832, rr = Math.sqrt(Math.random()) * r
    setCell((cx + Math.cos(a) * rr) | 0, (cy + Math.sin(a) * rr) | 0, aliveVal)
  }
}
const posFromEvent = (e) => {
  const rect = cv.getBoundingClientRect()
  return {
    x: ((e.clientX - rect.left) * W / rect.width) | 0,
    y: ((e.clientY - rect.top) * H / rect.height) | 0,
  }
}
cv.addEventListener('pointerdown', e => {
  drawing = true; erasing = e.button === 2
  try { cv.setPointerCapture(e.pointerId) } catch {}
  const p = posFromEvent(e); curX = p.x; curY = p.y
  spray(curX, curY, erasing)
})
cv.addEventListener('pointermove', e => {
  const p = posFromEvent(e); curX = p.x; curY = p.y
  if (drawing) e.preventDefault()
})
cv.addEventListener('pointerup', e => { drawing = false; try { cv.releasePointerCapture(e.pointerId) } catch {} })
cv.addEventListener('pointerleave', () => { drawing = false })
cv.addEventListener('contextmenu', e => e.preventDefault())
cv.addEventListener('wheel', e => {
  e.preventDefault()
  brushR += e.deltaY > 0 ? -1 : 1
  if (brushR < 1) brushR = 1
  if (brushR > 12) brushR = 12
}, { passive: false })
</script>
</body>
</html>
