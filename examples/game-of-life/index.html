<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<title>Conway's Game of Life - jz</title>
<link rel="icon" href="https://github.com/evanw/jz/favicon.ico" type="image/x-icon" />
<style>
  html, body { height: 100%; margin: 0; overflow: hidden; color: #111; background: #fff; font-family: sans-serif; }
  body { border-top: 2px solid #bc18d4; }
  canvas { position: fixed; inset: 0; width: 100%; height: 100%; background: #100707; cursor: cell; user-select: none; }
</style>
</head>
<body>
<canvas></canvas>
<script type="module">
import { loadEngine, hud } from "../lib/jzdemo.js";

const urls = { js: "./game-of-life.js", wasm: "./game-of-life.wasm" };

// Configuration
const RGB_ALIVE = 0xD392E6;
const RGB_DEAD  = 0xA61B85;
const BIT_ROT   = 10;

// see assembly/index.ts on why this swap is useful
const rgb2bgr = (rgb) => ((rgb >>> 16) & 0xff) | (rgb & 0xff00) | (rgb & 0xff) << 16;

// Set up the canvas with a 2D rendering context
const canvas = document.getElementsByTagName("canvas")[0];
const ctx = canvas.getContext("2d");
const bcr = canvas.getBoundingClientRect();

// Universe size (2px per cell)
const width  = bcr.width  >>> 1;
const height = bcr.height >>> 1;
const size   = width * height;

canvas.width  = width;
canvas.height = height;
canvas.style = `image-rendering: pixelated; image-rendering: crisp-edges;`;
ctx.imageSmoothingEnabled = false;

const imageData = ctx.createImageData(width, height);
const argb = new Uint32Array(imageData.data.buffer);

const h = hud({ kind: "jz", src: "https://github.com/dy/jz/tree/main/examples/game-of-life", code: "./game-of-life.js", nav: "game-of-life", onSwitch: start });

let engine; // current engine — interaction handlers below read this
let gen = 0;
async function start(kind) {
  const my = ++gen;
  engine = await loadEngine(kind, urls);
  const mem = engine.init(width, height, rgb2bgr(RGB_ALIVE) | 1, rgb2bgr(RGB_DEAD) & ~1, BIT_ROT);

  (function loop() {
    if (my !== gen) return;
    requestAnimationFrame(loop);
    mem.copyWithin(0, size, 2 * size);       // output → input
    const t0 = performance.now();
    engine.step();                           // next generation
    const work = performance.now() - t0;
    argb.set(mem.subarray(size, 2 * size));  // output → image
    ctx.putImageData(imageData, 0, 0);
    h.frame(work);
  })();
}
start(h.kind);

// Click or drag to seed the current row and column with live cells
let down = false;
for (const ty of ["mousedown", "touchstart"]) canvas.addEventListener(ty, () => down = true);
for (const ty of ["mouseup", "touchend"]) document.addEventListener(ty, () => down = false);
for (const ty of ["mousemove", "touchmove", "mousedown"]) {
  canvas.addEventListener(ty, e => {
    if (!down) return;
    const loc = e.touches ? (e.touches.length > 1 ? null : e.touches[0]) : e;
    if (!loc) return;
    const rect = canvas.getBoundingClientRect();
    engine.fill((loc.clientX - rect.left) >>> 1, (loc.clientY - rect.top) >>> 1, 0.5);
  });
}
</script>
</body>
</html>
