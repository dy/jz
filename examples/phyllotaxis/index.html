<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, trackPointer } from "../lib/jzdemo.js"

const GOLDEN_ANGLE = 2.3999632297286535
let baseAng = GOLDEN_ANGLE, userSet = false
const demo = runDemo({
  name: "phyllotaxis",
  hint: "Sunflower packing — drag left/right to shift the divergence angle away from golden",
  frame: (e, t) => {
    let ang
    if (ptr.down) {
      // an ULTRA-FINE slider: the whole screen width spans only ±0.006rad around golden — the
      // packing reorganizes dramatically within a hair of the golden angle, so even a fine sweep
      // blew past every interesting parastichy. Drag slowly to walk the spiral families one by one.
      ang = GOLDEN_ANGLE + (ptr.x - 0.5) * 0.0125
      baseAng = ang; userSet = true
    } else {
      const amp = userSet ? 0.001 : 0.005
      ang = baseAng + Math.sin(t * 0.02) * amp         // slow, gentle drift (4× softer)
    }
    e.frame(t, ang)
  },
})
const ptr = trackPointer(demo.cv)
</script>
</body>
</html>
