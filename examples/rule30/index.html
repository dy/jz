<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, trackPointer } from "../lib/jzdemo.js"

const demo = runDemo({
  name: "rule30",
  hint: "Wolfram Rule 30 — drag ↔ to change rule (0–255), click to reseed",
  size: { budget: 160000 },
  load: (e) => e.init?.(),
  frame: (e, t) => {
    let rule = Math.floor(ptr.x * 256)
    if (rule > 255) rule = 255
    if (rule < 0) rule = 0
    e.frame(t, rule)
  },
})
const ptr = trackPointer(demo.cv)
demo.cv.addEventListener("pointerdown", () => { if (demo.engine && demo.engine.seed) demo.engine.seed() })
</script>
</body>
</html>
