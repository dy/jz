<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, trackPointer } from "../lib/jzdemo.js"

// Press (or drag) to plant the goal anywhere; the robot re-plans toward it every tick and dodges
// the drifting obstacles. Left alone it throws itself a fresh goal each time it arrives.
const demo = runDemo({
  name: "dwa",
  hint: "Dynamic Window Approach — the robot rolls out every reachable velocity, scores each arc for progress and clearance, and drives the winner. Drag to move the goal",
  size: { dpr: 2, budget: null },
  load: (e) => e.init(),
  frame: (e, t) => e.frame(t),
})

const ptr = trackPointer(demo.cv)
const steer = () => { if (demo.engine && ptr.down) demo.engine.setGoal(ptr.x, ptr.y) }
demo.cv.addEventListener("pointerdown", steer)
demo.cv.addEventListener("pointermove", steer)
</script>
</body>
</html>
