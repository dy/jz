<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, trackPointer } from "../lib/jzdemo.js"

// A faithful port of Andrew Davison's Dynamic Window Approach demo. Drag to move the target; the
// robot scores every reachable arc for progress-to-goal and obstacle clearance and drives the best.
// A fresh combination of balls each page-load; the randomize button (⚄) re-rolls a new one.
let mySeed = (Math.random() * 2e9) | 0

const demo = runDemo({
  name: "dwa",
  hint: "Dynamic Window Approach — the robot scores every reachable velocity arc for progress and clearance, then drives the best. Drag to move the goal",
  size: { dpr: 2, budget: null },
  // apply the current layout seed on every (re)load so resize / engine-swap keep the same combination
  load: (e) => { if (e.seed) e.seed(mySeed); else e.init() },
  // the randomize button re-rolls the ball combination (advance the seed the host owns, then re-seed)
  randomize: (e) => { mySeed = (mySeed * 1103515245 + 12345) | 0; if (e.seed) e.seed(mySeed); else e.init() },
  frame: (e, t) => e.frame(t),
})

const ptr = trackPointer(demo.cv)
const steer = () => { if (demo.engine && ptr.down) demo.engine.setGoal(ptr.x, ptr.y) }
demo.cv.addEventListener("pointerdown", steer)
demo.cv.addEventListener("pointermove", steer)

// Credit the source/inspiration — Davison's original interactive demo — ON the same line as the
// wiki/code links (append to .jz-links, not .jz-desc, so it doesn't drop to its own row).
const links = document.querySelector(".jz-links")
if (links) {
  links.appendChild(document.createTextNode("  ·  "))
  const a = document.createElement("a")
  a.className = "jz-wiki"
  a.href = "https://www.doc.ic.ac.uk/~ajd/Planning/"
  a.target = "_blank"; a.rel = "noopener"
  a.textContent = "original"
  links.appendChild(a)
}
</script>
</body>
</html>
