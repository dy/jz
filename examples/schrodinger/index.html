<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="user-scalable=0" />
<link rel="icon" href="https://github.com/dy/jz/favicon.ico" type="image/x-icon" />
</head>
<body>
<script type="module">
import { runDemo, trackPointer } from "../lib/jzdemo.js"

let lastDown = false
const demo = runDemo({
  name: "schrodinger",
  hint: "Schrödinger wavepacket — double-slit interference; click to relaunch",
  size: { budget: 160000 },
  load: (e) => { e.init?.() },
  frame: (e, t) => {
    if (ptr.down && !lastDown) e.init?.()
    lastDown = ptr.down
    e.frame(t)
  },
})

const ptr = trackPointer(demo.cv)
</script>
</body>
</html>
