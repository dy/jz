name: bench
# Competitive-regression gate (see CONTRIBUTING.md "Performance & size invariant").
# Runs on every push and PR: jz must stay at least as fast/small as V8,
# AssemblyScript and Porffor on the bench corpus, and `wasm-opt -Oz` must not
# find meaningful slack in jz's own output.
on:
  push:
    paths-ignore:
      - '**/*.md'
      - '**/*.svg'
      - '**/*.html'
      - '.work/**'
      - 'LICENSE'
      - 'CONTRIBUTING.md'
      - 'bench/results.json'
      - 'bench/web/**'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - '**/*.svg'
      - '**/*.html'
      - '.work/**'
      - 'LICENSE'
      - 'CONTRIBUTING.md'
      - 'bench/results.json'
      - 'bench/web/**'
jobs:
  bench:
    runs-on: ubuntu-latest
    # The publish step commits bench/results.json + bench/web back to main;
    # the default GITHUB_TOKEN is read-only and 403s that push without this.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      # Zig native reference rows (cases with a .zig baseline).
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0
      # Extra "Run as JS" runtimes (Deno, Bun). bench.mjs gates every target on
      # `available`, so a missing tool just drops its row — additive, never fails.
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: oven-sh/setup-bun@v2
      # NumPy native-reference rows (python3 is preinstalled on ubuntu).
      - name: install numpy
        run: python3 -m pip install --break-system-packages numpy || pip install numpy || true
      # wasmtime runs the standalone `jz → wasmtime` / `jz → wasm2c` reference rows.
      - name: install wasmtime
        run: |
          curl https://wasmtime.dev/install.sh -sSf | bash || true
          echo "$HOME/.wasmtime/bin" >> "$GITHUB_PATH"
      # Competitor toolchains + binaryen (provides wasm-opt).
      - run: npm install --no-save assemblyscript@~0.27.0 porffor@~0.61.0 binaryen
      - name: expose toolchains on PATH
        run: echo "$PWD/node_modules/.bin" >> "$GITHUB_PATH"
      - name: versions
        run: |
          node --version
          asc --version || true
          porf --version || true
          wasm-opt --version || true
      - run: npm run test:bench
      # Refresh the bench-page dataset: bench/index.html renders results.json and
      # instantiates bench/web/*.wasm for its live in-browser runner. Push-to-main
      # only; the paths-ignore above keeps the commit from re-triggering this
      # workflow. clang/rustc/go are preinstalled on ubuntu runners, so native
      # reference rows come from the same consistent machine as the JS/wasm rows.
      - name: publish bench snapshot
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          node bench/bench.mjs --targets=nat,rust,zig,go,v8,deno,bun,as,porf,jz,wat,numpy --json || exit 1
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git pull --rebase origin main || true
          # dist/jz.js + dist/interop.js are what the repl + bench pages import
          # (Pages serves the repo; a gitignored dist 404s the deployed repl).
          npm run build
          git add bench/results.json bench/bench.svg bench/web dist/jz.js dist/interop.js
          git diff --cached --quiet || git commit -m 'bench: refresh results.json + web artifacts [skip ci]'
          # a push landing mid-run rejects ours — rebase once and retry
          git push || (git pull --rebase origin main && git push)
