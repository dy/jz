name: test
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Core suite under every compiler configuration: default = level 2,
        # opt0/opt1/opt3 the other levels, wasi the standalone host. Level- and
        # host-specific assertions are guarded by belowOpt()/onWasi() in
        # test/_matrix.js, so all five legs are green — a miscompile that only
        # surfaces at opt0 or under wasi is now caught in CI, not just locally.
        variant: [default, opt0, opt1, opt3, wasi]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: test (${{ matrix.variant }})
        run: |
          case "${{ matrix.variant }}" in
            default) npm test ;;
            opt0)    npm run test:opt0 ;;
            opt1)    npm run test:opt1 ;;
            opt3)    npm run test:opt3 ;;
            wasi)    npm run test:wasi ;;
          esac
      - run: npm run build:examples
        if: matrix.variant == 'default'
      - run: git diff --exit-code -- examples/
        if: matrix.variant == 'default'
