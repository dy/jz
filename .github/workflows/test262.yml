name: test262
on: [push, pull_request]
jobs:
  test262-language:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Cache test262 corpus
        id: cache-test262
        uses: actions/cache@v4
        with:
          path: test/test262
          key: test262-shallow-v1
      - name: Clone test262 (shallow)
        if: steps.cache-test262.outputs.cache-hit != 'true'
        run: git clone --depth 1 https://github.com/tc39/test262.git test/test262
      - name: Run test262 language suite
        env:
          # Baseline (as of last green main, 2026-05-21): 1431 passes / 0 fails / 21949 skips.
          # If you intentionally add or skip tests, bump this number in the same commit.
          # The runner exits non-zero if pass count drops below the baseline.
          # 2026-05-21: +2 — real-boolean carrier unskips `typeof boolean` and
          # `boolean→string concatenation` (formerly "boolean erased to f64").
          JZ_TEST262_BASELINE: 1431
        run: npm run test262

  test262-builtins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Cache test262 corpus
        id: cache-test262
        uses: actions/cache@v4
        with:
          path: test/test262
          key: test262-shallow-v1
      - name: Clone test262 (shallow)
        if: steps.cache-test262.outputs.cache-hit != 'true'
        run: git clone --depth 1 https://github.com/tc39/test262.git test/test262
      - name: Run test262 built-ins suite
        env:
          # Baseline (as of last green main, 2026-05-18): 719 passes / 0 in-scope
          # fails / 63 xfail (out-of-scope: BigInt, Symbol, RegExp exec, …).
          # The runner gates on pass < baseline AND any in-scope fail > 0; an
          # out-of-scope fail must be added to EXPECTED_FAIL_* in the runner.
          # Lift this baseline when fixes land.
          JZ_TEST262_BASELINE: 719
        run: npm run test262:builtins
