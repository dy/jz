name: test262
on:
  push:
    paths-ignore:
      - '**/*.md'
      - '**/*.svg'
      - '**/*.html'
      - '.work/**'
      - 'LICENSE'
      - 'CONTRIBUTING.md'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - '**/*.svg'
      - '**/*.html'
      - '.work/**'
      - 'LICENSE'
      - 'CONTRIBUTING.md'
jobs:
  test262-language:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Cache test262 corpus
        id: cache-test262
        uses: actions/cache@v4
        with:
          path: test/test262
          key: test262-shallow-v4
      - name: Clone test262 (shallow)
        if: steps.cache-test262.outputs.cache-hit != 'true'
        run: git clone --depth 1 https://github.com/tc39/test262.git test/test262
      - name: Run test262 language suite
        env:
          # Baseline (2026-05-29): 1437 passes / 0 in-scope fails / 3 xfail / 21940 skips.
          # The runner gates on THREE guards: in-scope fail===0 (any fail is a
          # miscompile), xpass===0 (prune stale EXPECTED_FAIL entries), and this
          # pass-count ratchet. Out-of-scope gaps bucket as xfail (see EXPECTED_FAIL
          # in test/test262.js), not fail. 2026-05-29: +9 — subscript 10.4.17 fixed
          # the `1.e3` digit-dot-exponent lexer (8 numeric + 1 computed-key literal).
          # 2026-07-10: 1453 → 2205 — the unblanketing leg: stale blankets removed
          # (for-of dir, destructuring content, this/class/super/WeakMap/new.target
          # patterns), four real compiler fixes surfaced+landed (destructuring
          # defaults fired on null; numeric object-pattern keys crashed; `var`
          # pattern declarators dropped; for-of head cover-grammar `{x=1}`
          # mis-destructured), residues precisely skip-classified or xfail-tracked
          # (bool-carrier family flips to xpass when that work lands — prune then).
          JZ_TEST262_BASELINE: 2754
        run: npm run test:262

  test262-builtins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Cache test262 corpus
        id: cache-test262
        uses: actions/cache@v4
        with:
          path: test/test262
          key: test262-shallow-v4
      - name: Clone test262 (shallow)
        if: steps.cache-test262.outputs.cache-hit != 'true'
        run: git clone --depth 1 https://github.com/tc39/test262.git test/test262
      - name: Run test262 built-ins suite
        env:
          # Baseline (2026-05-29): 723 passes / 0 in-scope fails / 61 xfail
          # (out-of-scope: BigInt, Symbol, RegExp exec, …).
          # The runner gates on pass < baseline AND any in-scope fail > 0; an
          # out-of-scope fail must be added to EXPECTED_FAIL_* in the runner.
          # 2026-05-29: +2 — fixed the dyn-shadow desync (Object.assign mirror +
          # needsDynShadow honoring anyDynKey) and the static-array 16-byte-header
          # OOB; unskips Object/assign/ObjectOverride-sameproperty and
          # Object/keys/15.2.3.14-6-2. Also pruned 2 stale EXPECTED_FAIL entries.
          # Lift this baseline when fixes land.
          # 2026-05-30: 723 → 722. The 723 was tied to the now-stale `-v1` corpus
          # snapshot; on current test262 the count is 722 at EVERY commit, including
          # the last-green 8165d9a (verified by a green↔HEAD pass-set diff — identical,
          # so no jz regression; upstream simply changed/removed one test). Bumped the
          # cache key to `-v2` so both jobs re-clone current test262, where this run
          # measures 722 pass / 0 in-scope fail.
          JZ_TEST262_BASELINE: 737
        run: npm run test:262:builtins
