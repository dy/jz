name: test262
on: [push, pull_request]
jobs:
  test262-language:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Cache test262 corpus
        id: cache-test262
        uses: actions/cache@v4
        with:
          path: test/test262
          key: test262-shallow-v1
      - name: Clone test262 (shallow)
        if: steps.cache-test262.outputs.cache-hit != 'true'
        run: git clone --depth 1 https://github.com/tc39/test262.git test/test262
      - name: Run test262 language suite
        env:
          # Baseline (2026-05-29): 1428 passes / 0 in-scope fails / 12 xfail / 21940 skips.
          # The runner gates on THREE guards: in-scope fail===0 (any fail is a
          # miscompile), xpass===0 (prune stale EXPECTED_FAIL entries), and this
          # pass-count ratchet. Out-of-scope/upstream-parser gaps bucket as xfail
          # (see EXPECTED_FAIL in test/test262.js), not fail. If you intentionally
          # add or skip tests, bump this number in the same commit.
          JZ_TEST262_BASELINE: 1428
        run: npm run test:262

  test262-builtins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Cache test262 corpus
        id: cache-test262
        uses: actions/cache@v4
        with:
          path: test/test262
          key: test262-shallow-v1
      - name: Clone test262 (shallow)
        if: steps.cache-test262.outputs.cache-hit != 'true'
        run: git clone --depth 1 https://github.com/tc39/test262.git test/test262
      - name: Run test262 built-ins suite
        env:
          # Baseline (as of last green main, 2026-05-21): 721 passes / 0 in-scope
          # fails / 63 xfail (out-of-scope: BigInt, Symbol, RegExp exec, …).
          # The runner gates on pass < baseline AND any in-scope fail > 0; an
          # out-of-scope fail must be added to EXPECTED_FAIL_* in the runner.
          # 2026-05-21: +2 — boolean→ToString in argument position unskips
          # parseInt(boolean) and parseFloat(boolean) (formerly fed the 0/1 carrier).
          # Lift this baseline when fixes land.
          JZ_TEST262_BASELINE: 721
        run: npm run test:262:builtins
