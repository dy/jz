name: test262
on: [push, pull_request]
jobs:
  test262-language:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Cache test262 corpus
        id: cache-test262
        uses: actions/cache@v4
        with:
          path: test/test262
          key: test262-shallow-v1
      - name: Clone test262 (shallow)
        if: steps.cache-test262.outputs.cache-hit != 'true'
        run: git clone --depth 1 https://github.com/tc39/test262.git test/test262
      - name: Run test262 language suite
        env:
          # Baseline (as of last green main, 2026-05-15): 859 passes / 0 fails / 22521 skips.
          # If you intentionally add or skip tests, bump this number in the same commit.
          # The runner exits non-zero if pass count drops below the baseline.
          JZ_TEST262_BASELINE: 859
        run: npm run test262

  test262-builtins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Cache test262 corpus
        id: cache-test262
        uses: actions/cache@v4
        with:
          path: test/test262
          key: test262-shallow-v1
      - name: Clone test262 (shallow)
        if: steps.cache-test262.outputs.cache-hit != 'true'
        run: git clone --depth 1 https://github.com/tc39/test262.git test/test262
      - name: Run test262 built-ins suite
        env:
          # Baseline (as of last green main, 2026-05-16): 661 passes / 136 fails.
          # Built-ins coverage is more volatile than language; lift this when fixes land.
          JZ_TEST262_BASELINE: 661
        run: npm run test262:builtins
