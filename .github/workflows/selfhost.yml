name: selfhost
# Self-host gate: builds dist/jz.wasm from scripts/self.js using the host jz
# compiler, then instantiates that wasm and round-trips real programs through
# `self.default(source)`. The wasm runs the whole pipeline in-wasm — parse
# (jessie) → jzify → prepare → compile → watr-encode — so it is jz, compiled by jz.
on:
  push:
    paths-ignore:
      - '**/*.md'
      - '.vscode/**'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - '.vscode/**'
jobs:
  selfhost:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      # Host suite baseline is covered by test.yml; this job adds only the
      # self-host gate (build dist/jz.wasm, round-trip programs through it).
      - name: build + run dist/jz.wasm
        run: npm run test:self
