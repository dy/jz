name: selfhost
# Self-host gate: builds dist/jz-kernel.wasm from src/compile/kernel.js using
# the host jz compiler, then instantiates that wasm and round-trips real
# programs through `kernel.exports.default` (= compileParsed). The kernel
# itself runs the jzify→prepare→compile pipeline in-wasm; only the parser
# (subscript/jessie) and watr backend stay host-side.
on: [push, pull_request]
jobs:
  selfhost:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: host suite (baseline)
        run: npm test
      - name: build + run jz-kernel.wasm
        run: npm run test:selfhost
